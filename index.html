  <script type="text/babel" data-presets="react">

    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyBNT1g3ipZJNjrpQB24kolH5LukqpVf500",
      authDomain:        "matchmaker-pro-90a1b.firebaseapp.com",
      databaseURL:       "https://matchmaker-pro-90a1b-default-rtdb.asia-southeast1.firebasedatabase.app",

    // ================================================================
    const LS_KEY = 'matchmaker_pro_tournaments';

    // localStorage 헬퍼
    const lsGetAll = () => {

    };

    // 📁 폴더 헬퍼

    };
    const lsSaveFolders = (folders) => {

    // Firebase는 undefined 값을 허용하지 않음 — JSON 왕복으로 undefined 키 제거
    const sanitizeForFirebase = (obj) => {
      try { return JSON.parse(JSON.stringify(obj)); }
      catch(e) { return obj; }
    };

    // Firebase 연결 상태 — 한번이라도 저장 실패하면 사용자에게 알림
    window.__fbWarned = false;
    const fbSave = async (id, record) => {

      try {

      } catch(e) {
        console.error('🔥 Firebase 저장 실패:', e, '\n저장 시도한 데이터:', clean);

          window.__fbWarned = true;
          alert('⚠️ Firebase에 저장이 실패하고 있습니다.\n\n원인 가능성:\n1. Firebase Realtime DB 규칙(.read/.write)이 막혀있음\n2. 데이터에 허용되지 않은 값(undefined 등)\n3. 인터넷 연결 문제\n\n임시로 이 브라우저(localStorage)에는 저장되지만, 다른 기기에서는 안 보입니다.\n\n에러: ' + (e.message || e.toString()));
        }
      }
    };
    const fbDelete = async (id) => {
      lsDelete(id);
      try { await db.ref('tournaments/'+id).remove(); } catch(e) { console.warn('Firebase 삭제 실패:', e); }
    };
    const fbSaveShare = async (record) => {
      const shareId = Math.random().toString(36).substr(2,9);
      try {
        await db.ref('shares/'+shareId).set({data:JSON.stringify(record),createdAt:Date.now()});
      } catch(e) {
        // Firebase 실패 시 localStorage에 share 저장
        try { const d=JSON.parse(localStorage.getItem('mm_shares')||'{}'); d[shareId]={data:JSON.stringify(record)}; localStorage.setItem('mm_shares',JSON.stringify(d)); } catch(e2) {}
      }
      return shareId;
    };

    // 📁 Firebase 폴더 저장/조회
    const fbSaveFolders = async (folders) => {
      lsSaveFolders(folders);
      try {
        await db.ref('folders').set(sanitizeForFirebase(folders));
      } catch(e) { console.warn('Firebase 폴더 저장 실패:', e); }
    };
    const fbLoadFolders = async () => {
      try {
        const snap = await db.ref('folders').once('value');
        const val = snap.val();
        if (val) { lsSaveFolders(val); return val; }
      } catch(e) { console.warn('Firebase 폴더 로딩 실패:', e); }
      return lsGetFolders();
    };
    const fbGetShare = async (shareId) => {
      try {
        const s=await db.ref('shares/'+shareId).once('value');
        const v=s.val();
        if(v&&v.data) { try{return JSON.parse(v.data);}catch(e){} }
      } catch(e) {}
      // localStorage fallback
      try { const d=JSON.parse(localStorage.getItem('mm_shares')||'{}'); if(d[shareId]?.data) return JSON.parse(d[shareId].data); } catch(e) {}
      return null;
    };
    // Firebase 세션 — URL 파라미터 대신 Firebase에 세션 저장 (학교 도메인 리다이렉트 대응)
    const fbCreateSession = async (type, tournamentId, matchId='') => {
      const sid = Math.random().toString(36).substr(2,6).toUpperCase();
      await db.ref('sessions/'+sid).set({type, tournamentId, matchId, createdAt:Date.now()});
      return sid;
    };
    const fbGetSession = async (sid) => {
      const s = await db.ref('sessions/'+sid).once('value');
      return s.val();
    };

    // ================================================================
    //  GAS API 래퍼 — 구글 시트 연동 전용 (fetch + JSON)
    //  ▸ Content-Type 헤더 미지정 → text/plain → CORS preflight 회피
    // ================================================================
    const gasCall = async (action, payload = {}) => {
      if (!window.GAS_API_URL || window.GAS_API_URL.includes('PASTE_YOUR')) {
        throw new Error('GAS_API_URL이 설정되지 않았습니다. index.html 상단에서 본인 GAS 배포 URL을 입력하세요.');
      }
      let res;
      try {
        res = await fetch(window.GAS_API_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...payload }),
          redirect: 'follow',
        });
      } catch (e) {
        throw new Error('네트워크 오류 — GAS URL이 잘못됐거나 인터넷 연결을 확인하세요. (' + e.message + ')');
      }
      if (!res.ok) throw new Error('GAS HTTP ' + res.status + ' — 배포가 "모든 사용자" 권한인지 확인하세요.');
      const text = await res.text();
      // JSON 파싱 실패 = HTML(로그인 페이지 등) 응답일 가능성
      let data;
      try { data = JSON.parse(text); }
      catch (e) {
        const preview = text.substring(0, 200);
        console.error('[gasCall] JSON 파싱 실패. 응답 내용:', preview);
        throw new Error('GAS 응답이 JSON이 아닙니다. 배포 권한을 "모든 사용자"로 다시 설정하고 새 버전으로 재배포하세요. (응답: ' + preview.substring(0, 100) + '...)');
      }
      if (data && data.success === false) throw new Error(data.error || 'GAS 내부 오류');
      return data;
    };

    // ================================================================
    //  상수
    // ================================================================
    const SPORTS_LIST = [
      { id: 'soccer',      name: '축구',    icon: '⚽' },
      { id: 'basketball',  name: '농구',    icon: '🏀' },
      { id: 'badminton',   name: '배드민턴', icon: '🏸' },
      { id: 'tennis',      name: '테니스',  icon: '🎾' },
      { id: 'tabletennis', name: '탁구',    icon: '🏓' },
      { id: 'volleyball',  name: '배구',    icon: '🏐' },
      { id: 'custom',      name: '기타',    icon: '🏆' },
    ];
    // 세트제로 진행하는 종목 — 배드민턴, 테니스, 탁구, 배구
    const SETS_SPORTS = ['badminton','tennis','tabletennis','volleyball'];
    const isSetsGame = (sport) => SETS_SPORTS.includes(sport);
    // 테니스만 특수 로직 사용
    const isTennis = (sport) => sport === 'tennis';
    // 선택 가능한 세트제 옵션: 단판 / 3판 2선승 / 5판 3선승
    const SETS_OPTIONS = [
      { value: 1, label: '단판제',      sub: '1세트' },
      { value: 3, label: '3판 2선승제', sub: '3세트' },
      { value: 5, label: '5판 3선승제', sub: '5세트' },
    ];
    // 테니스 — 세트당 게임수 옵션
    const TENNIS_GAMES_OPTIONS = [
      { value: 4, label: '4게임 선승', sub: '간이' },
      { value: 6, label: '6게임 선승', sub: '정식 (기본)' },
      { value: 8, label: '8게임 선승', sub: '프로 셋' },
    ];

    // ================================================================
    //  🎾 테니스 점수 엔진 — 정석 ATP/WTA 룰
    // ================================================================
    // 포인트 단계: 0 → 15 → 30 → 40 → (게임승 or 듀스)
    const TENNIS_POINTS = [0, 15, 30, 40];
    const ptDisplay = (p, isAd) => isAd ? 'AD' : (p<=3 ? TENNIS_POINTS[p] : 40);

    // 한 포인트 후의 상태 계산
    // state: {gA, gB, pA, pB, isDeuce, advA, advB, isTiebreak, tbA, tbB}
    // settings: {gamesPerSet, deuce: true=듀스, false=노애드, tiebreak: true, isFinalSet: boolean}
    // scorer: 'A' or 'B'
    function tennisScorePoint(state, settings, scorer) {
      const next = {...state};
      const {gamesPerSet, deuce, tiebreak, isFinalSet} = settings;

      // 1. 타이브레이크 진행 중
      if(next.isTiebreak){
        if(scorer==='A') next.tbA++; else next.tbB++;
        // 마지막 세트 매치 타이브레이크면 10점, 일반은 7점
        const tbTarget = isFinalSet ? 10 : 7;
        const tbA = next.tbA, tbB = next.tbB;
        if(tbA >= tbTarget && tbA - tbB >= 2){
          // A 타이브레이크 승
          next.gA++; next.tbA = 0; next.tbB = 0; next.isTiebreak = false;
          return endGame(next, settings);
        }
        if(tbB >= tbTarget && tbB - tbA >= 2){
          next.gB++; next.tbA = 0; next.tbB = 0; next.isTiebreak = false;
          return endGame(next, settings);
        }
        return next;
      }

      // 2. 듀스 모드 (40-40)
      if(next.isDeuce){
        if(deuce){
          // 어드밴티지 룰
          if(scorer==='A'){
            if(next.advB){ next.advB=false; } // B 어드 → 듀스로 복귀
            else if(next.advA){ // A가 어드 + A 득점 → 게임승
              next.advA=false; next.isDeuce=false; next.pA=0; next.pB=0;
              next.gA++;
              return endGame(next, settings);
            }
            else { next.advA=true; }
          } else {
            if(next.advA){ next.advA=false; }
            else if(next.advB){
              next.advB=false; next.isDeuce=false; next.pA=0; next.pB=0;
              next.gB++;
              return endGame(next, settings);
            }
            else { next.advB=true; }
          }
        } else {
          // 노애드 — 다음 1점 따는 사람이 게임 가져감
          next.isDeuce=false; next.pA=0; next.pB=0;
          if(scorer==='A') next.gA++; else next.gB++;
          return endGame(next, settings);
        }
        return next;
      }

      // 3. 일반 포인트
      if(scorer==='A') next.pA++; else next.pB++;

      // 3-1. 40-40 진입 → 듀스
      if(next.pA===3 && next.pB===3){
        next.isDeuce = true;
        return next;
      }
      // 3-2. 누군가 40 이상이고 상대보다 2점 차이면 게임승
      if(next.pA>=4 && next.pA - next.pB >= 2){
        next.pA=0; next.pB=0; next.gA++;
        return endGame(next, settings);
      }
      if(next.pB>=4 && next.pB - next.pA >= 2){
        next.pA=0; next.pB=0; next.gB++;
        return endGame(next, settings);
      }
      return next;
    }

    // 게임 종료 후 세트/타이브레이크 진입 여부 판단
    function endGame(state, settings){
      const {gamesPerSet, tiebreak, isFinalSet} = settings;
      const {gA, gB} = state;

      // 마지막 세트 매치 타이브레이크 모드 — gamesPerSet 무시, 10점 매치 타이브레이크
      // (3판2선승의 3세트 또는 5판3선승의 5세트가 1-1 또는 2-2일 때)

      // 일반 세트 종료
      // 6게임 선승: 6-0~6-4 = 세트승, 5-5 → 7게임선승(6-5는 계속), 6-6 → 타이브레이크
      const target = gamesPerSet;

      if(gA === target && gB <= target - 2){
        // 6-0 ~ 6-4 처럼 깔끔한 승
        return endSet(state, 'A');
      }
      if(gB === target && gA <= target - 2){
        return endSet(state, 'B');
      }
      // 5-5 상황: 한 게임 더 이어가서 7-5면 종료
      if(gA === target + 1 && gB <= target - 1){
        // 7-5
        return endSet(state, 'A');
      }
      if(gB === target + 1 && gA <= target - 1){
        return endSet(state, 'B');
      }
      // 6-6 또는 4-4 (4게임 선승의 경우) → 타이브레이크
      if(tiebreak && gA === target && gB === target){
        state.isTiebreak = true;
        state.tbA = 0; state.tbB = 0;
      }
      return state;
    }

    // 세트 종료 처리
    function endSet(state, winner){
      if(winner==='A') state.sA++; else state.sB++;
      state.gA = 0; state.gB = 0;
      state.pA = 0; state.pB = 0;
      state.advA = false; state.advB = false;
      state.isDeuce = false;
      state.isTiebreak = false;
      state.tbA = 0; state.tbB = 0;
      // 세트 히스토리 기록
      if(!state.setHistory) state.setHistory = [];
      // 마지막 세트 점수 (직전 게임 결과)
      return state;
    }

    // 초기 테니스 상태
    function initTennisState(){
      return {
        sA:0, sB:0,                    // 매치 세트 스코어
        gA:0, gB:0,                    // 현재 세트 게임 스코어
        pA:0, pB:0,                    // 현재 게임 포인트 (0~3 → 0/15/30/40)
        advA:false, advB:false,        // 어드밴티지 보유 여부
        isDeuce:false,                 // 듀스 상태
        isTiebreak:false,              // 타이브레이크 진행 중
        tbA:0, tbB:0,                  // 타이브레이크 점수
        setHistory:[]                  // [{gA, gB}, ...] 완료된 세트 게임수
      };
    }
    const MATCH_TYPES = [
      { id: 'individual', name: '개인전', icon: '👤' },
      { id: 'doubles',    name: '복식',   icon: '👥' },
      { id: 'team_match', name: '팀경기', icon: '⚽' },
      { id: 'team',       name: '단체전', icon: '🚩' },
    ];
    const TEAM_FORMATS = [
      { id: '2D1S', name: '2복식 1단식',  matches: 3 },
      { id: '3D',   name: '3복식',        matches: 3 },
      { id: '3S2D', name: '3단식 2복식',  matches: 5 },
      { id: '1S2D', name: '1단식 2복식',  matches: 3 },
      { id: '2S1D', name: '2단식 1복식',  matches: 3 },
    ];
    const MAX_PARTICIPANTS = 64;
    const TType = { TOURNAMENT:'TOURNAMENT', LEAGUE:'LEAGUE', GROUP_KNOCKOUT:'GROUP_KNOCKOUT', GROUP_LEAGUE:'GROUP_LEAGUE' };

    // ================================================================
    //  대회 로직
    // ================================================================
    function getSeedOrder(size) {
      let seeds = [1];
      while (seeds.length < size) {
        const next = []; const sum = seeds.length * 2 + 1;
        for (const s of seeds) { next.push(s); next.push(sum - s); }
        seeds = next;
      }
      return seeds;
    }

    function generateTournamentBracket(participants, prefix='r') {
      const count = participants.length;
      const p2 = Math.pow(2, Math.ceil(Math.log2(count)));
      const matches = [];
      const seeded   = participants.filter(p => p && p.isSeeded).sort((a,b)=>(a.seedRank||99)-(b.seedRank||99));
      const unseeded = participants.filter(p => p && !p.isSeeded);
      const sorted   = [...seeded,...unseeded];
      const order    = getSeedOrder(p2);
      const slots    = new Array(p2).fill(null);
      sorted.forEach((p,i)=>{ const si=order.indexOf(i+1); if(si!==-1) slots[si]=p; });
      for(let i=0;i<p2;i+=2) matches.push({id:`${prefix}1-m${i/2}`,participant1:slots[i],participant2:slots[i+1],round:1,matchIndex:i/2,status:'pending'});
      let round=2; let mpr=p2/4;
      while(mpr>=1){
        for(let i=0;i<mpr;i++) matches.push({id:`${prefix}${round}-m${i}`,participant1:null,participant2:null,round,matchIndex:i,status:'pending'});
        round++; mpr/=2;
      }
      autoAdvanceByes(matches,prefix);
      return matches;
    }

    function advanceWinnerInBracket(matches, cur, winner, prefix) {
      const nr = cur.round+1; const ni = Math.floor(cur.matchIndex/2);
      const nm = matches.find(m=>m.id===`${prefix}${nr}-m${ni}`);
      if(nm){ if(cur.matchIndex%2===0) nm.participant1=winner; else nm.participant2=winner; }
    }

    function autoAdvanceByes(matches, prefix) {
      let changed=true;
      while(changed){
        changed=false;
        for(const m of matches){
          if(m.status==='pending'&&m.round===1){
            if(m.participant1&&!m.participant2){ m.status='completed';m.winnerId=m.participant1.id;m.score1=1;m.score2=0;advanceWinnerInBracket(matches,m,m.participant1,prefix);changed=true; }
            else if(!m.participant1&&m.participant2){ m.status='completed';m.winnerId=m.participant2.id;m.score1=0;m.score2=1;advanceWinnerInBracket(matches,m,m.participant2,prefix);changed=true; }
          }
        }
      }
    }

    function generateLeagueSchedule(participants, groupPrefix='') {
      const teams=[...participants];
      const isOdd=teams.length%2!==0;
      if(isOdd) teams.push({id:`bye-${groupPrefix}-${Math.random()}`,name:'휴식(Bye)',isSeeded:false});
      const rounds=[]; const tc=teams.length; const nr=tc-1; const half=tc/2;
      const list=[...teams];
      for(let i=0;i<nr;i++){
        const matches=[];
        for(let j=0;j<half;j++) matches.push({id:`l-g${groupPrefix}-r${i}-m${j}`,home:list[j],away:list[tc-1-j],status:'pending'});
        rounds.push({roundNumber:i+1,matches});
        list.splice(1,0,list.pop());
      }
      return rounds;
    }

    // ▸ gf/ga = 기본은 세트 승수, 하지만 세트제 경기는 setScores가 있으면 실제 점수 합계
    // ▸ pf/pa = 항상 실제 점수 합계 (세트제) 또는 단일 점수 (비세트제)
    // ▸ pts = 승 3점, 무 1점, 패 1점 (탁구처럼 모든 경기 출전 보상)
    // ▸ ptsAvg = 승점 / 경기수, pfAvg = 득점합 / 경기수
    function calculateStandings(participants, rounds, isSets=false) {
      const stats={};
      participants.forEach(p=>{ stats[p.id]={
        participantId:p.id, name:p.name,
        played:0, win:0, draw:0, loss:0,
        gf:0, ga:0, gd:0,           // 세트 득/실/차 (세트제) 또는 점수 (비세트제)
        pf:0, pa:0, pd:0,           // 실제 점수 득/실/차 (세트별 점수 합계)
        pts:0, ptsAvg:0, pfAvg:0
      }; });
      rounds.forEach(r=>{ r.matches.forEach(m=>{
        if(m.status==='completed'&&!m.home.id.includes('bye')&&!m.away.id.includes('bye')){
          const h=stats[m.home.id],a=stats[m.away.id];
          if(!h||!a) return;
          const sh=m.scoreHome||0, sa=m.scoreAway||0;
          h.played++; a.played++;
          h.gf+=sh; h.ga+=sa; a.gf+=sa; a.ga+=sh;
          h.gd=h.gf-h.ga; a.gd=a.gf-a.ga;

          // 세트별 점수 합계 — 세트제 경기에서 setScores가 있을 때
          if(isSets && Array.isArray(m.setScores) && m.setScores.length>0){
            let phf=0, paf=0;
            m.setScores.forEach(s=>{
              const sH=parseInt(s.h)||0, sA=parseInt(s.a)||0;
              phf+=sH; paf+=sA;
            });
            h.pf+=phf; h.pa+=paf;
            a.pf+=paf; a.pa+=phf;
          } else {
            // 비세트제 또는 setScores 없으면 기존 점수가 곧 실점수
            h.pf+=sh; h.pa+=sa;
            a.pf+=sa; a.pa+=sh;
          }
          h.pd=h.pf-h.pa; a.pd=a.pf-a.pa;

          // 승점: 승 3 / 무 1 / 패 1 (모든 경기 참여 보상)
          if(sh>sa){ h.win++; h.pts+=3; a.loss++; a.pts+=1; }
          else if(sa>sh){ a.win++; a.pts+=3; h.loss++; h.pts+=1; }
          else { h.draw++; a.draw++; h.pts+=1; a.pts+=1; }
        }
      }); });
      // 평균 계산
      Object.values(stats).forEach(s=>{
        if(s.played>0){
          s.ptsAvg = +(s.pts/s.played).toFixed(2);
          s.pfAvg  = +(s.pf /s.played).toFixed(2);
        }
      });
      return Object.values(stats).sort((a,b)=>
        b.pts!==a.pts?b.pts-a.pts:
        b.pd !==a.pd ?b.pd -a.pd :
        b.pf !==a.pf ?b.pf -a.pf :
        b.gd !==a.gd ?b.gd -a.gd :
        b.gf -a.gf
      );
    }

    // groups에서 각 조 상위 N명을 본선 진출시키는 대진표 생성
    // advancePerGroup: 각 조에서 본선 진출시킬 인원수 (1, 2, 3, 4 ...)
    function shuffleKnockoutPlaceholders(groups, advancePerGroup=2) {
      // 각 등수별로 진출자 후보 모으기
      const byRank = []; // [{rank, candidates: [{group, ...}]}]
      for(let rank=1; rank<=advancePerGroup; rank++){
        const candidates = groups.map(g=>({
          group: g,
          rank,
          pts: g.standings?.[rank-1]?.pts||0,
          gd:  g.standings?.[rank-1]?.gd||0,
          gf:  g.standings?.[rank-1]?.gf||0,
          placeholderId: `${g.id}-rank${rank}`,
          name: `${g.name} ${rank}위`
        }));
        byRank.push({rank, candidates});
      }

      // 1위들은 시드 (성적순), 나머지 등수들은 셔플
      const final = [];
      // 1위: 시드 (포인트/득실차로 정렬)
      const firsts = [...(byRank[0]?.candidates||[])].sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
      firsts.forEach((f,i)=>final.push({
        id:`ph-${f.group.id}-rank1-${Math.random()}`,
        name:f.name, isSeeded:true, seedRank:i+1, placeholderId:f.placeholderId
      }));
      // 2위 이하: 셔플
      for(let i=1; i<byRank.length; i++){
        const shuffled = [...byRank[i].candidates].sort(()=>Math.random()-0.5);
        shuffled.forEach((s,j)=>final.push({
          id:`ph-${s.group.id}-rank${s.rank}-${Math.random()}`,
          name:s.name, isSeeded:false, seedRank:final.length+1, placeholderId:s.placeholderId
        }));
      }

      const matches = generateTournamentBracket(final,'k');
      // 같은 조 출신끼리 1라운드에서 만나지 않게 충돌 검사
      const collision = matches.some(m=>{
        if(m.round===1&&m.participant1&&m.participant2){
          const g1=m.participant1.placeholderId?.split('-')[0];
          const g2=m.participant2.placeholderId?.split('-')[0];
          return g1===g2;
        }
        return false;
      });
      // 충돌 시 최대 10회 재시도 (무한루프 방지)
      if(collision && !shuffleKnockoutPlaceholders._retryCount){ shuffleKnockoutPlaceholders._retryCount = 0; }
      if(collision){
        shuffleKnockoutPlaceholders._retryCount = (shuffleKnockoutPlaceholders._retryCount||0)+1;
        if(shuffleKnockoutPlaceholders._retryCount < 10){
          return shuffleKnockoutPlaceholders(groups, advancePerGroup);
        }
        shuffleKnockoutPlaceholders._retryCount = 0;
        return matches; // 10회 시도 후에도 충돌이면 그냥 반환
      }
      shuffleKnockoutPlaceholders._retryCount = 0;
      return matches;
    }

    // ================================================================

                  </h4>

                      const p2ph=!!match.participant2?.placeholderId&&match.participant2.id?.startsWith('ph-');
                      return (
                        <div key={match.id} className="relative group flex items-center gap-1">

                                {match.participant1?.isSeeded&&!p1ph&&<span className="text-[10px] bg-amber-500 text-white font-black px-1 py-0.5 rounded">S{match.participant1.seedRank}</span>}
                                <span className={`text-base font-bold truncate ${p1w?'text-green-700 font-black':(match.participant1?(p1ph?'text-slate-300 italic font-medium':'text-slate-800'):'text-slate-300 italic')}`}>
                                  {match.participant1?match.participant1.name:'TBD'}
                                </span>
                              </div>
                              {done&&match.score1!==undefined&&<span className="text-lg font-black text-slate-900">{match.score1}</span>}
                            </div>
                            {/* P2 */}
                            <div className={`px-4 py-3 flex justify-between items-center ${p2w?'bg-green-50':(match.participant2?.isSeeded?'bg-amber-50/50':'')}`}>
                              <div className="flex items-center gap-2 overflow-hidden">
                                {match.participant2?.isSeeded&&!p2ph&&<span className="text-[10px] bg-amber-500 text-white font-black px-1 py-0.5 rounded">S{match.participant2.seedRank}</span>}
                                <span className={`text-base font-bold truncate ${p2w?'text-green-700 font-black':(match.participant2?(p2ph?'text-slate-300 italic font-medium':'text-slate-800'):(match.round===1?'Bye':'text-slate-300 italic'))}`}>

                              </div>
                              {done&&match.score2!==undefined&&<span className="text-lg font-black text-slate-900">{match.score2}</span>}
                            </div>
                          </button>
                          {/* 📺 스코어보드 링크 */}
                          {onScoreboardLink&&!bye&&(
                            <button onClick={()=>onScoreboardLink(match.id)}
                              className="w-7 h-full min-h-[80px] bg-slate-100 hover:bg-purple-100 text-slate-400 hover:text-purple-600 rounded-xl flex items-center justify-center text-base transition-all shrink-0" title="스코어보드 링크">
                              📺
                            </button>

                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {champDone&&winner&&(
              <div className="flex flex-col pt-12 animate-fade-in shrink-0" style={{width:'220px'}}>
                <div className="flex flex-col justify-center flex-1 gap-4">

                    <span className="text-2xl">🥈</span>
                    <div><p className="text-[10px] font-black text-slate-400 uppercase">Runner Up</p><p className="text-base font-bold text-slate-700 truncate">{runnerUp?.name||'TBD'}</p></div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ================================================================

    // ================================================================
    //  ScheduleSection — 라운드별 경기 카드 (토글 가능, 매치 번호, 결석 표시)
    // ================================================================
    const ScheduleSection = ({ rounds, onMatchClick, onScoreboardLink, onAddRound }) => {
      const [collapsed, setCollapsed] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);

      // 라운드들을 가로지르며 매치마다 전역 번호 부여 (bye 제외)
      const matchNumbers = {};
      let n = 0;
      rounds.forEach(round=>{
        (round.matches||[]).forEach(m=>{
          const bye = m.home.id.startsWith('bye') || m.away.id.startsWith('bye');
          if(!bye){ n++; matchNumbers[m.id] = n; }
        });
      });

      // 활성 참가자 수 계산
      const activeCount = (rounds||[]).length>0
        ? (rounds[0].matches||[]).filter(m=>!m.home.id.startsWith('bye')&&!m.away.id.startsWith('bye')).length * 2 + (rounds[0].matches||[]).filter(m=>m.home.id.startsWith('bye')||m.away.id.startsWith('bye')).length
        : 0;
      const perRound = Math.floor(activeCount/2);
      const fullCycle = activeCount > 1 ? activeCount-1 : 1;

      return (
        <div>
          <div className="flex items-center gap-3 mb-6 px-4 flex-wrap">
            <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Match Schedule</h3>
            <span className="text-[12px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded">총 {n}경기 · {rounds.length}라운드</span>

              <button onClick={()=>setShowAddModal(true)} className="text-[13px] font-black bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg">

              </button>
            )}
            <button onClick={()=>setCollapsed(c=>!c)} className="text-[13px] font-black bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg">
              {collapsed?'▼ 펼치기':'▲ 접기'}
            </button>
          </div>
          {!collapsed&&(
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {rounds.map((round, ri)=>(
                <div key={`r${ri}-${round.roundNumber}`} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                  <div className="bg-slate-800 px-4 py-2.5 flex justify-between items-center">
                    <h4 className="font-bold text-white text-[12px] uppercase tracking-[0.2em]">라운드 {round.roundNumber}</h4>
                    <div className="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                  </div>
                  <div className="p-3 space-y-2 flex-1">
                    {round.matches.map((m, mi)=>{
                      const bye=m.home.id.startsWith('bye')||m.away.id.startsWith('bye');
                      if(bye) return <div key={`bye-${ri}-${mi}`} className="text-center py-2 px-3 bg-slate-50 rounded-xl border border-dashed border-slate-200 text-[12px] font-bold text-slate-400 italic">{m.home.id.startsWith('bye')?m.away.name:m.home.name} 휴식</div>;
                      const done=m.status==='completed';
                      const matchNo=matchNumbers[m.id];
                      const hasAbsent=m.home.absent||m.away.absent;
                      const baseColor = hasAbsent
                        ? 'bg-amber-50 border-amber-300 hover:border-amber-400'
                        : (done
                            ? 'bg-slate-50 border-slate-100 hover:border-blue-200'
                            : 'bg-white border-slate-200 shadow-sm hover:border-blue-400 hover:shadow-md');
                      return (
                        <div key={`r${ri}-m${mi}-${m.id}`} className="flex gap-1.5 items-stretch">
                          <span className={`w-9 shrink-0 rounded-lg flex items-center justify-center text-base font-black ${hasAbsent?'bg-amber-400 text-white':'bg-blue-600 text-white'}`}>{matchNo}</span>
                          <button onClick={()=>onMatchClick(m)}
                            className={`flex-1 min-w-0 flex items-center justify-between gap-1 text-base p-2.5 rounded-xl border transition-all group ${baseColor}`}>
                            <span className={`flex-1 min-w-0 font-black text-left truncate flex items-center gap-1 ${done&&(m.scoreHome||0)>(m.scoreAway||0)?'text-blue-700':'text-slate-800'}`}>
                              {m.home.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded shrink-0">결</span>}
                              <span className="truncate">{m.home.name}</span>
                            </span>
                            <div className="px-1 sm:px-2 shrink-0 flex justify-center">
                              {done?<span className="font-black text-slate-900 bg-white border border-slate-100 px-2 py-0.5 rounded shadow-sm text-sm">{m.scoreHome} : {m.scoreAway}</span>:<span className="text-sm text-slate-300 font-black italic group-hover:text-blue-400">VS</span>}
                            </div>
                            <span className={`flex-1 min-w-0 font-black text-right truncate flex items-center gap-1 justify-end ${done&&(m.scoreAway||0)>(m.scoreHome||0)?'text-blue-700':'text-slate-800'}`}>
                              <span className="truncate">{m.away.name}</span>
                              {m.away.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded shrink-0">결</span>}
                            </span>
                          </button>
                          {onScoreboardLink&&(
                            <button onClick={()=>onScoreboardLink(m.id)}
                              className="w-9 bg-slate-100 hover:bg-purple-100 text-slate-400 hover:text-purple-600 rounded-xl flex items-center justify-center text-base transition-all shrink-0" title="스코어보드">
                              📺
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ➕ 라운드 추가 모달 */}
          {showAddModal&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={()=>setShowAddModal(false)}>
              <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden" onClick={e=>e.stopPropagation()}>
                <div className="bg-blue-600 p-5 text-white text-center">
                  <p className="text-[11px] font-black text-blue-200 uppercase tracking-widest mb-1">Add Round</p>
                  <h3 className="text-xl font-black italic">라운드 추가</h3>
                </div>
                <div className="p-5 space-y-3">
                  <p className="text-sm text-slate-600">어떤 방식으로 라운드를 추가할까요?</p>
                  <button onClick={()=>{onAddRound('shuffle');setShowAddModal(false);}}
                    className="w-full p-4 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 hover:border-blue-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-blue-900 text-base">🎲 셔플 한 라운드</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{perRound}경기 — 참가자를 무작위로 섞어 새 대진</p>
                  </button>
                  <button onClick={()=>{onAddRound('roundrobin');setShowAddModal(false);}}
                    className="w-full p-4 bg-amber-50 hover:bg-amber-100 border-2 border-amber-200 hover:border-amber-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-amber-900 text-base">🏆 풀리그 1바퀴 추가</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{fullCycle}라운드 {perRound*fullCycle}경기 — 모두 vs 모두 정석 룰</p>
                  </button>
                  <button onClick={()=>setShowAddModal(false)}
                    className="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm">취소</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ================================================================
    //  GroupStageView
    // ================================================================
    const GroupStageView = ({ groups, onMatchClick, onScoreboardLink, onAddRound, config }) => {
      const [expanded, setExpanded]   = useState({}); // 자세히/간단히 (컬럼 수)
      const [standingsCollapsed, setStandingsCollapsed] = useState({}); // 순위표 접기
      const sm = isSetsGame(config?.sport);
      const toggle = (gid) => setExpanded(prev=>({...prev,[gid]:!prev[gid]}));
      const toggleStandings = (gid) => setStandingsCollapsed(prev=>({...prev,[gid]:!prev[gid]}));
      return (
      <div className="space-y-12">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          {groups.map(g=>{
            const isExp = !!expanded[g.id];
            const stClosed = !!standingsCollapsed[g.id];
            // 옛날에 저장된 데이터는 pfAvg 같은 새 필드 없음 → 즉석에서 다시 계산
            const standings = (g.standings && g.standings.length>0 && g.standings[0].pfAvg !== undefined)
              ? g.standings
              : calculateStandings(g.participants||[], g.rounds||[], sm);
            const leader = standings[0];
            return (
            <div key={g.id} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
              <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                <h4 className="font-bold text-lg">{g.name} 예선</h4>
                <div className="flex items-center gap-2">
                  <button onClick={()=>toggleStandings(g.id)} className="text-[12px] font-black bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded">
                    {stClosed?'▼ 순위 펼치기':'▲ 순위 접기'}
                  </button>
                  {!stClosed&&(
                    <button onClick={()=>toggle(g.id)} className="text-[12px] font-black bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded">
                      {isExp?'간단히':'자세히'}
                    </button>
                  )}
                  <span className="text-sm font-black text-slate-400 bg-slate-700 px-2 py-0.5 rounded">LEAGUE</span>
                </div>
              </div>
              <div className="p-4 flex-1">
                {/* 순위 접혔을 때: 1위만 표시 */}
                {stClosed && leader && (
                  <div className="mb-4 px-3 py-2 bg-amber-50 rounded-lg border border-amber-200 flex items-center gap-2 text-sm">
                    <span className="text-amber-700">👑</span>
                    <span className="font-black text-amber-900">1위: {leader.name}</span>
                    <span className="text-amber-600 font-bold ml-auto">{leader.pts||0}점</span>
                  </div>
                )}
                {!stClosed && (
                <div className="overflow-x-auto mb-6">
                  <table className={`w-full ${isExp?'text-[12px]':'text-[13px] sm:text-sm'}`}>
                    <thead><tr className="text-slate-400 border-b border-slate-100 uppercase font-black">
                      <th className="text-left pb-2 w-8">순위</th>
                      <th className="text-left pb-2">팀명</th>
                      <th className="text-center pb-2">경</th>
                      <th className="text-center pb-2">승</th>
                      {!isExp&&<th className="text-center pb-2">무</th>}
                      <th className="text-center pb-2">패</th>
                      {isExp&&sm&&<th className="text-center pb-2 bg-slate-50/50">세트차</th>}
                      {isExp&&<th className="text-center pb-2">득점</th>}
                      {isExp&&<th className="text-center pb-2">실점</th>}
                      <th className="text-center pb-2">{isExp?'득실':'득실'}</th>
                      {isExp&&<th className="text-center pb-2 bg-blue-50/50">득점평균</th>}
                      {isExp&&<th className="text-center pb-2 bg-blue-50/50">승점평균</th>}
                      <th className="text-right pb-2">승점</th>
                    </tr></thead>
                    <tbody className="divide-y divide-slate-50">
                      {standings?.map((s,i)=>(
                        <tr key={s.participantId} className={i<2?'bg-green-50/30':''}>
                          <td className="py-2 font-black text-slate-400">{i+1}</td>
                          <td className="py-2 font-bold text-slate-800 truncate max-w-[80px]">{s.name}</td>
                          <td className="py-2 text-center text-slate-500">{s.played}</td>
                          <td className="py-2 text-center text-slate-500 font-bold">{s.win}</td>
                          {!isExp&&<td className="py-2 text-center text-slate-500">{s.draw}</td>}
                          <td className="py-2 text-center text-slate-500">{s.loss}</td>
                          {isExp&&sm&&<td className="py-2 text-center font-medium text-slate-600 bg-slate-50/30">{(s.gd||0)>0?`+${s.gd||0}`:(s.gd||0)}</td>}
                          {isExp&&<td className="py-2 text-center text-slate-700 font-medium">{s.pf||0}</td>}
                          {isExp&&<td className="py-2 text-center text-slate-500">{s.pa||0}</td>}
                          <td className="py-2 text-center font-medium text-slate-600">{(()=>{const v=isExp?(s.pd||0):(s.gd||0);return v>0?`+${v}`:v;})()}</td>
                          {isExp&&<td className="py-2 text-center text-blue-700 font-bold bg-blue-50/30">{(s.pfAvg||0).toFixed(2)}</td>}
                          {isExp&&<td className="py-2 text-center text-blue-700 font-bold bg-blue-50/30">{(s.ptsAvg||0).toFixed(2)}</td>}
                          <td className="py-2 text-right font-black text-blue-600">{s.pts}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                )}
                <GroupScheduleBlock group={g} onMatchClick={onMatchClick} onScoreboardLink={onScoreboardLink} onAddRound={onAddRound} />
              </div>
              <div className="bg-slate-50 px-4 py-2 text-[10px] text-slate-400 font-bold uppercase flex gap-4 border-t border-slate-100">
                <div className="flex items-center gap-1"><div className="w-2 h-2 bg-green-100 rounded-sm"></div>진출권</div>
                <div className="flex items-center gap-1"><div className="w-2 h-2 bg-amber-300 rounded-sm"></div>결석 포함</div>
                <span>기준: 승점 &gt; 득실차 &gt; 다득점</span>
              </div>
            </div>
          );})}
        </div>
      </div>
      );
    };

    // ================================================================
    //  GroupScheduleBlock — 한 조의 경기 스케줄 (조마다 접기/펼치기)
    // ================================================================
    const GroupScheduleBlock = ({ group, onMatchClick, onScoreboardLink, onAddRound }) => {
      const [collapsed, setCollapsed] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      // 매치 번호 매김 (조 내부에서)
      const matchNumbers = {};
      let n = 0;
      (group.rounds||[]).forEach(r=>{
        (r.matches||[]).forEach(m=>{
          if(m.home.id.startsWith('bye')||m.away.id.startsWith('bye')) return;
          n++;
          matchNumbers[m.id] = n;
        });
      });
      const activeP = (group.participants||[]).filter(p=>p&&!p.id.startsWith('bye'));
      const activeN = activeP.length;
      const perRound = Math.floor(activeN/2);
      const fullCycle = activeN > 1 ? activeN-1 : 1;

      return (
        <div className="space-y-2">
          <div className="flex items-center justify-between border-b border-slate-100 pb-1 flex-wrap gap-1">
            <p className="text-[12px] font-black text-slate-400 uppercase tracking-widest">Match Schedule · 총 {n}경기 · {(group.rounds||[]).length}R</p>
            <div className="flex gap-1">
              {onAddRound&&(
                <button onClick={()=>setShowAddModal(true)} className="text-[12px] font-black bg-blue-600 hover:bg-blue-700 text-white px-2 py-0.5 rounded">
                  ➕ 라운드
                </button>
              )}
              <button onClick={()=>setCollapsed(c=>!c)} className="text-[12px] font-black bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-0.5 rounded">
                {collapsed?'▼ 펼치기':'▲ 접기'}
              </button>
            </div>
          </div>
          {!collapsed&&(
            <div className="space-y-1.5">
              {(group.rounds||[]).map((r,ri)=>r.matches.map((m,mi)=>{
                if(m.home.id.startsWith('bye')||m.away.id.startsWith('bye')) return null;
                const done=m.status==='completed';
                const matchNo=matchNumbers[m.id];
                const hasAbsent=m.home.absent||m.away.absent;
                const baseColor = hasAbsent
                  ? 'bg-amber-50 border-amber-300'
                  : (done?'bg-slate-50 border-slate-100':'bg-white border-slate-100 shadow-sm');
                return (
                  <div key={`r${ri}-m${mi}-${m.id}`} className="flex gap-1 items-stretch">
                    <span className={`w-8 shrink-0 rounded flex items-center justify-center text-base font-black ${hasAbsent?'bg-amber-400 text-white':'bg-blue-600 text-white'}`}>{matchNo}</span>
                    <button onClick={()=>onMatchClick(m,group.id)}
                      className={`flex-1 flex justify-between items-center px-2.5 py-2 rounded-lg text-base transition-all hover:brightness-95 border ${baseColor}`}>
                      <span className={`flex-1 text-right font-black truncate flex items-center gap-1 justify-end ${hasAbsent?'text-amber-900':'text-slate-800'}`}>
                        {m.home.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded">결</span>}
                        {m.home.name}
                      </span>
                      <div className="px-2 flex flex-col items-center">
                        {done?<span className="font-black text-blue-600 text-base">{m.scoreHome} : {m.scoreAway}</span>:<span className="text-sm text-slate-300 font-black italic">VS</span>}
                      </div>
                      <span className={`flex-1 text-left font-black truncate flex items-center gap-1 ${hasAbsent?'text-amber-900':'text-slate-800'}`}>
                        {m.away.name}
                        {m.away.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded">결</span>}
                      </span>
                    </button>
                    {onScoreboardLink&&(
                      <button onClick={()=>onScoreboardLink(m.id)}
                        className="w-8 bg-slate-100 hover:bg-purple-100 text-slate-400 hover:text-purple-600 rounded-lg flex items-center justify-center text-base transition-all shrink-0" title="스코어보드">
                        📺
                      </button>
                    )}
                  </div>
                );
              }))}
            </div>
          )}

          {/* ➕ 라운드 추가 모달 */}
          {showAddModal&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={()=>setShowAddModal(false)}>
              <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden" onClick={e=>e.stopPropagation()}>
                <div className="bg-blue-600 p-5 text-white text-center">
                  <p className="text-[11px] font-black text-blue-200 uppercase tracking-widest mb-1">Add Round to {group.name}</p>
                  <h3 className="text-xl font-black italic">{group.name} 라운드 추가</h3>
                </div>
                <div className="p-5 space-y-3">
                  <p className="text-sm text-slate-600">어떤 방식으로 라운드를 추가할까요?</p>
                  <button onClick={()=>{onAddRound(group.id,'shuffle');setShowAddModal(false);}}
                    className="w-full p-4 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 hover:border-blue-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-blue-900 text-base">🎲 셔플 한 라운드</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{perRound}경기 — 참가자를 무작위로 섞어 새 대진</p>
                  </button>
                  <button onClick={()=>{onAddRound(group.id,'roundrobin');setShowAddModal(false);}}
                    className="w-full p-4 bg-amber-50 hover:bg-amber-100 border-2 border-amber-200 hover:border-amber-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-amber-900 text-base">🏆 풀리그 1바퀴 추가</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{fullCycle}라운드 {perRound*fullCycle}경기 — 모두 vs 모두 정석 룰</p>
                  </button>
                  <button onClick={()=>setShowAddModal(false)}
                    className="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm">취소</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ================================================================
    //  MatchResultModal (토너먼트)
    // ================================================================
    const MatchResultModal = ({ match, config, onClose, onSave }) => {
      const isTeam = config.matchType==='team';
      const tf = TEAM_FORMATS.find(f=>f.id===config.teamFormat);
      const nm = tf?.matches||3; const nr = config.teamRounds||1;
      const [s1,setS1]=useState(match.score1??0);
      const [s2,setS2]=useState(match.score2??0);
      const [sub,setSub]=useState(Array.from({length:nr},()=>Array.from({length:nm},()=>({s1:0,s2:0}))));
      useEffect(()=>{setS1(match.score1??0);setS2(match.score2??0);},[match]);
      const applyTeam=()=>{
        let w1=0,w2=0;
        sub.forEach(r=>{let m1=0,m2=0;r.forEach(m=>{if(m.s1>m.s2)m1++;else if(m.s2>m.s1)m2++;});if(m1>m2)w1++;else if(m2>m1)w2++;});
        setS1(w1);setS2(w2);
      };
      const handleSave=()=>{
        if(s1===s2){alert('토너먼트에서는 무승부가 허용되지 않습니다.');return;}
        const wid=s1>s2?(match.participant1?.id||''):(match.participant2?.id||'');
        onSave(match.id,s1,s2,wid);
      };
      if(!match.participant1&&!match.participant2) return null;
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4">
          <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
            <div className="bg-slate-900 p-4 sm:p-6 text-white flex justify-between items-center shrink-0">
              <h3 className="text-base sm:text-xl font-black italic uppercase">Enter Score {isTeam&&`(${tf?.name})`}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-sm sm:text-base">닫기</button>
            </div>
            <div className="p-4 sm:p-8 space-y-4 sm:space-y-8 overflow-y-auto custom-scrollbar">
              {isTeam&&(
                <div className="space-y-4 sm:space-y-6 bg-slate-50 p-3 sm:p-6 rounded-xl sm:rounded-2xl border border-slate-100">
                  <div className="flex justify-between items-center">
                    <h4 className="font-black text-slate-900 text-sm sm:text-base italic">Detailed Match Results</h4>
                    <button onClick={applyTeam} className="text-[11px] sm:text-[12px] font-black bg-blue-600 text-white px-2 sm:px-3 py-1 rounded-full hover:bg-blue-700">결과 자동 반영</button>
                  </div>
                  {sub.map((round,ri)=>(
                    <div key={ri} className="space-y-2 sm:space-y-3">
                      {nr>1&&<p className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">Round {ri+1}</p>}
                      {round.map((m,mi)=>(
                        <div key={mi} className="flex items-center gap-2 sm:gap-4 bg-white p-2 sm:p-3 rounded-xl border border-slate-100 shadow-sm">
                          <span className="text-[10px] sm:text-[12px] font-bold text-slate-400 w-10 sm:w-12 shrink-0">M{mi+1}</span>
                          <div className="flex-1 flex items-center justify-between gap-1 sm:gap-2">
                            <span className="text-xs sm:text-sm font-bold text-slate-600 truncate flex-1 min-w-0">{match.participant1?.name}</span>
                            <input type="number" value={m.s1} onChange={e=>{const ns=[...sub];ns[ri][mi].s1=parseInt(e.target.value)||0;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border rounded p-1 text-sm sm:text-base shrink-0"/>
                            <span className="text-[10px] sm:text-[12px] font-black text-slate-300 italic shrink-0">VS</span>
                            <input type="number" value={m.s2} onChange={e=>{const ns=[...sub];ns[ri][mi].s2=parseInt(e.target.value)||0;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border rounded p-1 text-sm sm:text-base shrink-0"/>
                            <span className="text-xs sm:text-sm font-bold text-slate-600 truncate flex-1 min-w-0 text-right">{match.participant2?.name}</span>
                          </div>
                        </div>
                      ))}
                    </div>

              <div className="grid grid-cols-2 gap-3 sm:gap-8 items-center">
                {[{p:match.participant1,s:s1,setS:setS1,col:'blue'},{p:match.participant2,s:s2,setS:setS2,col:'rose'}].map((side,i)=>(
                  <div key={i} className="text-center space-y-2 sm:space-y-4">
                    <div className={`w-12 h-12 sm:w-16 sm:h-16 bg-${side.col}-100 text-${side.col}-600 rounded-xl sm:rounded-2xl flex items-center justify-center text-xl sm:text-2xl mx-auto`}>{side.p?.name.substring(0,1)||'?'}</div>

                      <input type="number" value={side.s} onChange={e=>side.setS(parseInt(e.target.value)||0)} className={`w-full text-center text-2xl sm:text-3xl font-black py-2 sm:py-3 border-2 border-slate-100 rounded-xl focus:border-${side.col}-500 outline-none`}/>
                      <span className="text-[11px] sm:text-[12px] font-black text-slate-400 mt-1 uppercase">{isTeam?'Rounds Won':'Score'}</span>

              <div className="flex flex-col gap-2 sm:gap-3">

                {match.status==='completed'&&<button onClick={()=>onSave(match.id,0,0,'',true)} className="w-full py-2.5 sm:py-3 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-100 text-sm sm:text-base">결과 초기화</button>}
                <button onClick={onClose} className="w-full py-2.5 sm:py-3 text-slate-400 font-bold text-sm sm:text-base">취소</button>

    // ================================================================

    const AttendanceModal = ({ participants, onToggle, onClose }) => {

    // ================================================================
    //  LeagueMatchModal
    // ================================================================
    const LeagueMatchModal = ({ match, config, onClose, onSave }) => {
      const isTeam=config.matchType==='team';
      const tf=TEAM_FORMATS.find(f=>f.id===config.teamFormat);
      const nm=tf?.matches||3; const nr=config.teamRounds||1;
      const isSets = isSetsGame(config.sport);
      const totalSets = config.sets || 3;
      const winSets = Math.ceil(totalSets / 2);
      // 문자열로 보관 → 사용자가 0을 지우고 새로 입력 가능
      const [s1,setS1]=useState(String(match.scoreHome??0));
      const [s2,setS2]=useState(String(match.scoreAway??0));
      const [sub,setSub]=useState(Array.from({length:nr},()=>Array.from({length:nm},()=>({s1:'0',s2:'0'}))));
      // 세트별 점수 — 세트제 종목용
      const initSets = () => {
        if(match.setScores && match.setScores.length>0){
          // 기존 데이터에서 복원
          return Array.from({length:totalSets},(_,i)=>{
            const s=match.setScores[i];
            return s? {h:String(s.h), a:String(s.a)} : {h:'', a:''};
          });
        }
        return Array.from({length:totalSets},()=>({h:'',a:''}));
      };
      const [setRows, setSetRows] = useState(initSets());
      useEffect(()=>{
        setS1(String(match.scoreHome??0));
        setS2(String(match.scoreAway??0));
        setSetRows(initSets());
      },[match]);

      // 세트 점수에서 자동으로 세트 승수 계산
      const computedFromSets = () => {
        let wh=0, wa=0;
        const valid = [];
        setRows.forEach(r=>{
          const h=parseInt(r.h), a=parseInt(r.a);
          if(isNaN(h)||isNaN(a)) return; // 비어있는 세트 무시
          if(h===a) return; // 무승부 세트 무시
          valid.push({h,a});
          if(h>a) wh++; else wa++;
        });
        return {wh, wa, valid};
      };

      const applyTeam=()=>{
        let w1=0,w2=0;
        sub.forEach(r=>{let m1=0,m2=0;r.forEach(m=>{const a=parseInt(m.s1)||0,b=parseInt(m.s2)||0;if(a>b)m1++;else if(b>a)m2++;});if(m1>m2)w1++;else if(m2>m1)w2++;});
        setS1(String(w1));setS2(String(w2));
      };
      const handleSave=()=>{
        if(isSets){
          const {wh, wa, valid} = computedFromSets();
          if(valid.length===0){alert('최소 한 세트 이상의 점수를 입력하세요.');return;}
          if(wh<winSets && wa<winSets){
            if(!window.confirm(`아직 경기가 종료되지 않았습니다.\n현재 ${wh}:${wa} (${winSets}세트 선승)\n그래도 저장하시겠습니까?`))return;
          }
          onSave(match.id, wh, wa, valid);
        } else {
          onSave(match.id, parseInt(s1)||0, parseInt(s2)||0, null);
        }
      };
      const updateSetRow = (idx, side, val) => {
        setSetRows(prev=>{
          const next=[...prev];
          next[idx]={...next[idx],[side]:val};
          return next;
        });
      };

      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] flex items-center justify-center p-2 sm:p-4">
          <div className="bg-white rounded-2xl sm:rounded-[2rem] w-full max-w-2xl shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
            <div className="bg-slate-800 p-4 sm:p-6 text-white text-center shrink-0">
              <p className="text-[10px] sm:text-[12px] font-black text-slate-400 uppercase tracking-widest mb-1">
                League Match {isTeam&&`(${tf?.name})`}
                {isSets&&` · ${totalSets===1?'단판제':`${totalSets}판 ${winSets}선승`}`}
              </p>
              <h3 className="text-lg sm:text-xl font-black italic">점수 입력</h3>
            </div>
            <div className="p-4 sm:p-8 space-y-4 sm:space-y-6 overflow-y-auto custom-scrollbar">
              {isTeam&&(
                <div className="space-y-4 sm:space-y-6 bg-slate-50 p-3 sm:p-6 rounded-xl sm:rounded-2xl border border-slate-100">
                  <div className="flex justify-between items-center">
                    <h4 className="font-black text-slate-900 text-sm sm:text-base italic">Detailed Match Results</h4>
                    <button onClick={applyTeam} className="text-[11px] sm:text-[12px] font-black bg-blue-600 text-white px-2 sm:px-3 py-1 rounded-full hover:bg-blue-700">결과 자동 반영</button>
                  </div>
                  {sub.map((round,ri)=>(
                    <div key={ri} className="space-y-2 sm:space-y-3">
                      {nr>1&&<p className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">Round {ri+1}</p>}
                      {round.map((m,mi)=>(
                        <div key={mi} className="flex items-center gap-2 sm:gap-4 bg-white p-2 sm:p-3 rounded-xl border border-slate-100 shadow-sm">
                          <span className="text-[10px] sm:text-[12px] font-bold text-slate-400 w-10 sm:w-12 shrink-0">M{mi+1}</span>
                          <div className="flex-1 flex items-center justify-between gap-1 sm:gap-2">
                            <span className="text-xs sm:text-sm font-bold text-slate-600 truncate flex-1 min-w-0">{match.home.name}</span>
                            <input type="number" inputMode="numeric" value={m.s1} onFocus={e=>e.target.select()} onChange={e=>{const ns=[...sub];ns[ri][mi].s1=e.target.value;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border rounded p-1 text-sm sm:text-base shrink-0"/>
                            <span className="text-[10px] sm:text-[12px] font-black text-slate-300 italic shrink-0">VS</span>
                            <input type="number" inputMode="numeric" value={m.s2} onFocus={e=>e.target.select()} onChange={e=>{const ns=[...sub];ns[ri][mi].s2=e.target.value;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border rounded p-1 text-sm sm:text-base shrink-0"/>
                            <span className="text-xs sm:text-sm font-bold text-slate-600 truncate flex-1 min-w-0 text-right">{match.away.name}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}

              {isSets ? (
                /* 세트제 점수 입력 — 모바일 최적화 */
                <div className="space-y-3 sm:space-y-4">
                  <div className="grid grid-cols-[1fr_auto_1fr] items-center text-sm sm:text-base font-black text-slate-700 px-1 gap-2">
                    <span className="text-center truncate">{match.home.name}</span>
                    <span className="text-slate-300 text-xs sm:text-sm">vs</span>
                    <span className="text-center truncate">{match.away.name}</span>
                  </div>
                  <div className="space-y-2">
                    {setRows.map((row, idx)=>{
                      const h=parseInt(row.h), a=parseInt(row.a);
                      const valid = !isNaN(h)&&!isNaN(a)&&h!==a;
                      const homeWin = valid && h>a;
                      const awayWin = valid && a>h;
                      return (
                        <div key={idx} className="grid grid-cols-[36px_1fr_16px_1fr] sm:grid-cols-[44px_1fr_24px_1fr] items-center gap-1.5 sm:gap-3 bg-slate-50 p-2 sm:p-3 rounded-xl border border-slate-100">
                          <span className="text-[10px] sm:text-[12px] font-black text-slate-400 uppercase text-center leading-tight">SET<br/>{idx+1}</span>
                          <input type="number" inputMode="numeric" value={row.h} onFocus={e=>e.target.select()}
                            onChange={e=>updateSetRow(idx,'h',e.target.value)}
                            placeholder="0"
                            className={`w-full text-center text-xl sm:text-2xl font-black py-1.5 sm:py-2 border-b-2 outline-none transition-colors min-w-0 ${homeWin?'border-blue-500 text-blue-700 bg-blue-50':'border-slate-200 focus:border-blue-300'}`}/>
                          <span className="text-slate-300 font-black text-center text-sm sm:text-base">:</span>
                          <input type="number" inputMode="numeric" value={row.a} onFocus={e=>e.target.select()}
                            onChange={e=>updateSetRow(idx,'a',e.target.value)}
                            placeholder="0"
                            className={`w-full text-center text-xl sm:text-2xl font-black py-1.5 sm:py-2 border-b-2 outline-none transition-colors min-w-0 ${awayWin?'border-rose-500 text-rose-700 bg-rose-50':'border-slate-200 focus:border-rose-300'}`}/>
                        </div>
                      );
                    })}
                  </div>
                  {/* 합계 표시 */}
                  {(()=>{
                    const {wh, wa} = computedFromSets();
                    const winner = wh>=winSets ? 'home' : wa>=winSets ? 'away' : null;
                    return (
                      <div className="grid grid-cols-[1fr_auto_1fr] items-center bg-slate-900 text-white p-3 sm:p-4 rounded-xl sm:rounded-2xl gap-2">
                        <span className={`text-center font-black text-base sm:text-lg ${winner==='home'?'text-green-400':''}`}>{wh}</span>
                        <span className="text-slate-500 text-[10px] sm:text-xs uppercase font-black whitespace-nowrap px-2">세트 승수</span>
                        <span className={`text-center font-black text-base sm:text-lg ${winner==='away'?'text-green-400':''}`}>{wa}</span>
                      </div>
                    );
                  })()}
                </div>
              ) : (
                /* 일반 점수 입력 (축구/농구 등) */
                <div className="grid grid-cols-[1fr_auto_1fr] items-center gap-3 sm:gap-4">
                  {[{p:match.home,s:s1,setS:setS1},{p:match.away,s:s2,setS:setS2}].map((side,i)=>(
                    <React.Fragment key={i}>
                      {i===0&&(
                        <div className="text-center space-y-2 sm:space-y-3 min-w-0">
                          <div className="text-xs sm:text-sm font-black text-slate-500 truncate uppercase">{side.p.name}</div>
                          <input type="number" inputMode="numeric" value={side.s} onFocus={e=>e.target.select()} onChange={e=>side.setS(e.target.value)} className="w-full text-center text-3xl sm:text-4xl font-black py-3 sm:py-4 border-b-4 border-slate-100 focus:border-blue-500 outline-none"/>
                          <span className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">{isTeam?'Rounds Won':'Score'}</span>
                        </div>
                      )}
                      {i===0&&<div className="text-xl sm:text-2xl font-black text-slate-200">:</div>}
                      {i===1&&(
                        <div className="text-center space-y-2 sm:space-y-3 min-w-0">
                          <div className="text-xs sm:text-sm font-black text-slate-500 truncate uppercase">{side.p.name}</div>
                          <input type="number" inputMode="numeric" value={side.s} onFocus={e=>e.target.select()} onChange={e=>side.setS(e.target.value)} className="w-full text-center text-3xl sm:text-4xl font-black py-3 sm:py-4 border-b-4 border-slate-100 focus:border-blue-500 outline-none"/>
                          <span className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">{isTeam?'Rounds Won':'Score'}</span>
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              )}

              <div className="flex flex-col gap-2 pt-2 sm:pt-4">
                <button onClick={handleSave} className="w-full py-3 sm:py-4 bg-blue-600 text-white rounded-xl sm:rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-100 text-sm sm:text-base">결과 저장</button>
                <div className="flex gap-2">
                  <button onClick={onClose} className="flex-1 py-2.5 sm:py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm sm:text-base">닫기</button>
                  {match.status==='completed'&&<button onClick={()=>onSave(match.id,0,0,null,true)} className="flex-1 py-2.5 sm:py-3 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-100 text-sm sm:text-base">결과 초기화</button>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ================================================================
    //  ParticipantInput — 성별 분리 지원
    // ================================================================
    const ParticipantInput = ({ participants, participantType, onAdd, onRemove, onToggleSeed, onClearAll }) => {
      const [name,setName]=useState('');
      const [gender,setGender]=useState('M'); // 직접 추가 시 성별
      const [showBulk,setShowBulk]=useState(false);
      const [replace,setReplace]=useState(true);
      const [genderFilter,setGenderFilter]=useState('ALL'); // ALL | M | F
      const fileRef=useRef(null);
      const label=participantType==='individual'?'참가자':'팀/단체';
      const seeded=participants.filter(p=>p.isSeeded).length;
      const maleCount=participants.filter(p=>p.gender==='M').length;
      const femaleCount=participants.filter(p=>p.gender==='F').length;
      const noGenderCount=participants.filter(p=>!p.gender).length;
      const showGenderUI=maleCount>0||femaleCount>0; // 성별 데이터 있을 때만 UI 표시

      const handleAdd=()=>{
        if(name.trim()&&participants.length<MAX_PARTICIPANTS){
          onAdd(name.trim(), gender);
          setName('');
        }
      };

      const dlTemplate=()=>{
        const blob=new Blob(['\ufeff이름,시드여부(Y/N),성별(M/F)\n홍길동,Y,M\n김영희,N,F\n이철수,N,M'],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='match_entry_template.csv';a.click();
      };

      const handleFile=e=>{
        const file=e.target.files?.[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{
          const lines=(ev.target?.result||'').split(/\r?\n/);
          const parts=[];
          for(let i=1;i<lines.length;i++){
            if(!lines[i].trim())continue;
            const cols=lines[i].split(',');
            const n=cols[0]?.trim();
            const s=cols[1]?.trim().toUpperCase();
            const g=cols[2]?.trim().toUpperCase();
            if(n) parts.push({name:n, isSeeded:s==='Y', gender:(g==='M'||g==='F')?g:null});
          }
          if(parts.length>0){
            if(replace)onClearAll();
            parts.forEach(p=>onAdd(p.name, p.gender, p.isSeeded));
            setShowBulk(false);
          }
        };
        reader.readAsText(file);
        if(fileRef.current)fileRef.current.value='';
      };

      const filteredParticipants = genderFilter==='ALL'
        ? participants
        : participants.filter(p=>(genderFilter==='M'?p.gender==='M':p.gender==='F')||(!p.gender&&genderFilter==='ALL'));

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
            <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
              <span className="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-base font-bold">2</span>
              {label} 등록 ({participants.length}/{MAX_PARTICIPANTS})
              {showGenderUI&&<span className="text-sm font-bold text-slate-400">남 {maleCount} / 여 {femaleCount}{noGenderCount>0?` / 미분류 ${noGenderCount}`:''}</span>}
            </h3>
            <div className="flex flex-wrap gap-2">
              {participants.length>0&&<button onClick={onClearAll} className="text-[13px] font-black text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 border border-red-200">🗑️ 초기화</button>}
              <button onClick={()=>setShowBulk(true)} className="text-[13px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg hover:bg-blue-100 border border-blue-100">📥 일괄 등록</button>
              {participantType!=='doubles'&&<span className="text-[12px] font-black text-amber-600 bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100">시드: {seeded}</span>}
            </div>
          </div>

          {/* 직접 추가 — 이름 + 성별 */}
          <div className="flex gap-2 mb-4">
            <input type="text" value={name} onChange={e=>setName(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.nativeEvent.isComposing)handleAdd();}}
              placeholder={`${label} 이름 입력`}
              className="flex-1 px-4 py-3 border-2 border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-medium"/>
            <div className="flex rounded-xl border-2 border-slate-100 overflow-hidden">
              <button onClick={()=>setGender('M')} className={`px-4 py-3 font-black text-base transition-all ${gender==='M'?'bg-blue-600 text-white':'bg-slate-50 text-slate-400 hover:bg-blue-50'}`}>남</button>
              <button onClick={()=>setGender('F')} className={`px-4 py-3 font-black text-base transition-all ${gender==='F'?'bg-rose-500 text-white':'bg-slate-50 text-slate-400 hover:bg-rose-50'}`}>여</button>
            </div>
            <button onClick={handleAdd} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-base hover:bg-slate-800 shadow-lg shadow-slate-200">추가</button>
          </div>

          {/* 성별 필터 탭 — 성별 데이터 있을 때만 표시 */}
          {showGenderUI&&(
            <div className="flex gap-2 mb-4">
              {[{k:'ALL',l:`전체 (${participants.length})`,c:'slate'},{k:'M',l:`남자 (${maleCount})`,c:'blue'},{k:'F',l:`여자 (${femaleCount})`,c:'rose'}].map(({k,l,c})=>(
                <button key={k} onClick={()=>setGenderFilter(k)}
                  className={`px-4 py-2 rounded-xl text-sm font-black transition-all ${genderFilter===k?`bg-${c}-600 text-white shadow-md`:`bg-${c}-50 text-${c}-600 border border-${c}-100`}`}>
                  {l}
                </button>
              ))}
            </div>
          )}

          {/* 참가자 목록 */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
            {filteredParticipants.map(p=>(
              <div key={p.id} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${p.isSeeded&&participantType!=='doubles'?'bg-amber-50 border-amber-200 shadow-sm':'bg-white border-slate-100'}`}>
                <div className="flex items-center gap-3 overflow-hidden">

                      <span className="text-sm leading-none">{p.isSeeded?'👑':'⭐'}</span>
                      {p.isSeeded&&<span className="text-[12px] font-black">{p.seedRank}</span>}

                  ):<div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">👤</div>}
                  <div className="flex flex-col">
                    <div className="flex items-center gap-1.5">
                      {p.gender&&<span className={`text-[11px] font-black px-1.5 py-0.5 rounded ${p.gender==='M'?'bg-blue-100 text-blue-700':'bg-rose-100 text-rose-700'}`}>{p.gender==='M'?'남':'여'}</span>}
                      <span className={`font-bold truncate max-w-[90px] ${p.isSeeded&&participantType!=='doubles'?'text-amber-900':'text-slate-700'}`}>{p.name}</span>
                    </div>
                    {p.isSeeded&&participantType!=='doubles'&&<span className="text-[11px] text-amber-600 font-bold uppercase">Seed #{p.seedRank}</span>}

                </div>
                <button onClick={()=>onRemove(p.id)} className="text-slate-300 hover:text-red-500 p-1 flex-shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414-1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/></svg>
                </button>
              </div>
            ))}
          </div>

          {participants.length===0&&(
            <div className="text-center py-12 space-y-4 bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-100">
              <p className="text-slate-400 italic text-base">명단을 입력하거나 일괄 등록을 이용하세요.</p>
              <button onClick={()=>setShowBulk(true)} className="px-6 py-3 bg-white text-blue-600 rounded-xl font-bold text-base hover:shadow-md border border-blue-100">엑셀/CSV 파일 등록</button>
            </div>
          )}

          {/* 일괄 등록 모달 */}
          {showBulk&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden border border-slate-200">
                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                  <h3 className="font-black italic uppercase tracking-wider">Bulk Entry</h3>
                  <button onClick={()=>setShowBulk(false)} className="text-slate-400 hover:text-white p-2">✕</button>
                </div>
                <div className="p-8 space-y-6">
                  <div className="bg-blue-50 rounded-2xl p-4 border border-blue-100">
                    <p className="text-sm font-black text-blue-700 mb-2">📋 CSV 양식 컬럼</p>
                    <p className="text-sm font-mono text-blue-600">이름, 시드여부(Y/N), 성별(M/F)</p>
                    <p className="text-[12px] text-blue-400 mt-1">※ 성별 컬럼 생략 시 미분류로 등록</p>
                  </div>
                  <button onClick={dlTemplate} className="w-full py-4 bg-slate-50 text-slate-700 border border-slate-200 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-100">📄 양식 파일(CSV) 다운로드</button>
                  <label className="flex items-center gap-3 cursor-pointer bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <input type="checkbox" checked={replace} onChange={e=>setReplace(e.target.checked)} className="w-5 h-5"/>
                    <div>
                      <span className="text-base font-black text-slate-700">기존 명단 삭제 후 새로 등록하기</span>
                      <p className="text-[12px] text-slate-400 font-medium italic mt-0.5">체크 시 현재 등록된 {participants.length}개의 명단이 삭제됩니다.</p>

                  <div className="border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center space-y-4 hover:border-blue-400 transition-all bg-slate-50/50">

                    <button onClick={()=>fileRef.current?.click()} className="text-blue-600 font-black hover:underline">내 컴퓨터에서 파일 찾기</button>
                  </div>
