    // ================================================================
    //  DoublesPairingView
    // ================================================================
    const DoublesPairingView = ({ participants, onComplete, onBack }) => {
      const [mode,setMode]=useState('selection');
      const [unassigned,setUnassigned]=useState([...participants]);
      const [paired,setPaired]=useState([]);
      const [sel,setSel]=useState(null);
      useEffect(()=>{setUnassigned([...participants]);setPaired([]);},[participants]);
      const handleManual=p=>{
        if(!sel){setSel(p);}
        else if(sel.id===p.id){setSel(null);}
        else{
          const team={id:`team-${sel.id}-${p.id}`,name:`${sel.name}/${p.name}`,isSeeded:false};
          setPaired(prev=>[...prev,team]);setUnassigned(prev=>prev.filter(x=>x.id!==sel.id&&x.id!==p.id));setSel(null);
        }
      };
      const autoRandom=()=>{
        const pool=[...participants].sort(()=>Math.random()-0.5);const teams=[];
        for(let i=0;i<pool.length;i+=2){ if(pool[i+1]) teams.push({id:`team-${pool[i].id}-${pool[i+1].id}`,name:`${pool[i].name}/${pool[i+1].name}`,isSeeded:false}); else teams.push({...pool[i],name:`${pool[i].name} (1인)`}); }
        onComplete(teams);
      };
      if(mode==='selection') return (
        <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl text-center space-y-12 max-w-2xl mx-auto">
          <h3 className="text-3xl font-black text-slate-900 italic tracking-tight">Team Pairing.</h3>
          <p className="text-slate-500 font-medium italic">복식 팀을 어떻게 구성할까요?</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onClick={()=>setMode('manual')} className="p-8 border-2 border-slate-100 rounded-3xl hover:border-blue-500 hover:bg-blue-50 text-left"><h4 className="font-black text-xl text-slate-800">✍️ 직접 페어링</h4><p className="text-base text-slate-400 mt-1">원하는 사람끼리 한 팀으로 묶습니다.</p></button>
            <button onClick={autoRandom} className="p-8 border-2 border-slate-100 rounded-3xl hover:border-amber-500 hover:bg-amber-50 text-left"><h4 className="font-black text-xl text-slate-800">🎲 완전 랜덤 페어링</h4><p className="text-base text-slate-400 mt-1">시스템이 무작위로 팀을 짝짓습니다.</p></button>
          </div>
          <button onClick={onBack} className="text-slate-400 font-bold hover:underline">이전 단계로</button>
        </div>
      );
      return (
        <div className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl space-y-8 flex flex-col min-h-[600px] animate-fade-in">
          <div className="flex justify-between items-center border-b pb-4">
            <h3 className="text-2xl font-black text-slate-900 italic">Manual Pairing.</h3>
            <button onClick={()=>setMode('selection')} className="text-sm font-black text-blue-500 uppercase">모드 변경</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 flex-1">
            <div className="space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">대기자 ({unassigned.length})</label>
              <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {unassigned.map(p=><button key={p.id} onClick={()=>handleManual(p)} className={`w-full p-4 rounded-xl border-2 transition-all text-left font-bold ${sel?.id===p.id?'border-blue-500 bg-blue-50 scale-[1.02] shadow-md':'border-slate-100 bg-slate-50'}`}>{p.name}</button>)}
              </div>
            </div>
            <div className="md:col-span-2 space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">구성된 팀 ({paired.length})</label>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {paired.map(t=>(
                  <div key={t.id} className={`flex items-center justify-between p-4 border-2 rounded-2xl ${t.isSeeded?'bg-amber-50 border-amber-300':'bg-white border-slate-100'}`}>
                    <div className="flex items-center gap-3">
                      <button onClick={()=>setPaired(prev=>prev.map(x=>x.id===t.id?{...x,isSeeded:!x.isSeeded,seedRank:!x.isSeeded?prev.filter(p=>p.isSeeded).length+1:undefined}:x))} className={`w-8 h-8 rounded-full text-sm ${t.isSeeded?'bg-amber-500 text-white':'bg-slate-100 text-slate-400'}`}>{t.isSeeded?'👑':'⭐'}</button>
                      <span className="font-black text-slate-800 text-base truncate max-w-[120px]">{t.name}</span>
                    </div>
                    <button onClick={()=>{
                      const ids=t.id.replace('team-','').split('-');
                      const p1=participants.find(x=>x.id===ids[0]),p2=participants.find(x=>x.id===ids[1]);
                      if(p1)setUnassigned(prev=>[...prev,p1]);if(p2)setUnassigned(prev=>[...prev,p2]);
                      setPaired(prev=>prev.filter(x=>x.id!==t.id));
                    }} className="text-slate-300 hover:text-red-500">✕</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="flex gap-4 pt-4 border-t">
            <button onClick={onBack} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">이전</button>
            <button onClick={()=>onComplete([...paired,...unassigned.map(p=>({...p,name:`${p.name} (1인)`}))])} disabled={paired.length===0}
              className={`flex-[2] py-4 rounded-2xl font-black text-xl shadow-lg ${paired.length>0?'bg-blue-600 text-white':'bg-slate-100 text-slate-300'}`}>팀 구성 완료</button>
          </div>
        </div>
      );
    };

    // ================================================================
    //  TeamGroupingView
    // ================================================================
    const TeamGroupingView = ({ participants, onComplete, onBack }) => {
      const [unassigned,setUnassigned]=useState([...participants]);
      const [teams,setTeams]=useState([]);
      const [selMembers,setSelMembers]=useState([]);
      const [teamName,setTeamName]=useState('');
      useEffect(()=>{setUnassigned([...participants]);setTeams([]);},[participants]);
      const toggleMember=p=>{setSelMembers(prev=>prev.find(m=>m.id===p.id)?prev.filter(m=>m.id!==p.id):[...prev,p]);};
      const createTeam=()=>{
        if(selMembers.length===0)return;
        const name=teamName.trim()||selMembers.map(m=>m.name).join(', ');
        const t={id:`team-${Math.random().toString(36).substr(2,9)}`,name,members:[...selMembers],isSeeded:false};
        setTeams(prev=>[...prev,t]);setUnassigned(prev=>prev.filter(p=>!selMembers.find(m=>m.id===p.id)));setSelMembers([]);setTeamName('');
      };
      const removeTeam=id=>{const t=teams.find(x=>x.id===id);if(t){setUnassigned(prev=>[...prev,...t.members]);setTeams(prev=>prev.filter(x=>x.id!==id));}};
      const autoGroup=()=>{
        const pool=[...unassigned].sort(()=>Math.random()-0.5);const nt=[...teams];
        while(pool.length>0){const mem=pool.splice(0,3);nt.push({id:`team-${Math.random().toString(36).substr(2,9)}`,name:mem.map(m=>m.name).join(', '),members:mem,isSeeded:false});}
        setTeams(nt);setUnassigned([]);
      };
      return (
        <div className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl space-y-8 flex flex-col min-h-[600px] animate-fade-in">
          <div className="flex justify-between items-center border-b pb-4">
            <h3 className="text-2xl font-black text-slate-900 italic">Team Grouping.</h3>
            <button onClick={autoGroup} className="text-sm font-black text-amber-500 uppercase hover:underline">자동 팀 구성</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 flex-1">
            <div className="space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">대기자 ({unassigned.length})</label>
              <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {unassigned.map(p=><button key={p.id} onClick={()=>toggleMember(p)} className={`w-full p-4 rounded-xl border-2 transition-all text-left font-bold ${selMembers.find(m=>m.id===p.id)?'border-blue-500 bg-blue-50 scale-[1.02] shadow-md':'border-slate-100 bg-slate-50'}`}>{p.name}</button>)}
              </div>
              {selMembers.length>0&&(
                <div className="pt-4 space-y-2">
                  <input type="text" value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="팀 이름 (선택사항)" className="w-full p-3 border-2 border-slate-100 rounded-xl font-bold text-base outline-none focus:border-blue-500"/>
                  <button onClick={createTeam} className="w-full py-3 bg-blue-600 text-white rounded-xl font-black text-base shadow-md">팀 생성 ({selMembers.length}명)</button>
                </div>
              )}
            </div>
            <div className="md:col-span-2 space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">구성된 팀 ({teams.length})</label>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {teams.map(t=>(
                  <div key={t.id} className={`flex flex-col p-4 border-2 rounded-2xl ${t.isSeeded?'bg-amber-50 border-amber-300':'bg-white border-slate-100'}`}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-3">
                        <button onClick={()=>setTeams(prev=>{const target=prev.find(x=>x.id===t.id);if(!target)return prev;const ns=!target.isSeeded;return prev.map(x=>x.id===t.id?{...x,isSeeded:ns,seedRank:ns?prev.filter(p=>p.isSeeded).length+1:undefined}:x);})} className={`w-8 h-8 rounded-full text-sm ${t.isSeeded?'bg-amber-500 text-white':'bg-slate-100 text-slate-400'}`}>{t.isSeeded?'👑':'⭐'}</button>
                        <span className="font-black text-slate-800 text-base truncate max-w-[120px]">{t.name}</span>
                      </div>
                      <button onClick={()=>removeTeam(t.id)} className="text-slate-300 hover:text-red-500">✕</button>
                    </div>
                    <div className="flex flex-wrap gap-1">{t.members.map(m=><span key={m.id} className="text-[11px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold">{m.name}</span>)}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="flex gap-4 pt-4 border-t">
            <button onClick={onBack} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">이전</button>
            <button onClick={()=>onComplete(teams.map(t=>({id:t.id,name:t.name,isSeeded:t.isSeeded,seedRank:t.seedRank})))} disabled={teams.length<2}
              className={`flex-[2] py-4 rounded-2xl font-black text-xl shadow-lg ${teams.length>=2?'bg-blue-600 text-white':'bg-slate-100 text-slate-300'}`}>팀 구성 완료</button>
          </div>
        </div>
      );
    };

    // ================================================================
    //  TeamFormatView
    // ================================================================
    const TeamFormatView = ({ selectedFormat, selectedRounds, onSelectFormat, onSelectRounds, onComplete, onBack }) => (
      <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl space-y-12 max-w-2xl mx-auto animate-fade-in">
        <div className="text-center space-y-4">
          <h3 className="text-3xl font-black text-slate-900 italic tracking-tight">Match Format.</h3>
          <p className="text-slate-500 font-medium italic">단체전 경기 방식을 결정하세요.</p>
        </div>
        <div className="space-y-8">
          <div className="space-y-4">
            <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">1. 세부 경기 구성</label>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {TEAM_FORMATS.map(f=><button key={f.id} onClick={()=>onSelectFormat(f.id)} className={`p-5 rounded-2xl border-2 text-left transition-all ${selectedFormat===f.id?'border-blue-500 bg-blue-50':'border-slate-100 hover:border-blue-200'}`}><p className="font-black text-lg text-slate-800">{f.name}</p><p className="text-sm text-slate-400 mt-1">{f.matches}경기 중 다승제</p></button>)}
            </div>
          </div>
          <div className="space-y-4">
            <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">2. 라운드 수 (승리 조건)</label>
            <div className="grid grid-cols-2 gap-4">
              {[{r:1,label:'1 라운드',sub:'단판 승부'},{r:3,label:'3 라운드',sub:'3판 2선승제'}].map(({r,label,sub})=>
                <button key={r} onClick={()=>onSelectRounds(r)} className={`p-6 rounded-2xl border-2 text-center transition-all ${selectedRounds===r?'border-blue-500 bg-blue-50':'border-slate-100 hover:border-blue-200'}`}><p className="font-black text-xl text-slate-800">{label}</p><p className="text-sm text-slate-400 mt-1">{sub}</p></button>
              )}
            </div>
          </div>
        </div>
        <div className="flex gap-4 pt-8 border-t">
          <button onClick={onBack} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">이전</button>
          <button onClick={onComplete} disabled={!selectedFormat||!selectedRounds} className={`flex-[2] py-4 rounded-2xl font-black text-xl shadow-lg ${selectedFormat&&selectedRounds?'bg-blue-600 text-white':'bg-slate-100 text-slate-300'}`}>설정 완료</button>
        </div>
      </div>
    );

    // ================================================================
    //  GroupSetupSelectionView
    // ================================================================
    const GroupSetupSelectionView = ({ participants, onBack, onComplete }) => {
      const [mode,setMode]=useState('selection');
      const [gc,setGc]=useState(participants.length>=16?4:2);
      const [mg,setMg]=useState([]);
      const [unassigned,setUnassigned]=useState([...participants]);
      const [checked,setChecked]=useState(new Set());
      useEffect(()=>{setMg(Array.from({length:gc},()=>[]));setUnassigned([...participants]);setChecked(new Set());},[gc,participants]);
      const toggleCheck=id=>{const n=new Set(checked);n.has(id)?n.delete(id):n.add(id);setChecked(n);};
      const moveToGroup=gi=>{
        if(checked.size===0)return;
        const sel=unassigned.filter(p=>checked.has(p.id));
        setMg(prev=>{const n=[...prev];n[gi]=[...n[gi],...sel];return n;});
        setUnassigned(prev=>prev.filter(p=>!checked.has(p.id)));setChecked(new Set());
      };
      const removeFromGroup=(p,gi)=>{setMg(prev=>{const n=[...prev];n[gi]=n[gi].filter(x=>x.id!==p.id);return n;});setUnassigned(prev=>[...prev,p]);};
      const generate=(type)=>{
        const groups=Array.from({length:gc},(_,i)=>({id:`g${i}`,name:`${String.fromCharCode(65+i)}조`,participants:[],rounds:[]}));
        let pool=[...participants];
        if(type==='seed'){const s=pool.filter(p=>p.isSeeded).sort((a,b)=>(a.seedRank||99)-(b.seedRank||99));const u=pool.filter(p=>!p.isSeeded).sort(()=>Math.random()-0.5);pool=[...s,...u];}
        else pool.sort(()=>Math.random()-0.5);
        pool.forEach((p,i)=>groups[i%gc].participants.push(p));
        onComplete(groups);
      };
      if(mode==='selection') return (
        <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl text-center space-y-12 max-w-2xl mx-auto animate-fade-in">
          <h3 className="text-3xl font-black text-slate-900 italic tracking-tight">Group Distribution.</h3>
          <div className="grid grid-cols-1 gap-4">
            <button onClick={()=>setMode('auto')} className="p-8 border-2 border-slate-100 rounded-3xl hover:border-blue-500 hover:bg-blue-50 text-left transition-all"><h4 className="font-black text-xl text-slate-800">🎲 자동 편성</h4><p className="text-base text-slate-400 mt-1">시드 선수 분산 또는 완전 랜덤 배정</p></button>
            <button onClick={()=>setMode('manual')} className="p-8 border-2 border-slate-100 rounded-3xl hover:border-amber-500 hover:bg-amber-50 text-left transition-all"><h4 className="font-black text-xl text-slate-800">✍️ 수동 편성</h4><p className="text-base text-slate-400 mt-1">사용자가 직접 팀별로 조를 지정합니다.</p></button>
          </div>
          <button onClick={onBack} className="text-slate-400 font-bold hover:underline">이전 단계로</button>
        </div>
      );
      if(mode==='manual') return (
        <div className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl space-y-8 animate-fade-in flex flex-col min-h-[600px]">
          <div className="flex justify-between items-center border-b pb-4">
            <h3 className="text-2xl font-black text-slate-900 italic">Manual Grouping.</h3>
            <div className="flex items-center gap-4 bg-slate-100 px-4 py-2 rounded-2xl">
              <span className="text-[12px] font-black text-slate-400 uppercase">조 개수:</span>
              <button onClick={()=>setGc(Math.max(2,gc-1))} className="w-8 h-8 rounded-full bg-white text-slate-900 font-black shadow-sm border border-slate-200">-</button>
              <span className="font-black text-slate-900 text-lg">{gc}</span>
              <button onClick={()=>setGc(Math.min(16,gc+1))} className="w-8 h-8 rounded-full bg-white text-slate-900 font-black shadow-sm border border-slate-200">+</button>
            </div>
          </div>
          <div className="flex flex-wrap gap-2 py-2">
            <span className="text-[12px] font-black text-slate-400 uppercase w-full mb-1">선택 이동 ({checked.size}명 선택됨)</span>
            {mg.map((_,i)=><button key={i} onClick={()=>moveToGroup(i)} disabled={checked.size===0} className={`px-3 py-1.5 text-[12px] font-black rounded-lg border ${checked.size>0?'bg-blue-600 text-white border-blue-600 hover:bg-blue-700':'bg-slate-100 text-slate-300 border-slate-200 cursor-not-allowed'}`}>{String.fromCharCode(65+i)}조 선택 이동</button>)}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 flex-1 overflow-hidden">
            <div className="space-y-4">
              <div className="flex justify-between">
                <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">대기 명단 ({unassigned.length})</label>
                <button onClick={()=>checked.size===unassigned.length&&unassigned.length>0?setChecked(new Set()):setChecked(new Set(unassigned.map(p=>p.id)))} className="text-[11px] font-black text-blue-500 hover:underline">{checked.size===unassigned.length&&unassigned.length>0?'전체 해제':'전체 선택'}</button>
              </div>
              <div className="grid grid-cols-1 gap-2 overflow-y-auto max-h-[400px] pr-2 custom-scrollbar">
                {unassigned.map(p=>(
                  <div key={p.id} onClick={()=>toggleCheck(p.id)} className={`flex items-center gap-3 w-full p-3 rounded-xl border-2 cursor-pointer ${checked.has(p.id)?'border-blue-500 bg-blue-50':'border-slate-100 bg-slate-50'}`}>
                    <input type="checkbox" checked={checked.has(p.id)} onChange={()=>{}} className="w-4 h-4 rounded"/>
                    {p.gender&&<span className={`text-[11px] font-black px-1.5 py-0.5 rounded shrink-0 ${p.gender==='M'?'bg-blue-100 text-blue-700':'bg-rose-100 text-rose-700'}`}>{p.gender==='M'?'남':'여'}</span>}
                    <span className="font-bold text-base text-slate-700">{p.name}</span>
                    {p.isSeeded&&<span className="text-[11px] bg-amber-100 text-amber-700 px-1 py-0.5 rounded font-black ml-auto shrink-0">S{p.seedRank}</span>}
                  </div>
                ))}
                {unassigned.length===0&&<div className="text-center py-10 text-slate-300 text-sm font-bold italic">모두 배정되었습니다.</div>}
              </div>
            </div>
            <div className="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4 overflow-y-auto max-h-[500px] pr-2 custom-scrollbar">
              {mg.map((g,i)=>(
                <div key={i} className="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4">
                  <div className="flex items-center justify-between border-b mb-3 pb-1">
                    <h4 className="font-black text-slate-800 text-sm">{String.fromCharCode(65+i)}조 ({g.length})</h4>
                    {g.length>0&&<span className="text-[11px] text-slate-400 font-bold">
                      남{g.filter(p=>p.gender==='M').length} / 여{g.filter(p=>p.gender==='F').length}
                    </span>}
                  </div>
                  <div className="space-y-1">
                    {g.map(p=>(
                      <div key={p.id} className="flex justify-between items-center bg-white p-2 rounded-lg text-sm font-bold border border-slate-100">
                        <div className="flex items-center gap-1.5">
                          {p.gender&&<span className={`text-[10px] font-black px-1 py-0.5 rounded shrink-0 ${p.gender==='M'?'bg-blue-100 text-blue-700':'bg-rose-100 text-rose-700'}`}>{p.gender==='M'?'남':'여'}</span>}
                          <span className="text-slate-700">{p.name}</span>
                          {p.isSeeded&&<span className="text-[10px] bg-amber-100 text-amber-600 px-1 py-0.5 rounded font-black">S{p.seedRank}</span>}
                        </div>
                        <button onClick={()=>removeFromGroup(p,i)} className="text-slate-300 hover:text-red-500 shrink-0">✕</button>
                      </div>
                    ))}
                    {g.length===0&&<div className="text-center py-4 text-slate-200 text-[12px] font-bold italic">배정된 팀 없음</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="flex gap-4 pt-4 border-t">
            <button onClick={()=>setMode('selection')} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">뒤로</button>
            <button onClick={()=>onComplete(mg.map((ps,i)=>({id:`g${i}`,name:`${String.fromCharCode(65+i)}조`,participants:ps,rounds:[]})))} disabled={unassigned.length>0}
              className={`flex-[2] py-4 rounded-2xl font-black text-xl shadow-lg ${unassigned.length===0?'bg-blue-600 text-white shadow-blue-100':'bg-slate-100 text-slate-300'}`}>대진표 생성하기</button>
          </div>
        </div>
      );
      return (
        <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl text-center space-y-12 max-w-xl mx-auto animate-fade-in">
          <h3 className="text-3xl font-black text-slate-900 italic">Auto Distribution.</h3>
          <div className="flex flex-col items-center gap-4">
            <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">조 개수 선택</label>
            <div className="flex items-center gap-6 bg-slate-100 px-6 py-4 rounded-[2rem]">
              <button onClick={()=>setGc(Math.max(2,gc-1))} className="w-12 h-12 rounded-full bg-white font-black shadow-md border border-slate-200 text-xl">-</button>
              <span className="font-black text-slate-900 text-3xl">{gc}</span>
              <button onClick={()=>setGc(Math.min(16,gc+1))} className="w-12 h-12 rounded-full bg-white font-black shadow-md border border-slate-200 text-xl">+</button>
            </div>
          </div>
          <div className="grid grid-cols-1 gap-3">
            <button onClick={()=>generate('seed')} className="py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg hover:bg-blue-700">⚖️ 시드 선수 분산 배정</button>
            <button onClick={()=>generate('random')} className="py-5 bg-amber-500 text-white rounded-2xl font-black text-lg shadow-lg hover:bg-amber-600">🎲 완전 랜덤 배정</button>
          </div>
          <button onClick={()=>setMode('selection')} className="text-slate-400 font-bold hover:underline">선택 모드로</button>
        </div>
      );
    };

    // ================================================================
    //  ScoreboardView — 코트 태블릿 스코어보드
    // ================================================================
    const ScoreboardView = ({ match, config, tournamentId, groupId, onSaved, onClose }) => {
      const sm = isSetsGame(config?.sport);
      const tn = isTennis(config?.sport);
      const totalSets = config?.sets || 3;
      const winSets   = Math.ceil(totalSets / 2);

      // 🎾 테니스 설정
      const tennisSettings = {
        gamesPerSet: config?.tennisGamesPerSet || 6,
        deuce: !!config?.tennisDeuce,
        tiebreak: config?.tennisTiebreak !== false,
        // 마지막 세트 매치 타이브레이크는 동적으로 계산 (현재 세트가 마지막일 때)
        finalMatchTb: config?.tennisFinalMatchTb !== false
      };

      const [curSet,  setCurSet]  = useState(1);
      const [scoreA,  setScoreA]  = useState(0); // 현재 세트 점수 (논리적 A = match.home)
      const [scoreB,  setScoreB]  = useState(0); // 논리적 B = match.away
      const [history, setHistory] = useState([]); // [{a,b}] 완료된 세트
      const [saving,  setSaving]  = useState(false);
      const [done,    setDone]    = useState(false);
      const [courtSwapped, setCourtSwapped] = useState(false); // 좌우 자리 교체 (표시만)

      // 🎾 테니스 전용 상태
      const [tnState, setTnState] = useState(()=>initTennisState());

      const wonA = tn ? tnState.sA : history.filter(s=>s.a>s.b).length;
      const wonB = tn ? tnState.sB : history.filter(s=>s.b>s.a).length;
      const matchOver = wonA>=winSets || wonB>=winSets;
      const nameA = match?.home?.name || match?.participant1?.name || '홈';
      const nameB = match?.away?.name || match?.participant2?.name || '원정';

      // 화면 좌/우 표시 — courtSwapped 일 때 자리 바뀜 (점수도 따라감)
      const leftName  = courtSwapped ? nameB  : nameA;
      const rightName = courtSwapped ? nameA  : nameB;
      const leftScore = courtSwapped ? scoreB : scoreA;
      const rightScore= courtSwapped ? scoreA : scoreB;
      const leftWon   = courtSwapped ? wonB   : wonA;
      const rightWon  = courtSwapped ? wonA   : wonB;

      // 🎾 테니스용 좌/우 값
      const tnLeftSets    = courtSwapped ? tnState.sB : tnState.sA;
      const tnRightSets   = courtSwapped ? tnState.sA : tnState.sB;
      const tnLeftGames   = courtSwapped ? tnState.gB : tnState.gA;
      const tnRightGames  = courtSwapped ? tnState.gA : tnState.gB;
      // 현재 포인트 표시 (15/30/40/AD or 타이브레이크 점수)
      let tnLeftPt = '0', tnRightPt = '0';
      if(tnState.isTiebreak){
        tnLeftPt = String(courtSwapped ? tnState.tbB : tnState.tbA);
        tnRightPt = String(courtSwapped ? tnState.tbA : tnState.tbB);
      } else if(tnState.isDeuce){
        if(tnState.advA){ tnLeftPt = courtSwapped?'40':'AD'; tnRightPt = courtSwapped?'AD':'40'; }
        else if(tnState.advB){ tnLeftPt = courtSwapped?'AD':'40'; tnRightPt = courtSwapped?'40':'AD'; }
        else { tnLeftPt = '40'; tnRightPt = '40'; }
      } else {
        const pA = TENNIS_POINTS[tnState.pA] !== undefined ? TENNIS_POINTS[tnState.pA] : 40;
        const pB = TENNIS_POINTS[tnState.pB] !== undefined ? TENNIS_POINTS[tnState.pB] : 40;
        tnLeftPt = String(courtSwapped ? pB : pA);
        tnRightPt = String(courtSwapped ? pA : pB);
      }

      // 좌/우 클릭 시 어느 쪽 점수가 올라갈지
      const adjLeft  = (delta) => adj(courtSwapped ? 'B' : 'A', delta);
      const adjRight = (delta) => adj(courtSwapped ? 'A' : 'B', delta);

      const adj = (side, delta) => {
        if(matchOver||done) return;
        // 🎾 테니스 분기
        if(tn){
          if(delta > 0){
            // 마지막 세트 매치 타이브레이크 판정
            const totalPlayed = tnState.sA + tnState.sB;
            const isFinalSet = tennisSettings.finalMatchTb && totalPlayed === totalSets - 1 && totalSets > 1;
            // 매치 타이브레이크는 첫 게임부터 타이브레이크 모드
            const cur = {...tnState};
            if(isFinalSet && cur.gA === 0 && cur.gB === 0 && !cur.isTiebreak){
              cur.isTiebreak = true;
              cur.tbA = 0; cur.tbB = 0;
            }
            const settings = {...tennisSettings, isFinalSet};
            const next = tennisScorePoint(cur, settings, side);
            // 세트가 완료됐는지 확인 (sA 또는 sB가 증가했는지)
            if(next.sA > tnState.sA || next.sB > tnState.sB){
              // 세트 종료 — 게임수 히스토리 기록
              const finishedSetGames = {gA: tnState.gA + (side==='A'?1:0), gB: tnState.gB + (side==='B'?1:0)};
              // 실제로는 endGame이 끝나면서 gA/gB가 리셋되기 전 값 필요 → 다른 방식 사용
              // tnState에서 endSet 직전 값을 알 수 없으니, next의 setHistory에 추가
              if(!next.setHistory) next.setHistory = [...(tnState.setHistory||[])];
              else next.setHistory = [...(tnState.setHistory||[]), ...next.setHistory.slice((tnState.setHistory||[]).length)];
              // 직전 게임수 추적 — 마지막 게임 직전 상태 + 1
              const lastA = tnState.gA + (side==='A'? (cur.isDeuce||cur.isTiebreak||cur.pA>=3?1:0) : 0);
              const lastB = tnState.gB + (side==='B'? (cur.isDeuce||cur.isTiebreak||cur.pB>=3?1:0) : 0);
              // 더 안전하게: tennisScorePoint 직전의 gA, gB를 next의 setHistory에 추가
              const sh = [...(tnState.setHistory||[])];
              // 어느 쪽이 세트승했는지로 결정
              if(next.sA > tnState.sA){
                // A가 세트 승 → 마지막 게임 = A 승
                sh.push({gA: cur.gA + 1, gB: cur.gB});
              } else {
                sh.push({gA: cur.gA, gB: cur.gB + 1});
              }
              next.setHistory = sh;
              // 매치 종료 시 firebase 저장
              if(next.sA >= winSets || next.sB >= winSets){
                setTnState(next);
                saveToFirebaseTennis(next, false);
                return;
              }
              // 일반 세트 종료 — 중간 저장
              setTnState(next);
              saveToFirebaseTennis(next, false);
              return;
            }
            setTnState(next);
          } else {
            // -1: 마지막 포인트 취소 (간단 구현 — 포인트 한 단계 되돌리기)
            // 정확한 되돌리기는 복잡하므로 일단 현재 포인트만 -1
            const next = {...tnState};
            if(next.isTiebreak){
              if(side==='A' && next.tbA>0) next.tbA--;
              if(side==='B' && next.tbB>0) next.tbB--;
            } else if(next.isDeuce){
              if(side==='A' && next.advA) next.advA = false;
              else if(side==='B' && next.advB) next.advB = false;
              else if(!next.advA && !next.advB){
                // 듀스 → 30-30 으로 (한 명만 한 단계 내림)
                next.isDeuce = false;
                if(side==='A') next.pA = 2;
                if(side==='B') next.pB = 2;
              }
            } else {
              if(side==='A' && next.pA>0) next.pA--;
              if(side==='B' && next.pB>0) next.pB--;
            }
            setTnState(next);
          }
          return;
        }
        // 일반 종목
        if(side==='A') setScoreA(v=>Math.max(0,v+delta));
        else           setScoreB(v=>Math.max(0,v+delta));
      };

      const endSet = () => {
        if(scoreA===0&&scoreB===0){alert('점수를 먼저 입력하세요.');return;}
        const newHistory=[...history,{a:scoreA,b:scoreB}];
        setHistory(newHistory);
        setScoreA(0); setScoreB(0);
        setCurSet(v=>v+1);
        // 세트 종료 후 Firebase에 중간 저장
        saveToFirebase(newHistory, false);
      };

      // 🎾 테니스 결과 저장 — setHistory의 게임수로 setScores 변환
      const saveToFirebaseTennis = async (state, isFinal) => {
        const sh = state.setHistory || [];
        // setScores 형식 [{h, a}] 로 변환
        const setScoresLike = sh.map(s=>({h: s.gA, a: s.gB}));
        // history 처럼 history-like 사용
        const histLike = sh.map(s=>({a: s.gA, b: s.gB}));
        setHistory(histLike);
        await saveToFirebase(histLike, isFinal);
      };

      const saveToFirebase = async (hist, isFinal) => {
        setSaving(true);
        try {
          const sA=hist.filter(s=>s.a>s.b).length;
          const sB=hist.filter(s=>s.b>s.a).length;
          const isLeague=!!match.home;
          const matchUpdate = isLeague ? {
            [`${match.id}`]: {
              ...match,
              scoreHome: sA, scoreAway: sB,
              setScores: hist.map(s=>({h:s.a,a:s.b})),
              status: isFinal ? 'completed' : 'in_progress'
            }
          } : null;

          // Firebase에서 현재 대회 데이터 가져와서 해당 경기만 업데이트
          const snap = await db.ref('tournaments/'+tournamentId).once('value');
          const data = snap.val();
          if(!data) return;

          if(isLeague){
            // 리그/조별 경기
            let updated = false;
            if(groupId && data.generatedGroups){
              data.generatedGroups = data.generatedGroups.map(g=>{
                if(g.id!==groupId) return g;
                return {...g, rounds: g.rounds.map(r=>({...r, matches: r.matches.map(m=>{
                  if(m.id!==match.id) return m;
                  updated=true;
                  return {...m, scoreHome:sA, scoreAway:sB, setScores:hist.map(s=>({h:s.a,a:s.b})), status:isFinal?'completed':'in_progress'};
                })}))};
              });
              // standings 재계산
              const config2=data.config||{};
              const sm2=isSetsGame(config2.sport);
              data.generatedGroups = data.generatedGroups.map(g=>({
                ...g,
                standings: calculateStandings(g.participants, g.rounds, sm2)
              }));
            } else if(data.generatedLeague){
              data.generatedLeague = data.generatedLeague.map(r=>({...r, matches: r.matches.map(m=>{
                if(m.id!==match.id) return m;
                updated=true;
                return {...m, scoreHome:sA, scoreAway:sB, setScores:hist.map(s=>({h:s.a,a:s.b})), status:isFinal?'completed':'in_progress'};
              })}));
            }
          } else {
            // 토너먼트 경기
            if(data.generatedMatches){
              data.generatedMatches = data.generatedMatches.map(m=>{
                if(m.id!==match.id) return m;
                const winnerId=sA>sB?(m.participant1?.id||''):(m.participant2?.id||'');
                return {...m, score1:sA, score2:sB, setScores:hist.map(s=>({h:s.a,a:s.b})), status:isFinal?'completed':'in_progress', winnerId:isFinal?winnerId:m.winnerId};
              });
            }
          }
          await db.ref('tournaments/'+tournamentId).set(data);
          if(isFinal) { setDone(true); onSaved&&onSaved(); }
        } catch(e){ console.error(e); alert('저장 실패. 다시 시도해주세요.'); }
        setSaving(false);
      };

      const finishMatch = () => {
        if(!matchOver){alert(`경기가 아직 끝나지 않았습니다.\n현재 ${wonA}:${wonB} (${winSets}세트 선승)`);return;}
        if(!window.confirm('경기를 완전히 종료하고 결과를 저장합니까?'))return;
        if(tn) saveToFirebaseTennis(tnState, true);
        else saveToFirebase(history, true);
      };

      const getScoreColor=(isA)=>{
        if(matchOver){return isA?(wonA>wonB?'text-green-400':'text-red-400'):(wonB>wonA?'text-green-400':'text-red-400');}
        return 'text-white';
      };

      if(done) return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center gap-6 p-8 text-white">
          <span className="text-6xl">🏆</span>
          <h2 className="text-3xl font-black text-center">{wonA>wonB?nameA:nameB} 승!</h2>
          <p className="text-slate-400 font-bold text-xl">{wonA} : {wonB} 세트</p>
          <p className="text-slate-500 text-base">결과가 저장됐습니다.</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col select-none" style={{touchAction:'manipulation'}}>
          {/* 상단 — 대회명 + 닫기 (얇게) */}
          <div className="bg-slate-800 px-3 sm:px-6 py-2 flex justify-between items-center shrink-0 gap-2 sm:gap-4">
            <div className="min-w-0 flex items-baseline gap-1.5 sm:gap-3">
              <p className="text-xs sm:text-sm font-black text-slate-300 truncate">{config?.name}</p>
              <p className="text-[10px] sm:text-[12px] font-black text-slate-500 uppercase tracking-widest shrink-0">{sm?`${totalSets===1?'단판':totalSets+'판 '+winSets+'선승'}`:''} {match.court?`· ${match.court}코트`:''}</p>
            </div>
            {onClose&&(
              <button onClick={onClose}
                className="w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-slate-700 hover:bg-slate-600 text-white flex items-center justify-center text-base sm:text-lg active:scale-90 transition-all shrink-0" title="닫기">✕</button>
            )}
          </div>

          {/* 선수명 — 헤더 바로 아래 */}
          <div className="bg-slate-900 grid grid-cols-2 divide-x divide-slate-700 shrink-0 border-b border-slate-800">
            <div className="text-center py-3 sm:py-4">
              <p className="text-white font-black text-xl sm:text-3xl md:text-4xl leading-tight break-all px-2">{leftName}</p>
            </div>
            <div className="text-center py-3 sm:py-4">
              <p className="text-white font-black text-xl sm:text-3xl md:text-4xl leading-tight break-all px-2">{rightName}</p>
            </div>
          </div>

          {/* 메인 — 🎾 테니스 / 일반 세트제 / 비세트제 분기 */}

      const isGroupType = config.tournamentType===TType.GROUP_KNOCKOUT||config.tournamentType===TType.GROUP_LEAGUE;

      // ── 초기 로드 + 실시간 리스너 ──────────────────────
      useEffect(()=>{
        // URL 해시 파싱: #share=abc123  또는  #s=ABCDE1
        const hash = (window.location.hash || '').replace(/^#/, '');
        const [modeRaw, idRaw] = hash.split('=');
        const mode = (modeRaw || '').trim();
        const id   = (idRaw   || '').trim();

        // ── 읽기 전용 공유 링크 — 스냅샷만 적용 (라이브 리스너 X)
        if(mode==='share'&&id){
          fbGetShare(id).then(data=>{
            if(data){
              setCurrentId(data.id);
              setConfig(data.config||{...DEFAULT_CONFIG});
              setParticipants(data.participants||[]);
              setActiveParticipants(data.activeParticipants||[]);
              setGeneratedMatches(data.generatedMatches||[]);
              setGeneratedLeague(data.generatedLeague||[]);
              setGeneratedGroups(data.generatedGroups||[]);
              setView('share');
            }
            setLoading(false);
          }).catch(()=>setLoading(false));
          return;
        }

        // ── Firebase 세션 기반 링크 (#s=ABCDE1) — 스코어보드 모드
        if(mode==='s'&&id){
          fbGetSession(id).then(session=>{
            if(!session){ setLoading(false); return; }
            if(session.type!=='score'){ setLoading(false); return; }
            const tId = session.tournamentId;
            const matchId=session.matchId||'';
            const ref=db.ref('tournaments/'+tId);
            ref.on('value',snap=>{
              const data=snap.val();
              if(data){
                remoteUpdateRef.current=true;
                setConfig(data.config||DEFAULT_CONFIG);
                setCurrentId(tId);
                setGeneratedMatches(data.generatedMatches||[]);
                setGeneratedLeague(data.generatedLeague||[]);
                setGeneratedGroups(data.generatedGroups||[]);
                setActiveParticipants(data.activeParticipants||[]);
                setView('scoreboard');
                if(matchId){
                  const all=[
                    ...(data.generatedMatches||[]),
                    ...(data.generatedLeague||[]).flatMap(r=>r.matches||[]),
                    ...(data.generatedGroups||[]).flatMap(g=>g.rounds.flatMap(r=>r.matches||[]))
                  ];
                  const found=all.find(m=>m.id===matchId);
                  if(found) setScoreboardMatch({...found,tournamentId:tId,
                    groupId:(data.generatedGroups||[]).find(g=>g.rounds.some(r=>r.matches.some(m=>m.id===matchId)))?.id||null});
                }
              }
              setLoading(false);
            },()=>setLoading(false));
          }).catch(()=>setLoading(false));
          return;
        }

        // ── 대시보드 — Firebase가 진실의 원천 (localStorage는 캐시 역할만)
        const ref = db.ref('tournaments');
        ref.on('value', snap=>{
          const fbData = snap.val() || {};
          const list = Object.values(fbData).filter(v=>v&&v.id).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setUserTournaments(list);
          // Firebase가 정상 연결됐으니 localStorage를 Firebase 스냅샷으로 교체
          // (다른 기기에서 삭제한 대회가 좀비로 부활하는 것 방지)
          try { localStorage.setItem(LS_KEY, JSON.stringify(fbData)); } catch(e) {}
          setLoading(false);
        }, err=>{
          console.warn('Firebase 실패, localStorage 사용:', err);
          const lsData = lsGetAll();
          const list = Object.values(lsData).filter(v=>v&&v.id).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setUserTournaments(list);
          setLoading(false);
        });

        // 📁 폴더 로딩 (Firebase 우선, 실패 시 localStorage)
        const foldersRef = db.ref('folders');
        foldersRef.on('value', snap=>{
          const val = snap.val() || {};
          setFolders(val);
          try { localStorage.setItem(LS_FOLDERS_KEY, JSON.stringify(val)); } catch(e) {}
        }, err=>{
          console.warn('Firebase 폴더 로딩 실패:', err);
          setFolders(lsGetFolders());
        });

        // ⭐ 즐겨찾기 로딩 (localStorage 기반 — 기기별 개별 관리)
        setFavorites(lsGetFavorites());

        return ()=>{ ref.off(); foldersRef.off(); };
      },[]);

      // ── 자동 저장 (디바운스 300ms — Firebase는 빠름) ──────
      const buildRecord = useCallback(()=>({
        id: currentId,
        createdAt: userTournaments.find(t=>t.id===currentId)?.createdAt||Date.now(),
        isCompleted: checkIsCompleted(),
        isArchived: userTournaments.find(t=>t.id===currentId)?.isArchived||false,
        config, participants, activeParticipants, generatedMatches, generatedLeague, generatedGroups
      }),[currentId,userTournaments,config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups]);

      const checkIsCompleted=()=>{
        if(config.tournamentType===TType.TOURNAMENT||config.tournamentType===TType.GROUP_KNOCKOUT){
          if(!generatedMatches.length)return false;
          const maxR=Math.max(...generatedMatches.map(m=>m.round));
          return generatedMatches.find(m=>m.round===maxR)?.status==='completed';
        }
        if(config.tournamentType===TType.LEAGUE) return generatedLeague.every(r=>r.matches.every(m=>m.status==='completed'||m.home.id.includes('bye')||m.away.id.includes('bye')));
        if(config.tournamentType===TType.GROUP_LEAGUE) return generatedGroups.every(g=>g.rounds.every(r=>r.matches.every(m=>m.status==='completed'||m.home.id.includes('bye')||m.away.id.includes('bye'))));
        return false;
      };

      useEffect(()=>{
        if(view!=='active'||!currentId)return;
        // Firebase에서 온 업데이트면 auto-save 건너뜀 (덮어쓰기 방지)
        if(remoteUpdateRef.current){ remoteUpdateRef.current=false; return; }
        // 다른 기기/탭에서 이 대회를 삭제했다면 부활시키지 않음
        if(userTournaments.length > 0 && !userTournaments.find(t=>t.id===currentId)) return;
        if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
        saveTimerRef.current=setTimeout(()=>{
          const record=buildRecord();
          setSaving(true);
          fbSave(currentId,record)
            .then(()=>{
              setSaving(false);
              setUserTournaments(prev=>{const i=prev.findIndex(t=>t.id===currentId);if(i>=0){const n=[...prev];n[i]=record;return n;}return prev;});
            })
            .catch(err=>{console.error(err);setSaving(false);});
        },300);
        return()=>{if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
      },[generatedMatches,generatedLeague,generatedGroups,config,participants,activeParticipants]);

      // ── 대회 관리 ────────────────────────────────────
      const activeListenerRef = useRef(null); // 현재 열린 대회 리스너 참조

      const startNew=()=>{
        const id=Math.random().toString(36).substr(2,9);
        const newCfg={...DEFAULT_CONFIG,name:'새 대회'};
        setCurrentId(id);setConfig(newCfg);setParticipants([]);setActiveParticipants([]);
        setGeneratedMatches([]);setGeneratedLeague([]);setGeneratedGroups([]);setStep(1);
        const record={id,createdAt:Date.now(),isCompleted:false,isArchived:false,config:newCfg,participants:[],activeParticipants:[],generatedMatches:[],generatedLeague:[],generatedGroups:[]};
        setUserTournaments(prev=>[record,...prev]);
        fbSave(id,record).catch(console.error);
        setView('setup');
      };

      const loadTournamentData=(record)=>{
        setCurrentId(record.id);setConfig(record.config||{...DEFAULT_CONFIG});setParticipants(record.participants||[]);
        setActiveParticipants(record.activeParticipants||[]);setGeneratedMatches(record.generatedMatches||[]);
        setGeneratedLeague(record.generatedLeague||[]);setGeneratedGroups(record.generatedGroups||[]);
        setView('active');

        // 기존 리스너 해제 후 새 리스너 등록
        if(activeListenerRef.current) activeListenerRef.current.off();
        const ref = db.ref('tournaments/'+record.id);
        activeListenerRef.current = ref;
        ref.on('value', snap=>{
          const data=snap.val();
          if(!data) return;
          remoteUpdateRef.current=true; // auto-save 덮어쓰기 방지
          setGeneratedMatches(data.generatedMatches||[]);
          setGeneratedLeague(data.generatedLeague||[]);
          setGeneratedGroups(data.generatedGroups||[]);
        });
      };

      const handleDelete=(id,e)=>{
        e.stopPropagation();
        if(!window.confirm('이 대회를 영구적으로 삭제하시겠습니까?'))return;
        fbDelete(id)
          .then(()=>{setUserTournaments(prev=>prev.filter(t=>t.id!==id));if(currentId===id){setCurrentId(null);setView('dashboard');}})
          .catch(console.error);
      };

      const toggleArchive=(id,e)=>{
        e.stopPropagation();
        setUserTournaments(prev=>{
          const updated=prev.map(t=>t.id===id?{...t,isArchived:!t.isArchived}:t);
          const record=updated.find(t=>t.id===id);
          if(record) fbSave(id,record).catch(console.error);
          return updated;
        });
      };

      // 📁 폴더 핸들러
      const handleSaveFolder = (folderData) => {
        const id = folderData.id || `f_${Math.random().toString(36).substr(2,9)}`;
        const folder = {
          id,
          name: folderData.name || '새 폴더',
          color: folderData.color || 'blue',
          icon: folderData.icon || '📁',
          order: folderData.order ?? Object.keys(folders).length,
          createdAt: folderData.createdAt || Date.now()
        };
        const newFolders = {...folders, [id]: folder};
        setFolders(newFolders);
        fbSaveFolders(newFolders);
        setEditingFolder(null);
      };

      const handleDeleteFolder = (folderId) => {
        if(!window.confirm('이 폴더를 삭제합니다.\n폴더 안의 대회들은 "전체"로 이동합니다.\n계속하시겠습니까?')) return;
        // 폴더 삭제 + 그 폴더에 속한 대회들의 folderId 제거
        const newFolders = {...folders};
        delete newFolders[folderId];
        setFolders(newFolders);
        fbSaveFolders(newFolders);
        // 대회들의 folderId 제거
        setUserTournaments(prev=>{
          const updated = prev.map(t=>{
            if(t.folderId === folderId){
              const updatedT = {...t, folderId: null};
              fbSave(t.id, updatedT).catch(console.error);
              return updatedT;
            }
            return t;
          });
          return updated;
        });
        if(currentFolderId === folderId) setCurrentFolderId(null);
      };

      // 대회를 폴더로 이동
      const handleMoveTournament = (tournamentId, folderId) => {
        setUserTournaments(prev=>{
          const updated = prev.map(t=>{
            if(t.id === tournamentId){
              const updatedT = {...t, folderId: folderId || null};
              fbSave(t.id, updatedT).catch(console.error);
              return updatedT;
            }
            return t;
          });
          return updated;
        });
        setMoveDialogTour(null);
      };

      // ⭐ 즐겨찾기 토글
      const toggleFavorite = (id, e) => {
        e?.stopPropagation();
        const newFavs = favorites.includes(id)
          ? favorites.filter(f=>f!==id)
          : [...favorites, id];
        setFavorites(newFavs);
        lsSaveFavorites(newFavs);
      };

      // 공유 링크 — Firebase 스냅샷 저장
      const handleShare=(t,e)=>{
        e.stopPropagation();
        fbSaveShare(t)
          .then(shareId=>{const url=`${window.APP_BASE_URL}#share=${shareId}`;navigator.clipboard?.writeText(url).then(()=>alert('공유 링크가 복사되었습니다!')).catch(()=>prompt('링크를 복사하세요:',url));})
          .catch(()=>alert('공유 링크 생성에 실패했습니다.'));
      };
      const handleShareCurrent=()=>{
        const rec={id:currentId||'shared',createdAt:Date.now(),isCompleted:false,config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups};
        fbSaveShare(rec)
          .then(shareId=>{const url=`${window.APP_BASE_URL}#share=${shareId}`;navigator.clipboard?.writeText(url).then(()=>alert('대진표 공유 링크가 복사되었습니다!')).catch(()=>prompt('링크를 복사하세요:',url));})
          .catch(()=>alert('공유 링크 생성에 실패했습니다.'));
      };

      // 📺 스코어보드 — 현재 기기에서 바로 풀스크린 진입 (링크 복사 X)
      const handleScoreboardLink=(matchId)=>{
        // 모든 매치 풀에서 매치 찾기
        const all=[
          ...generatedMatches,
          ...generatedLeague.flatMap(r=>r.matches||[]),
          ...generatedGroups.flatMap(g=>g.rounds.flatMap(r=>r.matches||[]))
        ];
        const found=all.find(m=>m.id===matchId);
        if(!found){alert('경기를 찾을 수 없습니다.');return;}
        const groupId=generatedGroups.find(g=>g.rounds.some(r=>r.matches.some(m=>m.id===matchId)))?.id||null;
        setScoreboardMatch({...found, tournamentId:currentId, groupId});
        setView('scoreboard');
      };

      // ➕ 라운드 추가 — 풀리그/조별 모드에서 사용자가 원할 때 라운드 추가
      // mode: 'shuffle' (셔플 한 라운드) | 'roundrobin' (정석 풀리그 1바퀴 통째)
      const handleAddRound = (groupId=null, mode='shuffle') => {
        // 고유 suffix — ID 충돌 방지
        const uniq = `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;

        // 셔플 한 라운드 생성
        const buildShuffleRound = (existingRounds, participants, prefix) => {
          const nextNum = (existingRounds||[]).length + 1;
          const active = participants.filter(p=>p&&!p.id.startsWith('bye'));
          const shuffled = [...active].sort(()=>Math.random()-0.5);
          const isOdd = shuffled.length % 2 !== 0;
          if(isOdd) shuffled.push({id:`bye-r${nextNum}-${uniq}`,name:'휴식(Bye)',isSeeded:false});
          const matches=[];
          const half = shuffled.length / 2;
          for(let j=0;j<half;j++){
            matches.push({
              id:`l-${prefix}-r${nextNum}-${uniq}-m${j}`,
              home: shuffled[j],
              away: shuffled[shuffled.length-1-j],
              status:'pending'
            });
          }
          return [{ roundNumber: nextNum, matches }];
        };

        // 정석 풀리그 1바퀴 — n-1 라운드 통째 추가
        const buildFullRoundRobin = (existingRounds, participants, prefix) => {
          const active = participants.filter(p=>p&&!p.id.startsWith('bye'));
          const startNum = (existingRounds||[]).length + 1;
          const teams = [...active];
          const isOdd = teams.length % 2 !== 0;
          if(isOdd) teams.push({id:`bye-rr-${uniq}`,name:'휴식(Bye)',isSeeded:false});
          const rounds=[]; const tc=teams.length; const nr=tc-1; const half=tc/2;
          const list=[...teams];
          for(let i=0;i<nr;i++){
            const matches=[];
            const roundNum = startNum + i;
            for(let j=0;j<half;j++){
              matches.push({
                // ID 충돌 방지: uniq + 라운드 + 매치인덱스 + 라운드 순환 인덱스 i
                id:`l-${prefix}-rr${roundNum}-${uniq}-i${i}-m${j}`,
                // 홈/원정 살짝 섞기 위해 라운드별 alternate
                home: i%2===0 ? list[j] : list[tc-1-j],
                away: i%2===0 ? list[tc-1-j] : list[j],
                status:'pending'
              });
            }
            rounds.push({ roundNumber: roundNum, matches });
            // round-robin rotation (circle method)
            list.splice(1,0,list.pop());
          }
          return rounds;
        };

        const builder = mode === 'roundrobin' ? buildFullRoundRobin : buildShuffleRound;

        if(groupId){
          // 조별 모드 — 해당 조에만 라운드 추가
          // ⭐ prev 기반으로 빌드 (race condition 방지)
          setGeneratedGroups(prev=>prev.map(g=>{
            if(g.id!==groupId) return g;
            const newRounds = builder(g.rounds, g.participants, `g${g.id}`);
            return {...g, rounds:[...(g.rounds||[]), ...newRounds]};
          }));
        } else {
          // 풀리그 모드 — prev 기반으로 빌드
          setGeneratedLeague(prev=>{
            const newRounds = builder(prev, activeParticipants, 'league');
            return [...(prev||[]), ...newRounds];
          });
        }
      };

      // 🚫 출결 토글 — 참가자의 absent 상태 변경 (모든 곳 일관 반영)
      const handleToggleAttendance=(pid)=>{
        const flip = (p) => p.id===pid ? {...p, absent: !p.absent} : p;
        // participants (대시보드/명단 원본)
        setParticipants(prev=>prev.map(flip));
        // activeParticipants
        setActiveParticipants(prev=>prev.map(flip));
        // 조별 모드: 각 조의 participants + 매치의 home/away
        setGeneratedGroups(prev=>prev.map(g=>{
          const newP=(g.participants||[]).map(flip);
          const newRounds=(g.rounds||[]).map(r=>({
            ...r,
            matches:(r.matches||[]).map(m=>({
              ...m,
              home: m.home.id===pid?{...m.home,absent:!m.home.absent}:m.home,
              away: m.away.id===pid?{...m.away,absent:!m.away.absent}:m.away
            }))
          }));
          return {...g, participants:newP, rounds:newRounds};
        }));
        // 풀리그 모드: 매치들 갱신
        setGeneratedLeague(prev=>prev.map(r=>({
          ...r,
          matches:(r.matches||[]).map(m=>({
            ...m,
            home: m.home.id===pid?{...m.home,absent:!m.home.absent}:m.home,
            away: m.away.id===pid?{...m.away,absent:!m.away.absent}:m.away
          }))
        })));
      };

      // 대시보드로 나가기 전 즉시 저장 (300ms 디바운스 취소 방지)
      const goToDashboard=()=>{
        if(currentId&&view==='active'){
          if(saveTimerRef.current) clearTimeout(saveTimerRef.current);
          const record={
            id:currentId,
            createdAt:userTournaments.find(t=>t.id===currentId)?.createdAt||Date.now(),
            isCompleted:checkIsCompleted(),
            isArchived:userTournaments.find(t=>t.id===currentId)?.isArchived||false,
            config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups
          };
          fbSave(currentId,record).catch(console.error);
        }
        if(activeListenerRef.current){activeListenerRef.current.off();activeListenerRef.current=null;}
        setCurrentId(null);
        setView('dashboard');
      };

      // 구글 시트로 결과 내보내기
      const handleExportToSheets=()=>{
        const sm=isSetsGame(config.sport);
        const standings=config.tournamentType===TType.LEAGUE
          ?calculateStandings(activeParticipants,generatedLeague,sm):null;
        const rec={config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups,leagueStandings:standings};
        setSaving(true);
        gasCall('exportToSheets',{data:JSON.stringify(rec)})
          .then(r=>{setSaving(false);alert(`✅ 구글 시트에 저장됐습니다!\n시트 이름: "${r.sheetName}"`)})
          .catch(err=>{setSaving(false);console.error(err);alert('내보내기 실패. 다시 시도해주세요.');});
      };

      const downloadCSV=()=>{
        let csv='\ufeff';
        csv+=`대회 리포트: ${config.name}\n종목: ${SPORTS_LIST.find(s=>s.id===config.sport)?.name}, 방식: ${config.tournamentType}\n\n`;
        if(generatedMatches.length>0){
          const maxR=Math.max(...generatedMatches.map(m=>m.round));
          const fin=generatedMatches.find(m=>m.round===maxR);
          if(fin?.status==='completed'){
            const w=fin.winnerId===fin.participant1?.id?fin.participant1?.name:fin.participant2?.name;
            const ru=fin.winnerId===fin.participant1?.id?fin.participant2?.name:fin.participant1?.name;
            csv+=`=== [대회 최종 성적] ===\n우승,${w}\n준우승,${ru}\n\n`;
          }
        }
        if((config.tournamentType===TType.GROUP_LEAGUE||config.tournamentType===TType.GROUP_KNOCKOUT)&&generatedGroups.length>0){
          generatedGroups.forEach(g=>{
            csv+=`=== [${g.name} 결과 및 순위] ===\n순위,팀명,경기수,승,무,패,득점,실점,득실차,승점\n`;
            g.standings?.forEach((s,i)=>csv+=`${i+1},${s.name},${s.played},${s.win},${s.draw},${s.loss},${s.gf},${s.ga},${s.gd},${s.pts}\n`);
            csv+=`\n[${g.name} 상세 경기]\n라운드,홈 팀,어웨이 팀,결과,스코어\n`;
            g.rounds.forEach(r=>r.matches.forEach(m=>{
              if(m.home.id.includes('bye')||m.away.id.includes('bye'))return;
              const res=m.status==='completed'?(m.scoreHome>m.scoreAway?'홈 승':m.scoreHome<m.scoreAway?'어웨이 승':'무승부'):'진행전';
              csv+=`${r.roundNumber},${m.home.name},${m.away.name},${res},${m.status==='completed'?m.scoreHome+':'+m.scoreAway:'-'}\n`;
            }));
            csv+='\n';
          });
        }
        if(config.tournamentType===TType.TOURNAMENT||(config.tournamentType===TType.GROUP_KNOCKOUT&&generatedMatches.length>0)){
          csv+='=== [본선 토너먼트 리포트] ===\n단계,팀1,팀2,승자,스코어\n';
          const maxR=generatedMatches.length>0?Math.max(...generatedMatches.map(m=>m.round)):0;
          for(let r=1;r<=maxR;r++){
            const label=r===maxR?'결승':`${r}라운드`;
            generatedMatches.filter(m=>m.round===r).forEach(m=>{
              const t1=m.participant1?.name||'미정',t2=m.participant2?.name||(m.round===1?'부전승':'미정');
              const w=m.status==='completed'?(m.winnerId===m.participant1?.id?t1:t2):'-';
              csv+=`${label},${t1},${t2},${w},${m.status==='completed'?m.score1+':'+m.score2:'-'}\n`;
            });
          }
        }
        const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${config.name||'match'}_report.csv`;a.click();
      };

      // ── 경기 결과 처리 ──────────────────────────────
      function advanceWinner(matches,cur,winner){
        const nr=cur.round+1,ni=Math.floor(cur.matchIndex/2);
        const pf=config.tournamentType===TType.GROUP_KNOCKOUT?'k':'r';
        const nm=matches.find(m=>m.id===`${pf}${nr}-m${ni}`);
        if(nm){if(cur.matchIndex%2===0)nm.participant1=winner;else nm.participant2=winner;}
      }
      function clearNext(matches,cur){
        const nr=cur.round+1,ni=Math.floor(cur.matchIndex/2);
        const pf=config.tournamentType===TType.GROUP_KNOCKOUT?'k':'r';
        const nm=matches.find(m=>m.id===`${pf}${nr}-m${ni}`);
        if(nm){if(cur.matchIndex%2===0)nm.participant1=null;else nm.participant2=null;nm.status='pending';nm.winnerId=undefined;clearNext(matches,nm);}
      }
      const handleUpdateMatch=(mid,s1,s2,wid,isReset=false)=>{
        setGeneratedMatches(prev=>{
          const updated=[...prev];const idx=updated.findIndex(m=>m.id===mid);if(idx===-1)return prev;
          const cur=updated[idx];
          if(isReset){cur.score1=undefined;cur.score2=undefined;cur.winnerId=undefined;cur.status='pending';clearNext(updated,cur);}
          else{cur.score1=s1;cur.score2=s2;cur.winnerId=wid;cur.status='completed';const w=wid===cur.participant1?.id?cur.participant1:cur.participant2;advanceWinner(updated,cur,w);}
          const pf=config.tournamentType===TType.GROUP_KNOCKOUT?'k':'r';
          autoAdvanceByes(updated,pf);return updated;
        });
        setSelectedMatch(null);
      };
      const syncKnockout=(groups,mts)=>{
        const target=mts||[...generatedMatches];
        const updated=target.map(m=>{
          const upP=p=>{
            if(!p||!p.placeholderId)return p;
            const [gid,rs]=p.placeholderId.split('-rank');const rank=parseInt(rs);
            const g=groups.find(x=>x.id===gid);if(!g||!g.standings)return p;
            const s=g.standings[rank-1];
            if(s&&s.played>0){const rp=g.participants.find(x=>x.id===s.participantId);if(rp)return{...rp,placeholderId:p.placeholderId};}
            return{...p,name:`${g.name} ${rank}위`};
          };
          return{...m,participant1:upP(m.participant1),participant2:upP(m.participant2)};
        });
        autoAdvanceByes(updated,'k');return updated;
      };
      const handleUpdateLeagueMatch=(mid,s1,s2,setScores=null,isReset=false)=>{
        if(!selectedLeagueMatch)return;
        const{groupId}=selectedLeagueMatch;
        const buildUpdate = (m) => {
          if(m.id!==mid) return m;
          if(isReset) return {...m,scoreHome:0,scoreAway:0,setScores:null,status:'pending'};
          const upd = {...m,scoreHome:s1,scoreAway:s2,status:'completed'};
          if(setScores) upd.setScores = setScores;
          return upd;
        };
        if(groupId){
          const ug=generatedGroups.map(g=>{
            if(g.id!==groupId)return g;
            const ur=g.rounds.map(r=>({...r,matches:r.matches.map(buildUpdate)}));
            return{...g,rounds:ur,standings:calculateStandings(g.participants,ur,isSetsGame(config.sport))};
          });
          setGeneratedGroups(ug);
          if(config.tournamentType===TType.GROUP_KNOCKOUT)setGeneratedMatches([...syncKnockout(ug)]);
        }else{
          setGeneratedLeague(prev=>prev.map(r=>({...r,matches:r.matches.map(buildUpdate)})));
        }
        setSelectedLeagueMatch(null);
      };
      const handleRandomDraw=()=>{
        if(config.tournamentType!==TType.GROUP_KNOCKOUT)return;
        if(window.confirm('본선 대진표를 다시 추첨하시겠습니까?')){
          const nm=shuffleKnockoutPlaceholders(generatedGroups, config.advancePerGroup||2);
          setGeneratedMatches([...syncKnockout(generatedGroups,nm)]);
        }
      };
      const handleGenerate=async(finalData)=>{
        const isGroupData=Array.isArray(finalData)&&finalData.length>0&&'participants'in finalData[0];
        if(isGroupData){
          const groups=finalData;
          groups.forEach(g=>{g.rounds=generateLeagueSchedule(g.participants,g.id);g.standings=calculateStandings(g.participants,g.rounds,isSetsGame(config.sport));});
          setGeneratedGroups(groups);
          if(config.tournamentType===TType.GROUP_KNOCKOUT){const km=shuffleKnockoutPlaceholders(groups, config.advancePerGroup||2);setGeneratedMatches([...syncKnockout(groups,km)]);}
          else setGeneratedMatches([]);
        }else{
          const pts=finalData;setActiveParticipants(pts);
          if(config.tournamentType===TType.TOURNAMENT)setGeneratedMatches(generateTournamentBracket(pts));
          else if(config.tournamentType===TType.LEAGUE)setGeneratedLeague(generateLeagueSchedule(pts));
        }
        setView('active');
      };

      // ── 로딩 화면 ───────────────────────────────────

        <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center gap-4">
          <span className="text-5xl animate-bounce">🏁</span>
          <p className="font-black text-slate-400 uppercase tracking-widest text-base">Loading MatchMaker Pro...</p>
        </div>

      // ── 스코어보드 전용 화면 (헤더 없음, 풀스크린) ──
      if(view==='scoreboard'){

        if(!scoreboardMatch) { exitScoreboard(); return null; }
        return (
          <ScoreboardView
            match={scoreboardMatch}
            config={config}
            tournamentId={currentId}
            groupId={scoreboardMatch.groupId}
            onClose={exitScoreboard}
            onSaved={exitScoreboard}

      }

      // ── 메인 렌더 ───────────────────────────────────
      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">

                  <span className="hidden sm:inline">MatchMaker</span>
                  <span className="sm:hidden">MM</span>

                </h1>
              </button>
              <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">
                {saving&&<span className="hidden sm:inline text-[12px] font-black text-slate-400 animate-pulse uppercase">저장 중...</span>}

                  <>

                      <span>💾</span><span className="hidden sm:inline ml-1">CSV</span>
                    </button>
                  </>

                    <span className="hidden sm:inline">Shared Content (읽기 전용)</span>
                    <span className="sm:hidden">👁 읽기 전용</span>
                  </span>

              </div>
            </div>
          </header>

            {/* ──── DASHBOARD ──── */}

                      📥 <span className="hidden sm:inline">시트 대회 가져오기</span><span className="sm:hidden">시트</span>

                    {!showArchived&&<button onClick={startNew} className="bg-blue-600 text-white px-4 sm:px-8 py-2.5 sm:py-4 rounded-xl sm:rounded-2xl font-black text-sm sm:text-lg hover:bg-blue-700 shadow-xl shadow-blue-100">+ 새 대회</button>}

                {/* 📁 폴더 + 즐겨찾기 + 필터 영역 (활성 대회만) */}
                {!showArchived&&(()=>{
                  const folderList = Object.values(folders).sort((a,b)=>(a.order||0)-(b.order||0));
                  const activeTours = userTournaments.filter(t=>!t.isArchived);
                  const favTours = activeTours.filter(t=>favorites.includes(t.id));
                  const noFolderTours = activeTours.filter(t=>!t.folderId);

                  const FOLDER_COLOR_MAP = {

                    pink: { bg: 'bg-pink-50', border: 'border-pink-200', text: 'text-pink-700', hover: 'hover:border-pink-400', selBg: 'bg-pink-500', selText: 'text-white' },
                    red: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', hover: 'hover:border-red-400', selBg: 'bg-red-500', selText: 'text-white' },
                    amber: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', hover: 'hover:border-amber-400', selBg: 'bg-amber-500', selText: 'text-white' },
                    green: { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-700', hover: 'hover:border-green-400', selBg: 'bg-green-500', selText: 'text-white' },
                    teal: { bg: 'bg-teal-50', border: 'border-teal-200', text: 'text-teal-700', hover: 'hover:border-teal-400', selBg: 'bg-teal-500', selText: 'text-white' },
                    slate: { bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-700', hover: 'hover:border-slate-400', selBg: 'bg-slate-700', selText: 'text-white' }
                  };

                  return (
                    <div className="space-y-4">
                      {/* 필터 칩들 */}
                      <div className="flex flex-wrap gap-2 items-center">
                        <button onClick={()=>setCurrentFolderId(null)}
                          className={`px-3 sm:px-4 py-1.5 sm:py-2 rounded-full font-black text-xs sm:text-sm border-2 transition-all ${currentFolderId===null?'bg-slate-900 text-white border-slate-900':'bg-white text-slate-600 border-slate-200 hover:border-slate-400'}`}>
                          📋 전체 ({activeTours.length})
                        </button>
                        {favTours.length>0&&(
                          <button onClick={()=>setCurrentFolderId('__favorites')}
                            className={`px-3 sm:px-4 py-1.5 sm:py-2 rounded-full font-black text-xs sm:text-sm border-2 transition-all ${currentFolderId==='__favorites'?'bg-yellow-400 text-white border-yellow-400':'bg-white text-yellow-700 border-yellow-200 hover:border-yellow-400'}`}>
                            ⭐ 즐겨찾기 ({favTours.length})
                          </button>
                        )}
                        {folderList.map(f=>{
                          const cm = FOLDER_COLOR_MAP[f.color] || FOLDER_COLOR_MAP.blue;
                          const cnt = activeTours.filter(t=>t.folderId===f.id).length;
                          const sel = currentFolderId===f.id;
                          return (
                            <button key={f.id} onClick={()=>setCurrentFolderId(f.id)}
                              className={`px-3 sm:px-4 py-1.5 sm:py-2 rounded-full font-black text-xs sm:text-sm border-2 transition-all flex items-center gap-1.5 ${sel?cm.selBg+' '+cm.selText+' border-transparent':'bg-white '+cm.text+' '+cm.border+' '+cm.hover}`}>
                              <span>{f.icon||'📁'}</span>
                              <span className="truncate max-w-[120px]">{f.name}</span>
                              <span className="opacity-70">({cnt})</span>

                        {currentFolderId&&currentFolderId!=='__favorites'&&folders[currentFolderId]&&(

                        )}
                        <button onClick={()=>setEditingFolder({})}
                          className="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full bg-blue-50 text-blue-600 border-2 border-blue-200 hover:border-blue-400 font-black text-xs sm:text-sm">
                          + 폴더

                      </div>

                      {/* 폴더 안내 (폴더 없고 활성 대회 있을 때만) */}
                      {folderList.length===0&&activeTours.length>=3&&currentFolderId===null&&(

                    if(!!t.isArchived!==showArchived) return false;

                      <div className="flex justify-between items-start gap-2">

                      })}
                      onRemove={id=>setParticipants(prev=>prev.filter(p=>p.id!==id))}

            const pool = [];
            const seen = new Set();
            const addAll = (arr) => (arr||[]).forEach(p=>{
              if(!p||!p.id) return;
              if(p.id.startsWith('bye')) return;
              if(seen.has(p.id)) return;
              seen.add(p.id); pool.push(p);
            });
            if(generatedGroups && generatedGroups.length>0){
              generatedGroups.forEach(g=>addAll(g.participants));
            }
            addAll(activeParticipants);
            addAll(participants);
            return pool;
          })()} onToggle={handleToggleAttendance} onClose={()=>setShowAttendance(false)}/>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- ============================================================ -->
  <!--  PWA Service Worker 등록                                       -->
  <!--  + "홈 화면에 설치" 안내 배너                                   -->
  <!-- ============================================================ -->
  <script>
    // ── 1. Service Worker 등록 ────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            console.log('[PWA] Service Worker 등록 성공:', reg.scope);

            // 새 버전 확인 — 업데이트 있으면 자동 활성화
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] 새 버전 준비됨 — 새로고침 시 적용');
                  // 자동 적용 (사용자에게 새로고침 권유는 선택)
                  newWorker.postMessage('SKIP_WAITING');
                }
              });
            });

            // 1시간마다 업데이트 체크
            setInterval(() => reg.update(), 60 * 60 * 1000);
          })
          .catch(err => console.warn('[PWA] Service Worker 등록 실패:', err));
      });

      // SW가 새 버전으로 전환되면 한 번만 새로고침
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    }

    // ── 2. "홈 화면에 추가" 배너 (Android Chrome) ─────────────────
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallBanner();
    });

    function showInstallBanner() {
      // 이미 설치했거나 거부했으면 표시 안 함
      if (localStorage.getItem('pwa-install-dismissed') === '1') return;
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      if (document.getElementById('pwa-install-banner')) return;

      const banner = document.createElement('div');
      banner.id = 'pwa-install-banner';
      banner.style.cssText = `
        position: fixed; bottom: 16px; left: 16px; right: 16px;
        background: #1e293b; color: white; padding: 14px 18px;
        border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        z-index: 9999; display: flex; align-items: center; gap: 12px;
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 480px; margin: 0 auto;
        animation: fade-in 0.4s ease-out;
      `;
      banner.innerHTML = `
        <img src="./icons/icon-192.png" alt="MatchMaker Pro" style="width:42px;height:42px;border-radius:10px;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:900;font-size:14px;">앱으로 설치하기</div>
          <div style="font-size:12px;color:#94a3b8;margin-top:2px;">홈 화면에서 빠르게 실행하세요</div>
        </div>
        <button id="pwa-install-btn" style="background:#3b82f6;color:white;border:0;padding:8px 14px;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;flex-shrink:0;">설치</button>
        <button id="pwa-dismiss-btn" style="background:transparent;color:#64748b;border:0;font-size:18px;cursor:pointer;padding:4px 8px;flex-shrink:0;">✕</button>
      `;
      document.body.appendChild(banner);

      document.getElementById('pwa-install-btn').addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('[PWA] 설치 결과:', outcome);
        deferredPrompt = null;
        banner.remove();
      });
      document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
        localStorage.setItem('pwa-install-dismissed', '1');
        banner.remove();
      });

      // 30초 후 자동 닫힘 (덜 거슬리게)
      setTimeout(() => banner.remove(), 30000);
    }

    // ── 3. iOS Safari 안내 (Android와 달리 자동 프롬프트 X) ──────
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isInStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    }
    window.addEventListener('load', () => {
      if (isIOS() && !isInStandalone() && localStorage.getItem('pwa-ios-hint-dismissed') !== '1') {
        // iOS는 직접 안내 (3초 후 표시)
        setTimeout(() => {
          if (document.getElementById('pwa-install-banner')) return;
          const banner = document.createElement('div');
          banner.id = 'pwa-install-banner';
          banner.style.cssText = `
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            background: #1e293b; color: white; padding: 14px 18px;
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 9999; font-family: system-ui, -apple-system, sans-serif;
            max-width: 480px; margin: 0 auto; animation: fade-in 0.4s ease-out;
          `;
          banner.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;">
              <img src="./icons/icon-192.png" style="width:42px;height:42px;border-radius:10px;">
              <div style="flex:1;">
                <div style="font-weight:900;font-size:14px;">앱으로 설치하기</div>
                <div style="font-size:12px;color:#94a3b8;margin-top:4px;">
                  하단 공유 버튼 <span style="color:#3b82f6;font-size:14px;">⬆</span> → "홈 화면에 추가"
                </div>
              </div>
              <button id="pwa-ios-dismiss" style="background:transparent;color:#64748b;border:0;font-size:18px;cursor:pointer;padding:4px 8px;">✕</button>
            </div>
          `;
          document.body.appendChild(banner);
          document.getElementById('pwa-ios-dismiss').addEventListener('click', () => {
            localStorage.setItem('pwa-ios-hint-dismissed', '1');
            banner.remove();
          });
          setTimeout(() => banner.remove(), 30000);
        }, 3000);
      }
    });

    // ── 4. 설치 완료 감지 (감사 메시지) ───────────────────────────
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] 앱 설치 완료!');
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.remove();
    });
  </script>
