        // historyм—җ к°Җм§ң н•ӯлӘ© м¶”к°Җ (л’ӨлЎңк°Җкё° мәҗм№ҳмҡ©)
        window.history.pushState({mmView:view}, '', window.location.href);

        const handlePopState = () => {
          // лҢҖнҡҢ/м„Өм • нҷ”л©ҙм—җм„ң л’ӨлЎңк°Җкё° вҶ’ лҢҖмӢңліҙл“ңлЎң
          setView('dashboard');
          setCurrentId(null);
        };

        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, [view]);

      // в”Җв”Җ мҙҲкё° лЎңл“ң + мӢӨмӢңк°„ лҰ¬мҠӨл„Ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      useEffect(()=>{
        // URL н•ҙмӢң нҢҢмӢұ: #share=abc123  лҳҗлҠ”  #s=ABCDE1
        const hash = (window.location.hash || '').replace(/^#/, '');
        const [modeRaw, idRaw] = hash.split('=');
        const mode = (modeRaw || '').trim();
        const id   = (idRaw   || '').trim();

        // в”Җв”Җ мқҪкё° м „мҡ© кіөмң  л§ҒнҒ¬ вҖ” мҠӨлғ…мғ·л§Ң м Ғмҡ© (лқјмқҙлёҢ лҰ¬мҠӨл„Ҳ X)
        if(mode==='share'&&id){
          fbGetShare(id).then(data=>{
            if(data){
              setCurrentId(data.id);
              setConfig(data.config||{...DEFAULT_CONFIG});
              setParticipants(data.participants||[]);
              setActiveParticipants(data.activeParticipants||[]);
              setGeneratedMatches(data.generatedMatches||[]);
              setGeneratedLeague(data.generatedLeague||[]);
              setGeneratedGroups(data.generatedGroups||[]);
              setView('share');
            }
            setLoading(false);
          }).catch(()=>setLoading(false));
          return;
        }

        // в”Җв”Җ Firebase м„ём…ҳ кё°л°ҳ л§ҒнҒ¬ (#s=ABCDE1) вҖ” мҠӨмҪ”м–ҙліҙл“ң лӘЁл“ң
        if(mode==='s'&&id){
          fbGetSession(id).then(session=>{
            if(!session){ setLoading(false); return; }
            if(session.type!=='score'){ setLoading(false); return; }
            const tId = session.tournamentId;
            const matchId=session.matchId||'';
            const ref=db.ref('tournaments/'+tId);
            ref.on('value',snap=>{
              const data=snap.val();
              if(data){
                remoteUpdateRef.current=true;
                setConfig(data.config||DEFAULT_CONFIG);
                setCurrentId(tId);
                setGeneratedMatches(data.generatedMatches||[]);
                setGeneratedLeague(data.generatedLeague||[]);
                setGeneratedGroups(data.generatedGroups||[]);
                setActiveParticipants(data.activeParticipants||[]);
                setView('scoreboard');
                if(matchId){
                  const all=[
                    ...(data.generatedMatches||[]),
                    ...(data.generatedLeague||[]).flatMap(r=>r.matches||[]),
                    ...(data.generatedGroups||[]).flatMap(g=>g.rounds.flatMap(r=>r.matches||[]))
                  ];
                  const found=all.find(m=>m.id===matchId);
                  if(found) setScoreboardMatch({...found,tournamentId:tId,
                    groupId:(data.generatedGroups||[]).find(g=>g.rounds.some(r=>r.matches.some(m=>m.id===matchId)))?.id||null});
                }
              }
              setLoading(false);
            },()=>setLoading(false));
          }).catch(()=>setLoading(false));
          return;
        }

        // в”Җв”Җ лҢҖмӢңліҙл“ң вҖ” Firebaseк°Җ м§„мӢӨмқҳ мӣҗмІң (localStorageлҠ” мәҗмӢң м—ӯн• л§Ң)
        const ref = db.ref('tournaments');
        ref.on('value', snap=>{
          const fbData = snap.val() || {};
          const list = Object.values(fbData).filter(v=>v&&v.id).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setUserTournaments(list);
          // Firebaseк°Җ м •мғҒ м—°кІ°лҗҗмңјлӢҲ localStorageлҘј Firebase мҠӨлғ…мғ·мңјлЎң көҗмІҙ
          // (лӢӨлҘё кё°кё°м—җм„ң мӮӯм ңн•ң лҢҖнҡҢк°Җ мўҖл№„лЎң л¶Җнҷңн•ҳлҠ” кІғ л°©м§Җ)
          try { localStorage.setItem(LS_KEY, JSON.stringify(fbData)); } catch(e) {}
          setLoading(false);
        }, err=>{
          console.warn('Firebase мӢӨнҢЁ, localStorage мӮ¬мҡ©:', err);
          const lsData = lsGetAll();
          const list = Object.values(lsData).filter(v=>v&&v.id).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setUserTournaments(list);
          setLoading(false);
        });

        // рҹ“Ғ нҸҙлҚ” лЎңл”© (Firebase мҡ°м„ , мӢӨнҢЁ мӢң localStorage)
        const foldersRef = db.ref('folders');
        foldersRef.on('value', snap=>{
          const val = snap.val() || {};
          setFolders(val);
          try { localStorage.setItem(LS_FOLDERS_KEY, JSON.stringify(val)); } catch(e) {}
        }, err=>{
          console.warn('Firebase нҸҙлҚ” лЎңл”© мӢӨнҢЁ:', err);
          setFolders(lsGetFolders());
        });

        // вӯҗ мҰҗкІЁм°ҫкё° лЎңл”© (localStorage кё°л°ҳ вҖ” кё°кё°лі„ к°ңлі„ кҙҖлҰ¬)
        setFavorites(lsGetFavorites());

        return ()=>{ ref.off(); foldersRef.off(); };
      },[]);

      // в”Җв”Җ мһҗлҸҷ м ҖмһҘ (л””л°”мҡҙмҠӨ 300ms вҖ” FirebaseлҠ” л№ лҰ„) в”Җв”Җв”Җв”Җв”Җв”Җ
      const buildRecord = useCallback(()=>{
        const existing = userTournaments.find(t=>t.id===currentId);
        return {
          id: currentId,
          createdAt: existing?.createdAt || Date.now(),
          isCompleted: checkIsCompleted(),
          isArchived: existing?.isArchived || false,
          folderId: existing?.folderId || null,  // вӯҗ нҸҙлҚ” м •ліҙ мң м§Җ
          config, participants, activeParticipants, generatedMatches, generatedLeague, generatedGroups
        };
      },[currentId,userTournaments,config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups]);

      const checkIsCompleted=()=>{
        if(config.tournamentType===TType.TOURNAMENT||config.tournamentType===TType.GROUP_KNOCKOUT){
          if(!generatedMatches.length)return false;
          const maxR=Math.max(...generatedMatches.map(m=>m.round));
          return generatedMatches.find(m=>m.round===maxR)?.status==='completed';
        }
        if(config.tournamentType===TType.LEAGUE) return generatedLeague.every(r=>r.matches.every(m=>m.status==='completed'||m.home.id.includes('bye')||m.away.id.includes('bye')));
        if(config.tournamentType===TType.GROUP_LEAGUE) return generatedGroups.every(g=>g.rounds.every(r=>r.matches.every(m=>m.status==='completed'||m.home.id.includes('bye')||m.away.id.includes('bye'))));
        return false;
      };

      useEffect(()=>{
        if(view!=='active'||!currentId)return;
        // Firebaseм—җм„ң мҳЁ м—…лҚ°мқҙнҠёл©ҙ auto-save кұҙл„ҲлңҖ (лҚ®м–ҙм“°кё° л°©м§Җ)
        if(remoteUpdateRef.current){ remoteUpdateRef.current=false; return; }
        // лӢӨлҘё кё°кё°/нғӯм—җм„ң мқҙ лҢҖнҡҢлҘј мӮӯм ңн–ҲлӢӨл©ҙ л¶ҖнҷңмӢңнӮӨм§Җ м•ҠмқҢ
        if(userTournaments.length > 0 && !userTournaments.find(t=>t.id===currentId)) return;
        if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
        saveTimerRef.current=setTimeout(()=>{
          const record=buildRecord();
          setSaving(true);
          fbSave(currentId,record)
            .then(()=>{
              setSaving(false);
              setUserTournaments(prev=>{const i=prev.findIndex(t=>t.id===currentId);if(i>=0){const n=[...prev];n[i]=record;return n;}return prev;});
            })
            .catch(err=>{console.error(err);setSaving(false);});
        },300);
        return()=>{if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
      },[generatedMatches,generatedLeague,generatedGroups,config,participants,activeParticipants]);

      // в”Җв”Җ лҢҖнҡҢ кҙҖлҰ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      const activeListenerRef = useRef(null); // нҳ„мһ¬ м—ҙлҰ° лҢҖнҡҢ лҰ¬мҠӨл„Ҳ м°ёмЎ°

      const startNew=()=>{
        const id=Math.random().toString(36).substr(2,9);
        const newCfg={...DEFAULT_CONFIG,name:'мғҲ лҢҖнҡҢ'};
        setCurrentId(id);setConfig(newCfg);setParticipants([]);setActiveParticipants([]);
        setGeneratedMatches([]);setGeneratedLeague([]);setGeneratedGroups([]);setStep(1);
        const record={id,createdAt:Date.now(),isCompleted:false,isArchived:false,config:newCfg,participants:[],activeParticipants:[],generatedMatches:[],generatedLeague:[],generatedGroups:[]};
        setUserTournaments(prev=>[record,...prev]);
        fbSave(id,record).catch(console.error);
        setView('setup');
      };

      const loadTournamentData=(record)=>{
        setCurrentId(record.id);setConfig(record.config||{...DEFAULT_CONFIG});setParticipants(record.participants||[]);
        setActiveParticipants(record.activeParticipants||[]);setGeneratedMatches(record.generatedMatches||[]);
        setGeneratedLeague(record.generatedLeague||[]);setGeneratedGroups(record.generatedGroups||[]);
        setView('active');

        // кё°мЎҙ лҰ¬мҠӨл„Ҳ н•ҙм ң нӣ„ мғҲ лҰ¬мҠӨл„Ҳ л“ұлЎқ
        if(activeListenerRef.current) activeListenerRef.current.off();
        const ref = db.ref('tournaments/'+record.id);
        activeListenerRef.current = ref;
        ref.on('value', snap=>{
          const data=snap.val();
          if(!data) return;
          remoteUpdateRef.current=true; // auto-save лҚ®м–ҙм“°кё° л°©м§Җ
          setGeneratedMatches(data.generatedMatches||[]);
          setGeneratedLeague(data.generatedLeague||[]);
          setGeneratedGroups(data.generatedGroups||[]);
        });
      };

      const handleDelete=(id,e)=>{
        e.stopPropagation();
        if(!window.confirm('мқҙ лҢҖнҡҢлҘј мҳҒкө¬м ҒмңјлЎң мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;
        fbDelete(id)
          .then(()=>{setUserTournaments(prev=>prev.filter(t=>t.id!==id));if(currentId===id){setCurrentId(null);setView('dashboard');}})
          .catch(console.error);
      };

      const toggleArchive=(id,e)=>{
        e.stopPropagation();
        setUserTournaments(prev=>{
          const updated=prev.map(t=>t.id===id?{...t,isArchived:!t.isArchived}:t);
          const record=updated.find(t=>t.id===id);
          if(record) fbSave(id,record).catch(console.error);
          return updated;
        });
      };

      // рҹ“Ғ нҸҙлҚ” н•ёл“Өлҹ¬
      const handleSaveFolder = (folderData) => {
        const id = folderData.id || `f_${Math.random().toString(36).substr(2,9)}`;
        const folder = {
          id,
          name: folderData.name || 'мғҲ нҸҙлҚ”',
          color: folderData.color || 'blue',
          icon: folderData.icon || 'рҹ“Ғ',
          order: folderData.order ?? Object.keys(folders).length,
          createdAt: folderData.createdAt || Date.now()
        };
        const newFolders = {...folders, [id]: folder};
        setFolders(newFolders);
        fbSaveFolders(newFolders);
        setEditingFolder(null);
      };

      const handleDeleteFolder = (folderId) => {
        if(!window.confirm('мқҙ нҸҙлҚ”лҘј мӮӯм ңн•©лӢҲлӢӨ.\nнҸҙлҚ” м•Ҳмқҳ лҢҖнҡҢл“ӨмқҖ "м „мІҙ"лЎң мқҙлҸҷн•©лӢҲлӢӨ.\nкі„мҶҚн•ҳмӢңкІ мҠөлӢҲк№Ң?')) return;
        // нҸҙлҚ” мӮӯм ң + к·ё нҸҙлҚ”м—җ мҶҚн•ң лҢҖнҡҢл“Өмқҳ folderId м ңкұ°
        const newFolders = {...folders};
        delete newFolders[folderId];
        setFolders(newFolders);
        fbSaveFolders(newFolders);
        // лҢҖнҡҢл“Өмқҳ folderId м ңкұ°
        setUserTournaments(prev=>{
          const updated = prev.map(t=>{
            if(t.folderId === folderId){
              const updatedT = {...t, folderId: null};
              fbSave(t.id, updatedT).catch(console.error);
              return updatedT;
            }
            return t;
          });
          return updated;
        });
        if(currentFolderId === folderId) setCurrentFolderId(null);
      };

      // лҢҖнҡҢлҘј нҸҙлҚ”лЎң мқҙлҸҷ
      const handleMoveTournament = (tournamentId, folderId) => {
        setUserTournaments(prev=>{
          const updated = prev.map(t=>{
            if(t.id === tournamentId){
              const updatedT = {...t, folderId: folderId || null};
              fbSave(t.id, updatedT).catch(console.error);
              return updatedT;
            }
            return t;
          });
          return updated;
        });
        setMoveDialogTour(null);
      };

      // вӯҗ мҰҗкІЁм°ҫкё° нҶ кёҖ
      const toggleFavorite = (id, e) => {
        e?.stopPropagation();
        const newFavs = favorites.includes(id)
          ? favorites.filter(f=>f!==id)
          : [...favorites, id];
        setFavorites(newFavs);
        lsSaveFavorites(newFavs);
      };

      // кіөмң  л§ҒнҒ¬ вҖ” Firebase мҠӨлғ…мғ· м ҖмһҘ
      const handleShare=(t,e)=>{
        e.stopPropagation();
        fbSaveShare(t)
          .then(shareId=>{const url=`${window.APP_BASE_URL}#share=${shareId}`;navigator.clipboard?.writeText(url).then(()=>alert('кіөмң  л§ҒнҒ¬к°Җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!')).catch(()=>prompt('л§ҒнҒ¬лҘј ліөмӮ¬н•ҳм„ёмҡ”:',url));})
          .catch(()=>alert('кіөмң  л§ҒнҒ¬ мғқм„ұм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.'));
      };
      const handleShareCurrent=()=>{
        const rec={id:currentId||'shared',createdAt:Date.now(),isCompleted:false,config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups};
        fbSaveShare(rec)
          .then(shareId=>{const url=`${window.APP_BASE_URL}#share=${shareId}`;navigator.clipboard?.writeText(url).then(()=>alert('лҢҖм§„н‘ң кіөмң  л§ҒнҒ¬к°Җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!')).catch(()=>prompt('л§ҒнҒ¬лҘј ліөмӮ¬н•ҳм„ёмҡ”:',url));})
          .catch(()=>alert('кіөмң  л§ҒнҒ¬ мғқм„ұм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.'));
      };

      // рҹ“ә мҠӨмҪ”м–ҙліҙл“ң вҖ” нҳ„мһ¬ кё°кё°м—җм„ң л°”лЎң н’ҖмҠӨнҒ¬лҰ° м§„мһ… (л§ҒнҒ¬ ліөмӮ¬ X)
      const handleScoreboardLink=(matchId)=>{
        // лӘЁл“  л§Өм№ҳ н’Җм—җм„ң л§Өм№ҳ м°ҫкё°
        const all=[
          ...generatedMatches,
          ...generatedLeague.flatMap(r=>r.matches||[]),
          ...generatedGroups.flatMap(g=>g.rounds.flatMap(r=>r.matches||[]))
        ];
        const found=all.find(m=>m.id===matchId);
        if(!found){alert('кІҪкё°лҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.');return;}
        const groupId=generatedGroups.find(g=>g.rounds.some(r=>r.matches.some(m=>m.id===matchId)))?.id||null;
        setScoreboardMatch({...found, tournamentId:currentId, groupId});
        setView('scoreboard');
      };

      // вһ• лқјмҡҙл“ң м¶”к°Җ вҖ” н’ҖлҰ¬к·ё/мЎ°лі„ лӘЁл“ңм—җм„ң мӮ¬мҡ©мһҗк°Җ мӣҗн•  л•Ң лқјмҡҙл“ң м¶”к°Җ
      // mode: 'shuffle' (м…”н”Ң н•ң лқјмҡҙл“ң) | 'roundrobin' (м •м„қ н’ҖлҰ¬к·ё 1л°”нҖҙ нҶөм§ё)
      const handleAddRound = (groupId=null, mode='shuffle') => {
        // кі мң  suffix вҖ” ID м¶©лҸҢ л°©м§Җ
        const uniq = `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;

        // м…”н”Ң н•ң лқјмҡҙл“ң мғқм„ұ
        const buildShuffleRound = (existingRounds, participants, prefix) => {
          const nextNum = (existingRounds||[]).length + 1;
          const active = participants.filter(p=>p&&!p.id.startsWith('bye'));
          const shuffled = [...active].sort(()=>Math.random()-0.5);
          const isOdd = shuffled.length % 2 !== 0;
          if(isOdd) shuffled.push({id:`bye-r${nextNum}-${uniq}`,name:'нңҙмӢқ(Bye)',isSeeded:false});
          const matches=[];
          const half = shuffled.length / 2;
          for(let j=0;j<half;j++){
            matches.push({
              id:`l-${prefix}-r${nextNum}-${uniq}-m${j}`,
              home: shuffled[j],
              away: shuffled[shuffled.length-1-j],
              status:'pending'
            });
          }
          return [{ roundNumber: nextNum, matches }];
        };

        // м •м„қ н’ҖлҰ¬к·ё 1л°”нҖҙ вҖ” n-1 лқјмҡҙл“ң нҶөм§ё м¶”к°Җ
        const buildFullRoundRobin = (existingRounds, participants, prefix) => {
          const active = participants.filter(p=>p&&!p.id.startsWith('bye'));
          const startNum = (existingRounds||[]).length + 1;
          const teams = [...active];
          const isOdd = teams.length % 2 !== 0;
          if(isOdd) teams.push({id:`bye-rr-${uniq}`,name:'нңҙмӢқ(Bye)',isSeeded:false});
          const rounds=[]; const tc=teams.length; const nr=tc-1; const half=tc/2;
          const list=[...teams];
          for(let i=0;i<nr;i++){
            const matches=[];
            const roundNum = startNum + i;
            for(let j=0;j<half;j++){
              matches.push({
                // ID м¶©лҸҢ л°©м§Җ: uniq + лқјмҡҙл“ң + л§Өм№ҳмқёлҚұмҠӨ + лқјмҡҙл“ң мҲңнҷҳ мқёлҚұмҠӨ i
                id:`l-${prefix}-rr${roundNum}-${uniq}-i${i}-m${j}`,
                // нҷҲ/мӣҗм • мӮҙм§қ м„һкё° мң„н•ҙ лқјмҡҙл“ңлі„ alternate
                home: i%2===0 ? list[j] : list[tc-1-j],
                away: i%2===0 ? list[tc-1-j] : list[j],
                status:'pending'
              });
            }
            rounds.push({ roundNumber: roundNum, matches });
            // round-robin rotation (circle method)
            list.splice(1,0,list.pop());
          }
          return rounds;
        };

        const builder = mode === 'roundrobin' ? buildFullRoundRobin : buildShuffleRound;

        if(groupId){
          // мЎ°лі„ лӘЁл“ң вҖ” н•ҙлӢ№ мЎ°м—җл§Ң лқјмҡҙл“ң м¶”к°Җ
          // вӯҗ prev кё°л°ҳмңјлЎң л№Ңл“ң (race condition л°©м§Җ)
          setGeneratedGroups(prev=>prev.map(g=>{
            if(g.id!==groupId) return g;
            const newRounds = builder(g.rounds, g.participants, `g${g.id}`);
            return {...g, rounds:[...(g.rounds||[]), ...newRounds]};
          }));
        } else {
          // н’ҖлҰ¬к·ё лӘЁл“ң вҖ” prev кё°л°ҳмңјлЎң л№Ңл“ң
          setGeneratedLeague(prev=>{
            const newRounds = builder(prev, activeParticipants, 'league');
            return [...(prev||[]), ...newRounds];
          });
        }
      };

      // рҹ—‘пёҸ лқјмҡҙл“ң мӮӯм ң вҖ” н•ҙлӢ№ лқјмҡҙл“ң м ңкұ° нӣ„ л’Ө лқјмҡҙл“ң лІҲнҳё мһ¬м •л ¬
      const handleDeleteRound = (groupId, roundIndex) => {
        let target;
        if(groupId){
          const g = (generatedGroups||[]).find(x=>x.id===groupId);
          target = (g&&g.rounds||[])[roundIndex];
        } else {
          target = (generatedLeague||[])[roundIndex];
        }
        if(!target) return;
        const hasCompleted = (target.matches||[]).some(m=>m.status==='completed');
        const msg = hasCompleted
          ? 'лқјмҡҙл“ң '+target.roundNumber+'м—җлҠ” мқҙлҜё м җмҲҳк°Җ мһ…л Ҙлҗң кІҪкё°к°Җ мһҲмҠөлӢҲлӢӨ.\nмӮӯм ңн•ҳл©ҙ н•ҙлӢ№ кІ°кіјлҸ„ н•Ёк»ҳ мӮ¬лқјм§Җкі  мҲңмң„н‘ңк°Җ лӢӨмӢң кі„мӮ°лҗ©лӢҲлӢӨ.\nм •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?'
          : 'лқјмҡҙл“ң '+target.roundNumber+'мқ„(лҘј) мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?';
        if(!window.confirm(msg)) return;
        const renumber = (arr) => arr.filter((_,i)=>i!==roundIndex).map((r,i)=>({...r, roundNumber:i+1}));
        if(groupId){
          setGeneratedGroups(prev=>prev.map(g=>g.id!==groupId?g:{...g, rounds:renumber(g.rounds||[])}));
        } else {
          setGeneratedLeague(prev=>renumber(prev||[]));
        }
      };

      // рҹҡ« м¶ңкІ° нҶ кёҖ вҖ” м°ёк°Җмһҗмқҳ absent мғҒнғң ліҖкІҪ (лӘЁл“  кіі мқјкҙҖ л°ҳмҳҒ)
      const handleToggleAttendance=(pid)=>{
        const flip = (p) => p.id===pid ? {...p, absent: !p.absent} : p;
        // participants (лҢҖмӢңліҙл“ң/лӘ…лӢЁ мӣҗліё)
        setParticipants(prev=>prev.map(flip));
        // activeParticipants
        setActiveParticipants(prev=>prev.map(flip));
        // мЎ°лі„ лӘЁл“ң: к°Ғ мЎ°мқҳ participants + л§Өм№ҳмқҳ home/away
        setGeneratedGroups(prev=>prev.map(g=>{
          const newP=(g.participants||[]).map(flip);
          const newRounds=(g.rounds||[]).map(r=>({
            ...r,
            matches:(r.matches||[]).map(m=>({
              ...m,
              home: m.home.id===pid?{...m.home,absent:!m.home.absent}:m.home,
              away: m.away.id===pid?{...m.away,absent:!m.away.absent}:m.away
            }))
          }));
          return {...g, participants:newP, rounds:newRounds};
        }));
        // н’ҖлҰ¬к·ё лӘЁл“ң: л§Өм№ҳл“Ө к°ұмӢ 
        setGeneratedLeague(prev=>prev.map(r=>({
          ...r,
          matches:(r.matches||[]).map(m=>({
            ...m,
            home: m.home.id===pid?{...m.home,absent:!m.home.absent}:m.home,
            away: m.away.id===pid?{...m.away,absent:!m.away.absent}:m.away
          }))
        })));
      };

      // лҢҖмӢңліҙл“ңлЎң лӮҳк°Җкё° м „ мҰүмӢң м ҖмһҘ (300ms л””л°”мҡҙмҠӨ м·ЁмҶҢ л°©м§Җ)
      const goToDashboard=()=>{
        if(currentId&&view==='active'){
          if(saveTimerRef.current) clearTimeout(saveTimerRef.current);
          const record={
            id:currentId,
            createdAt:userTournaments.find(t=>t.id===currentId)?.createdAt||Date.now(),
            isCompleted:checkIsCompleted(),
            isArchived:userTournaments.find(t=>t.id===currentId)?.isArchived||false,
            config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups
          };
          fbSave(currentId,record).catch(console.error);
        }
        if(activeListenerRef.current){activeListenerRef.current.off();activeListenerRef.current=null;}
        setCurrentId(null);
        setView('dashboard');
      };

      // кө¬кёҖ мӢңнҠёлЎң кІ°кіј лӮҙліҙлӮҙкё°
      const handleExportToSheets=()=>{
        const sm=isSetsGame(config.sport);
        const standings=config.tournamentType===TType.LEAGUE
          ?calculateStandings(activeParticipants,generatedLeague,sm):null;
        const rec={config,participants,activeParticipants,generatedMatches,generatedLeague,generatedGroups,leagueStandings:standings};
        setSaving(true);
        gasCall('exportToSheets',{data:JSON.stringify(rec)})
          .then(r=>{setSaving(false);alert(`вң… кө¬кёҖ мӢңнҠём—җ м ҖмһҘлҗҗмҠөлӢҲлӢӨ!\nмӢңнҠё мқҙлҰ„: "${r.sheetName}"`)})
          .catch(err=>{setSaving(false);console.error(err);alert('лӮҙліҙлӮҙкё° мӢӨнҢЁ. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');});
      };

      const downloadCSV=()=>{
        let csv='\ufeff';
        csv+=`лҢҖнҡҢ лҰ¬нҸ¬нҠё: ${config.name}\nмў…лӘ©: ${SPORTS_LIST.find(s=>s.id===config.sport)?.name}, л°©мӢқ: ${config.tournamentType}\n\n`;
        if(generatedMatches.length>0){
          const maxR=Math.max(...generatedMatches.map(m=>m.round));
          const fin=generatedMatches.find(m=>m.round===maxR);
          if(fin?.status==='completed'){
            const w=fin.winnerId===fin.participant1?.id?fin.participant1?.name:fin.participant2?.name;
            const ru=fin.winnerId===fin.participant1?.id?fin.participant2?.name:fin.participant1?.name;
            csv+=`=== [лҢҖнҡҢ мөңмў… м„ұм Ғ] ===\nмҡ°мҠ№,${w}\nмӨҖмҡ°мҠ№,${ru}\n\n`;
          }
        }
        if((config.tournamentType===TType.GROUP_LEAGUE||config.tournamentType===TType.GROUP_KNOCKOUT)&&generatedGroups.length>0){
          generatedGroups.forEach(g=>{
            csv+=`=== [${g.name} кІ°кіј л°Ҹ мҲңмң„] ===\nмҲңмң„,нҢҖлӘ…,кІҪкё°мҲҳ,мҠ№,л¬ҙ,нҢЁ,л“қм җ,мӢӨм җ,л“қмӢӨм°Ё,мҠ№м җ\n`;
            g.standings?.forEach((s,i)=>csv+=`${i+1},${s.name},${s.played},${s.win},${s.draw},${s.loss},${s.gf},${s.ga},${s.gd},${s.pts}\n`);
            csv+=`\n[${g.name} мғҒм„ё кІҪкё°]\nлқјмҡҙл“ң,нҷҲ нҢҖ,м–ҙмӣЁмқҙ нҢҖ,кІ°кіј,мҠӨмҪ”м–ҙ\n`;
            g.rounds.forEach(r=>r.matches.forEach(m=>{
              if(m.home.id.includes('bye')||m.away.id.includes('bye'))return;
              const res=m.status==='completed'?(m.scoreHome>m.scoreAway?'нҷҲ мҠ№':m.scoreHome<m.scoreAway?'м–ҙмӣЁмқҙ мҠ№':'л¬ҙмҠ№л¶Җ'):'м§„н–үм „';
              csv+=`${r.roundNumber},${m.home.name},${m.away.name},${res},${m.status==='completed'?m.scoreHome+':'+m.scoreAway:'-'}\n`;
            }));
            csv+='\n';
          });
        }
        if(config.tournamentType===TType.TOURNAMENT||(config.tournamentType===TType.GROUP_KNOCKOUT&&generatedMatches.length>0)){
          csv+='=== [ліём„  нҶ л„ҲлЁјнҠё лҰ¬нҸ¬нҠё] ===\nлӢЁкі„,нҢҖ1,нҢҖ2,мҠ№мһҗ,мҠӨмҪ”м–ҙ\n';
          const maxR=generatedMatches.length>0?Math.max(...generatedMatches.map(m=>m.round)):0;
          for(let r=1;r<=maxR;r++){
            const label=r===maxR?'кІ°мҠ№':`${r}лқјмҡҙл“ң`;
            generatedMatches.filter(m=>m.round===r).forEach(m=>{
              const t1=m.participant1?.name||'лҜём •',t2=m.participant2?.name||(m.round===1?'л¶Җм „мҠ№':'лҜём •');
              const w=m.status==='completed'?(m.winnerId===m.participant1?.id?t1:t2):'-';
              csv+=`${label},${t1},${t2},${w},${m.status==='completed'?m.score1+':'+m.score2:'-'}\n`;
            });
          }
        }
        const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${config.name||'match'}_report.csv`;a.click();
      };

      // в”Җв”Җ кІҪкё° кІ°кіј мІҳлҰ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      function advanceWinner(matches,cur,winner){
        const nr=cur.round+1,ni=Math.floor(cur.matchIndex/2);
        const pf=config.tournamentType===TType.GROUP_KNOCKOUT?'k':'r';
        const nm=matches.find(m=>m.id===`${pf}${nr}-m${ni}`);
        if(nm){if(cur.matchIndex%2===0)nm.participant1=winner;else nm.participant2=winner;}
      }
      function clearNext(matches,cur){
        const nr=cur.round+1,ni=Math.floor(cur.matchIndex/2);
        const pf=config.tournamentType===TType.GROUP_KNOCKOUT?'k':'r';
        const nm=matches.find(m=>m.id===`${pf}${nr}-m${ni}`);
        if(nm){if(cur.matchIndex%2===0)nm.participant1=null;else nm.participant2=null;nm.status='pending';nm.winnerId=undefined;clearNext(matches,nm);}
      }
      const handleUpdateMatch=(mid,s1,s2,wid,isReset=false)=>{
        setGeneratedMatches(prev=>{
          const updated=[...prev];const idx=updated.findIndex(m=>m.id===mid);if(idx===-1)return prev;
          const cur=updated[idx];
          if(isReset){cur.score1=undefined;cur.score2=undefined;cur.winnerId=undefined;cur.status='pending';clearNext(updated,cur);}
          else{cur.score1=s1;cur.score2=s2;cur.winnerId=wid;cur.status='completed';const w=wid===cur.participant1?.id?cur.participant1:cur.participant2;advanceWinner(updated,cur,w);}
          const pf=config.tournamentType===TType.GROUP_KNOCKOUT?'k':'r';
          autoAdvanceByes(updated,pf);return updated;
        });
        setSelectedMatch(null);
      };
      const syncKnockout=(groups,mts)=>{
        const target=mts||[...generatedMatches];
        const updated=target.map(m=>{
          const upP=p=>{
            if(!p||!p.placeholderId)return p;
            const [gid,rs]=p.placeholderId.split('-rank');const rank=parseInt(rs);
            const g=groups.find(x=>x.id===gid);if(!g||!g.standings)return p;
            const s=g.standings[rank-1];
            if(s&&s.played>0){const rp=g.participants.find(x=>x.id===s.participantId);if(rp)return{...rp,placeholderId:p.placeholderId};}
            return{...p,name:`${g.name} ${rank}мң„`};
          };
          return{...m,participant1:upP(m.participant1),participant2:upP(m.participant2)};
        });
        autoAdvanceByes(updated,'k');return updated;
      };
      const handleUpdateLeagueMatch=(mid,s1,s2,setScores=null,lineup=null,isReset=false)=>{
        if(!selectedLeagueMatch)return;
        const{groupId}=selectedLeagueMatch;
        const buildUpdate = (m) => {
          if(m.id!==mid) return m;
          if(isReset) return {...m,scoreHome:0,scoreAway:0,setScores:null,lineup:null,status:'pending'};
          const upd = {...m,scoreHome:s1,scoreAway:s2,status:'completed'};
          if(setScores) upd.setScores = setScores;
          if(lineup) upd.lineup = lineup;
          return upd;
        };
        if(groupId){
          const ug=generatedGroups.map(g=>{
            if(g.id!==groupId)return g;
            const ur=g.rounds.map(r=>({...r,matches:r.matches.map(buildUpdate)}));
            return{...g,rounds:ur,standings:calculateStandings(g.participants,ur,isSetsGame(config.sport))};
          });
          setGeneratedGroups(ug);
          if(config.tournamentType===TType.GROUP_KNOCKOUT)setGeneratedMatches([...syncKnockout(ug)]);
        }else{
          setGeneratedLeague(prev=>prev.map(r=>({...r,matches:r.matches.map(buildUpdate)})));
        }
        setSelectedLeagueMatch(null);
      };
      const handleRandomDraw=()=>{
        if(config.tournamentType!==TType.GROUP_KNOCKOUT)return;
        if(window.confirm('ліём„  лҢҖм§„н‘ңлҘј лӢӨмӢң м¶”мІЁн•ҳмӢңкІ мҠөлӢҲк№Ң?')){
          const nm=shuffleKnockoutPlaceholders(generatedGroups, config.advancePerGroup||2);
          setGeneratedMatches([...syncKnockout(generatedGroups,nm)]);
        }
      };
      const handleGenerate=async(finalData)=>{
        const isGroupData=Array.isArray(finalData)&&finalData.length>0&&'participants'in finalData[0];
        if(isGroupData){
          const groups=finalData;
          groups.forEach(g=>{g.rounds=generateLeagueSchedule(g.participants,g.id);g.standings=calculateStandings(g.participants,g.rounds,isSetsGame(config.sport));});
          setGeneratedGroups(groups);
          if(config.tournamentType===TType.GROUP_KNOCKOUT){const km=shuffleKnockoutPlaceholders(groups, config.advancePerGroup||2);setGeneratedMatches([...syncKnockout(groups,km)]);}
          else setGeneratedMatches([]);
        }else{
          const pts=finalData;setActiveParticipants(pts);
          if(config.tournamentType===TType.TOURNAMENT)setGeneratedMatches(generateTournamentBracket(pts));
          else if(config.tournamentType===TType.LEAGUE)setGeneratedLeague(generateLeagueSchedule(pts,'',config.teamRounds||1));
        }
        setView('active');
      };

      // в”Җв”Җ лЎңл”© нҷ”л©ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      if(loading) return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center gap-4">
          <span className="text-5xl animate-bounce">рҹҸҒ</span>
          <p className="font-black text-slate-400 uppercase tracking-widest text-base">Loading MatchMaker Pro...</p>
        </div>
      );

      // в”Җв”Җ мҠӨмҪ”м–ҙліҙл“ң м „мҡ© нҷ”л©ҙ (н—ӨлҚ” м—ҶмқҢ, н’ҖмҠӨнҒ¬лҰ°) в”Җв”Җ
      if(view==='scoreboard'){
        const exitScoreboard = () => { setScoreboardMatch(null); setView('active'); };
        if(!scoreboardMatch) { exitScoreboard(); return null; }
        return (
          <ScoreboardView
            match={scoreboardMatch}
            config={config}
            tournamentId={currentId}
            groupId={scoreboardMatch.groupId}
            onClose={exitScoreboard}
            onSaved={exitScoreboard}
          />
        );
      }

      // в”Җв”Җ л©”мқё л ҢлҚ” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          {/* Header */}
          <header className="bg-white border-b-2 border-slate-100 sticky top-0 z-40 shadow-sm">
            <div className="max-w-5xl mx-auto px-2 sm:px-4 py-2 sm:py-3 flex items-center justify-between gap-2">
              <button onClick={goToDashboard} className="flex items-center gap-1.5 sm:gap-3 group shrink-0">
                <span className="text-2xl sm:text-3xl transition-transform group-hover:scale-110">рҹҸҒ</span>
                <h1 className="text-base sm:text-xl font-black text-slate-900 tracking-tighter uppercase flex items-center gap-1.5">
                  <span className="hidden sm:inline">MatchMaker</span>
                  <span className="sm:hidden">MM</span>
                  <span className="text-[10px] sm:text-[11px] font-black bg-gradient-to-br from-purple-600 to-indigo-600 text-white px-1.5 sm:px-2 py-0.5 rounded">PRO</span>
                </h1>
              </button>
              <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">
                {view==='dashboard'&&(
                  <button onClick={()=>setView('help')} title="лҸ„мӣҖл§җ / мӢңнҠё м—°лҸҷ м„Өм •"
                    className="text-slate-400 hover:text-slate-700 hover:bg-slate-100 w-8 h-8 sm:w-9 sm:h-9 rounded-xl flex items-center justify-center text-lg transition-all">
                    вқ“
                  </button>
                )}
                {saving&&<span className="hidden sm:inline text-[12px] font-black text-slate-400 animate-pulse uppercase">м ҖмһҘ мӨ‘...</span>}
                {saving&&<span className="sm:hidden text-[10px] font-black text-slate-400 animate-pulse">рҹ’ҫ</span>}
                {view==='active'&&(
                  <>
                    {(() => {
                      const ids=new Set();
                      const collect=(arr)=>(arr||[]).forEach(p=>{if(p&&p.absent&&!p.id.startsWith('bye'))ids.add(p.id);});
                      collect(participants); collect(activeParticipants);
                      (generatedGroups||[]).forEach(g=>collect(g.participants));
                      const absentCount = ids.size;
                      return (
                        <button onClick={()=>setShowAttendance(true)} title="м¶ңкІ° кҙҖлҰ¬"
                          className="bg-amber-500 text-white px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-xl font-black text-sm hover:bg-amber-600 shadow-md active:scale-95 flex items-center gap-1">
                          <span>рҹҡ«</span>
                          <span className="hidden sm:inline">м¶ңкІ°</span>
                          {absentCount>0&&<span className="text-[10px] sm:text-[11px] bg-white/30 px-1 rounded">{absentCount}</span>}
                        </button>
                      );
                    })()}
                    <button onClick={handleShareCurrent} title="кіөмң  л§ҒнҒ¬"
                      className="bg-blue-600 text-white px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-xl font-black text-sm hover:bg-blue-700 shadow-md active:scale-95">
                      <span>рҹ”—</span><span className="hidden sm:inline ml-1">кіөмң </span>
                    </button>
                    {window.GAS_API_URL&&(
                      <button onClick={handleExportToSheets} title="мӢңнҠё лӮҙліҙлӮҙкё°"
                        className="bg-emerald-600 text-white px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-xl font-black text-sm hover:bg-emerald-700 shadow-md active:scale-95">
                        <span>рҹ“Ҡ</span><span className="hidden sm:inline ml-1">мӢңнҠё</span>
                      </button>
                    )}
                    <button onClick={downloadCSV} title="CSV лӢӨмҡҙлЎңл“ң"
                      className="bg-slate-900 text-white px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-xl font-black text-sm hover:bg-slate-800 shadow-md active:scale-95">
                      <span>рҹ’ҫ</span><span className="hidden sm:inline ml-1">CSV</span>
                    </button>
                  </>
                )}
                {view==='share'&&(
                  shareEditMode ? (
                    <span className="bg-green-50 text-green-700 px-2 sm:px-4 py-1.5 sm:py-2 rounded-xl font-black text-[11px] sm:text-sm border border-green-200 italic flex items-center gap-1">
                      <span className="hidden sm:inline">рҹ”“ нҺём§‘ к°ҖлҠҘ (мқёмҰқлҗЁ)</span>
                      <span className="sm:hidden">рҹ”“ нҺём§‘</span>
                    </span>
                  ) : (
                    <div className="flex gap-2 items-center">
                      <span className="bg-blue-50 text-blue-600 px-2 sm:px-4 py-1.5 sm:py-2 rounded-xl font-black text-[11px] sm:text-sm border border-blue-100 italic">
                        <span className="hidden sm:inline">рҹ‘Ғ мқҪкё° м „мҡ©</span>
                        <span className="sm:hidden">рҹ‘Ғ</span>
                      </span>
                      {config.sharePassword && (
                        <button onClick={()=>setShowPasswordModal(true)}
                          className="bg-amber-50 text-amber-700 hover:bg-amber-100 border-2 border-amber-200 px-2 sm:px-3 py-1.5 sm:py-2 rounded-xl font-black text-[11px] sm:text-sm">
                          <span className="hidden sm:inline">рҹ”“ нҺём§‘ лӘЁл“ң</span>
                          <span className="sm:hidden">рҹ”“</span>
                        </button>
                      )}
                    </div>
                  )
                )}
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-5xl mx-auto w-full px-3 sm:px-4 py-4 sm:py-8">

            {/* в”Җв”Җв”Җв”Җ рҹ“ҡ HELP / лҸ„мӣҖл§җ в”Җв”Җв”Җв”Җ */}
            {view==='help'&&<HelpView onBack={()=>setView('dashboard')}/>}

            {/* в”Җв”Җв”Җв”Җ DASHBOARD в”Җв”Җв”Җв”Җ */}
            {view==='dashboard'&&(()=>{
              const FOLDER_COLOR_MAP = {
                blue:   { bg: 'bg-blue-50',   border: 'border-blue-200',   text: 'text-blue-700',   hover: 'hover:border-blue-400',   accent: 'bg-blue-500' },
                purple: { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700', hover: 'hover:border-purple-400', accent: 'bg-purple-500' },
                pink:   { bg: 'bg-pink-50',   border: 'border-pink-200',   text: 'text-pink-700',   hover: 'hover:border-pink-400',   accent: 'bg-pink-500' },

                            .then(r=>{

                              if(r.participants.length===0){alert('мӢңнҠём—җ лӘ…лӢЁмқҙ м—ҶмҠөлӢҲлӢӨ.\nлЁјм Җ мӢңнҠём—җ лӘ…лӢЁмқ„ мһ…л Ҙн•ҳм„ёмҡ”.');return;}
                              if(!window.confirm(`"${r.sheetName}" м—җм„ң ${r.participants.length}лӘ…мқ„ л¶Ҳлҹ¬мҳөлӢҲлӢӨ.\nкё°мЎҙ лӘ…лӢЁмқҖ мҙҲкё°нҷ”лҗ©лӢҲлӢӨ. кі„мҶҚн•ҳмӢңкІ мҠөлӢҲк№Ң?`))return;
                              let seedCount=0;
                              const newParts=r.participants.map(p=>{
                                const obj={
                                  id:Math.random().toString(36).substr(2,9),
                                  name:p.name,
                                  isSeeded:!!p.isSeeded,
                                  gender:p.gender||null
                                };
                                if(p.isSeeded) obj.seedRank=++seedCount;
                                return obj;
                              });
                              setParticipants(newParts);
                              alert(`вң… ${newParts.length}лӘ… л¶Ҳлҹ¬мҳӨкё° мҷ„лЈҢ!\nлӮЁ: ${newParts.filter(p=>p.gender==='M').length}лӘ… / м—¬: ${newParts.filter(p=>p.gender==='F').length}лӘ…`);
                            })
                            .catch(e=>{console.error('[loadSheet]',e);alert('вқҢ л¶Ҳлҹ¬мҳӨкё° мӢӨнҢЁ\n\n'+e.message);});
                        }} className="flex-1 py-2.5 bg-white text-emerald-700 border-2 border-emerald-300 rounded-xl font-black text-sm hover:bg-emerald-50 min-w-[100px]">
                          в¬ҮпёҸ мӢңнҠём—җм„ң л¶Ҳлҹ¬мҳӨкё°
                        </button>
                        {participants.length>0&&(
                          <button onClick={()=>{
                            gasCall('saveParticipantsToSheet',{tournamentName:config.name,participants:JSON.stringify(participants)})
                              .then(r=>alert(`вң… "${r.sheetName}" м—җ ${r.count}лӘ… м ҖмһҘлҗҗмҠөлӢҲлӢӨ!`))
                              .catch(()=>alert('м ҖмһҘм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.'));
                          }} className="flex-1 py-2.5 bg-white text-slate-600 border-2 border-slate-200 rounded-xl font-black text-sm hover:bg-slate-50 min-w-[100px]">
                            в¬ҶпёҸ мӢңнҠём—җ м ҖмһҘ
                          </button>
                        )}
                      </div>
                    </div>
                    <ParticipantInput
                      participants={participants}
                      participantType={config.matchType==='doubles'||config.matchType==='team'?'individual':(config.matchType==='team_match'?'team':config.matchType)}
                      onAdd={(name,gender,isSeeded)=>setParticipants(prev=>{
                        const seedCount=prev.filter(x=>x.isSeeded).length;
                        return [...prev,{id:Math.random().toString(36).substr(2,9),name:name.trim(),isSeeded:!!isSeeded,seedRank:isSeeded?seedCount+1:undefined,gender:gender||null}];
                      })}
                      onRemove={id=>setParticipants(prev=>prev.filter(p=>p.id!==id))}
                      onToggleSeed={id=>setParticipants(prev=>prev.map(p=>{if(p.id!==id)return p;const ns=!p.isSeeded;return{...p,isSeeded:ns,seedRank:ns?prev.filter(x=>x.isSeeded).length+1:undefined};}))}
                      onClearAll={()=>setParticipants([])}
                    />
                    <div className="flex gap-4">
                      <button onClick={()=>setStep(1)} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">мқҙм „</button>
                      <button onClick={()=>{
                        if(config.matchType==='doubles')setStep(3);
                        else if(config.matchType==='team')setStep(5);
                        else if(isGroupType)setStep(4);
                        else handleGenerate(participants);
                      }} disabled={participants.length<2} className={`flex-[2] py-4 rounded-2xl font-black text-xl ${participants.length>=2?'bg-blue-600 text-white':'bg-slate-200 text-slate-400'}`}>лӢӨмқҢ лӢЁкі„лЎң</button>
                    </div>
                  </div>
                )}
                {step===3&&<DoublesPairingView participants={participants} onBack={()=>setStep(2)} onComplete={teams=>{setActiveParticipants(teams);if(isGroupType)setStep(4);else handleGenerate(teams);}}/>}
                {step===5&&<TeamGroupingView participants={participants} onBack={()=>setStep(2)} onComplete={teams=>{setActiveParticipants(teams);setStep(6);}}/>}
                {step===6&&<TeamFormatView selectedFormat={config.teamFormat} selectedRounds={config.teamRounds} onSelectFormat={f=>setConfig({...config,teamFormat:f})} onSelectRounds={r=>setConfig({...config,teamRounds:r})} onBack={()=>setStep(5)} onComplete={()=>{if(isGroupType)setStep(4);else handleGenerate(activeParticipants);}}/>}
                {step===4&&<GroupSetupSelectionView participants={activeParticipants.length>0?activeParticipants:participants} onBack={()=>{if(config.matchType==='doubles')return setStep(3);if(config.matchType==='team')return setStep(6);return setStep(2);}} onComplete={gd=>handleGenerate(gd)}/>}
              </div>
            )}
          </main>

          {/* Modals */}
          {selectedMatch&&<MatchResultModal match={selectedMatch} config={config} onClose={()=>setSelectedMatch(null)} onSave={handleUpdateMatch}/>}
          {selectedLeagueMatch&&<LeagueMatchModal match={selectedLeagueMatch.match} config={config} onClose={()=>setSelectedLeagueMatch(null)} onSave={handleUpdateLeagueMatch}/>}

          {/* рҹ”“ кіөмң  нҺҳмқҙм§Җ вҖ” л№„л°ҖлІҲнҳё мһ…л Ҙ лӘЁлӢ¬ */}
          {showPasswordModal&&(
            <PasswordPromptModal
              correctPassword={config.sharePassword}
              onSuccess={()=>{
                setShareEditMode(true);
                setShowPasswordModal(false);
              }}
              onClose={()=>setShowPasswordModal(false)}
            />
          )}
          {showAttendance&&<AttendanceModal participants={(()=>{
            // м¶ңкІ° лҢҖмғҒ = нҷңм„ұ м°ёк°Җмһҗ (мЎ°лі„мқҙл©ҙ лӘЁл“  мЎ°мқҳ participants, н’ҖлҰ¬к·ёл©ҙ activeParticipants)
            const pool = [];
            const seen = new Set();
            const addAll = (arr) => (arr||[]).forEach(p=>{
              if(!p||!p.id) return;
              if(p.id.startsWith('bye')) return;
              if(seen.has(p.id)) return;
              seen.add(p.id); pool.push(p);
            });
            if(generatedGroups && generatedGroups.length>0){
              generatedGroups.forEach(g=>addAll(g.participants));
            }
            addAll(activeParticipants);
            addAll(participants);
            return pool;
          })()} onToggle={handleToggleAttendance} onClose={()=>setShowAttendance(false)}/>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- ============================================================ -->
  <!--  PWA Service Worker л“ұлЎқ                                       -->
  <!--  + "нҷҲ нҷ”л©ҙм—җ м„Өм№ҳ" м•ҲлӮҙ л°°л„Ҳ                                   -->
  <!-- ============================================================ -->
  <script>
    // в”Җв”Җ 1. Service Worker л“ұлЎқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            console.log('[PWA] Service Worker л“ұлЎқ м„ұкіө:', reg.scope);

            // мғҲ лІ„м „ нҷ•мқё вҖ” м—…лҚ°мқҙнҠё мһҲмңјл©ҙ мһҗлҸҷ нҷңм„ұнҷ”
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] мғҲ лІ„м „ мӨҖл№„лҗЁ вҖ” мғҲлЎңкі м№Ё мӢң м Ғмҡ©');
                  // мһҗлҸҷ м Ғмҡ© (мӮ¬мҡ©мһҗм—җкІҢ мғҲлЎңкі м№Ё к¶Ңмң лҠ” м„ нғқ)
                  newWorker.postMessage('SKIP_WAITING');
                }
              });
            });

            // 1мӢңк°„л§ҲлӢӨ м—…лҚ°мқҙнҠё мІҙнҒ¬
            setInterval(() => reg.update(), 60 * 60 * 1000);
          })
          .catch(err => console.warn('[PWA] Service Worker л“ұлЎқ мӢӨнҢЁ:', err));
      });

      // SWк°Җ мғҲ лІ„м „мңјлЎң м „нҷҳлҗҳл©ҙ н•ң лІҲл§Ң мғҲлЎңкі м№Ё
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    }

    // в”Җв”Җ 2. "нҷҲ нҷ”л©ҙм—җ м¶”к°Җ" л°°л„Ҳ (Android Chrome) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallBanner();
    });

    function showInstallBanner() {
      // мқҙлҜё м„Өм№ҳн–Ҳкұ°лӮҳ кұ°л¶Җн–Ҳмңјл©ҙ н‘ңмӢң м•Ҳ н•Ё
      if (localStorage.getItem('pwa-install-dismissed') === '1') return;
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      if (document.getElementById('pwa-install-banner')) return;

      const banner = document.createElement('div');
      banner.id = 'pwa-install-banner';
      banner.style.cssText = `
        position: fixed; bottom: 16px; left: 16px; right: 16px;
        background: #1e293b; color: white; padding: 14px 18px;
        border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        z-index: 9999; display: flex; align-items: center; gap: 12px;
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 480px; margin: 0 auto;
        animation: fade-in 0.4s ease-out;
      `;
      banner.innerHTML = `
        <img src="./icons/icon-192.png" alt="MatchMaker Pro" style="width:42px;height:42px;border-radius:10px;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:900;font-size:14px;">м•ұмңјлЎң м„Өм№ҳн•ҳкё°</div>
          <div style="font-size:12px;color:#94a3b8;margin-top:2px;">нҷҲ нҷ”л©ҙм—җм„ң л№ лҘҙкІҢ мӢӨн–үн•ҳм„ёмҡ”</div>
        </div>
        <button id="pwa-install-btn" style="background:#3b82f6;color:white;border:0;padding:8px 14px;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;flex-shrink:0;">м„Өм№ҳ</button>
        <button id="pwa-dismiss-btn" style="background:transparent;color:#64748b;border:0;font-size:18px;cursor:pointer;padding:4px 8px;flex-shrink:0;">вң•</button>
      `;
      document.body.appendChild(banner);

      document.getElementById('pwa-install-btn').addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('[PWA] м„Өм№ҳ кІ°кіј:', outcome);
        deferredPrompt = null;
        banner.remove();
      });
      document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
        localStorage.setItem('pwa-install-dismissed', '1');
        banner.remove();
      });

      // 30мҙҲ нӣ„ мһҗлҸҷ лӢ«нһҳ (лҚң кұ°мҠ¬лҰ¬кІҢ)
      setTimeout(() => banner.remove(), 30000);
    }

    // в”Җв”Җ 3. iOS Safari м•ҲлӮҙ (AndroidмҷҖ лӢ¬лҰ¬ мһҗлҸҷ н”„лЎ¬н”„нҠё X) в”Җв”Җв”Җв”Җв”Җв”Җ
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isInStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    }
    window.addEventListener('load', () => {
      if (isIOS() && !isInStandalone() && localStorage.getItem('pwa-ios-hint-dismissed') !== '1') {
        // iOSлҠ” м§Ғм ‘ м•ҲлӮҙ (3мҙҲ нӣ„ н‘ңмӢң)
        setTimeout(() => {
          if (document.getElementById('pwa-install-banner')) return;
          const banner = document.createElement('div');
          banner.id = 'pwa-install-banner';
          banner.style.cssText = `
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            background: #1e293b; color: white; padding: 14px 18px;
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 9999; font-family: system-ui, -apple-system, sans-serif;
            max-width: 480px; margin: 0 auto; animation: fade-in 0.4s ease-out;
          `;
          banner.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;">
              <img src="./icons/icon-192.png" style="width:42px;height:42px;border-radius:10px;">
              <div style="flex:1;">
                <div style="font-weight:900;font-size:14px;">м•ұмңјлЎң м„Өм№ҳн•ҳкё°</div>
                <div style="font-size:12px;color:#94a3b8;margin-top:4px;">
                  н•ҳлӢЁ кіөмң  лІ„нҠј <span style="color:#3b82f6;font-size:14px;">в¬Ҷ</span> вҶ’ "нҷҲ нҷ”л©ҙм—җ м¶”к°Җ"
                </div>
              </div>
              <button id="pwa-ios-dismiss" style="background:transparent;color:#64748b;border:0;font-size:18px;cursor:pointer;padding:4px 8px;">вң•</button>
            </div>
          `;
          document.body.appendChild(banner);
          document.getElementById('pwa-ios-dismiss').addEventListener('click', () => {
            localStorage.setItem('pwa-ios-hint-dismissed', '1');
            banner.remove();
          });
          setTimeout(() => banner.remove(), 30000);
        }, 3000);
      }
    });

    // в”Җв”Җ 4. м„Өм№ҳ мҷ„лЈҢ к°җм§Җ (к°җмӮ¬ л©”мӢңм§Җ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] м•ұ м„Өм№ҳ мҷ„лЈҢ!');
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.remove();
    });
  </script>
</body>
