  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // ================================================================

    // ================================================================
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyBNT1g3ipZJNjrpQB24kolH5LukqpVf500",
      authDomain:        "matchmaker-pro-90a1b.firebaseapp.com",

    // ================================================================

    const LS_KEY = 'matchmaker_pro_tournaments';

    // рҹ“Ғ нҸҙлҚ” н—¬нҚј
    const lsGetFolders = () => {

    };

    // вӯҗ мҰҗкІЁм°ҫкё° н—¬нҚј (л°°м—ҙлЎң м ҖмһҘ)

    const lsSaveFavorites = (favs) => {

    // FirebaseлҠ” undefined к°’мқ„ н—Ҳмҡ©н•ҳм§Җ м•ҠмқҢ вҖ” JSON мҷ•ліөмңјлЎң undefined нӮӨ м ңкұ°
    const sanitizeForFirebase = (obj) => {
      try { return JSON.parse(JSON.stringify(obj)); }
      catch(e) { return obj; }
    };

    // Firebase м—°кІ° мғҒнғң вҖ” н•ңлІҲмқҙлқјлҸ„ м ҖмһҘ мӢӨнҢЁн•ҳл©ҙ мӮ¬мҡ©мһҗм—җкІҢ м•ҢлҰј
    window.__fbWarned = false;
    const fbSave = async (id, record) => {
      const clean = sanitizeForFirebase(record);
      // вӯҗ м•Ҳм „мһҘм№ҳ: Firebaseм—җ мқҙлҜё folderIdк°Җ мһҲмңјл©ҙ мғҲ recordм—җлҸ„ мң м§Җ
      if (clean.folderId === undefined || clean.folderId === null) {
        try {
          const snap = await db.ref('tournaments/'+id+'/folderId').once('value');
          const existingFolderId = snap.val();
          if (existingFolderId) {
            clean.folderId = existingFolderId;
            console.log('[fbSave] folderId ліөкө¬:', id, 'вҶ’', existingFolderId);
          }
        } catch(e) { /* л¬ҙмӢң */ }
      }
      lsSave(id, clean); // мҰүмӢң localStorageм—җ м ҖмһҘ
      try {
        await db.ref('tournaments/'+id).set(clean);
      } catch(e) {
        console.error('рҹ”Ҙ Firebase м ҖмһҘ мӢӨнҢЁ:', e, '\nм ҖмһҘ мӢңлҸ„н•ң лҚ°мқҙн„°:', clean);
        if (!window.__fbWarned) {
          window.__fbWarned = true;
          alert('вҡ пёҸ Firebaseм—җ м ҖмһҘмқҙ мӢӨнҢЁн•ҳкі  мһҲмҠөлӢҲлӢӨ.\n\nмӣҗмқё к°ҖлҠҘм„ұ:\n1. Firebase Realtime DB к·ңм№ҷ(.read/.write)мқҙ л§үнҳҖмһҲмқҢ\n2. лҚ°мқҙн„°м—җ н—Ҳмҡ©лҗҳм§Җ м•ҠмқҖ к°’(undefined л“ұ)\n3. мқён„°л„· м—°кІ° л¬ём ң\n\nмһ„мӢңлЎң мқҙ лёҢлқјмҡ°м Җ(localStorage)м—җлҠ” м ҖмһҘлҗҳм§Җл§Ң, лӢӨлҘё кё°кё°м—җм„ңлҠ” м•Ҳ ліҙмһ…лӢҲлӢӨ.\n\nм—җлҹ¬: ' + (e.message || e.toString()));
        }
      }
    };
    const fbDelete = async (id) => {
      lsDelete(id);
      try { await db.ref('tournaments/'+id).remove(); } catch(e) { console.warn('Firebase мӮӯм ң мӢӨнҢЁ:', e); }
    };
    const fbSaveShare = async (record) => {
      const shareId = Math.random().toString(36).substr(2,9);
      try {
        await db.ref('shares/'+shareId).set({data:JSON.stringify(record),createdAt:Date.now()});
      } catch(e) {
        // Firebase мӢӨнҢЁ мӢң localStorageм—җ share м ҖмһҘ
        try { const d=JSON.parse(localStorage.getItem('mm_shares')||'{}'); d[shareId]={data:JSON.stringify(record)}; localStorage.setItem('mm_shares',JSON.stringify(d)); } catch(e2) {}
      }
      return shareId;
    };

    // рҹ“Ғ Firebase нҸҙлҚ” м ҖмһҘ/мЎ°нҡҢ
    const fbSaveFolders = async (folders) => {
      lsSaveFolders(folders);
      try {
        await db.ref('folders').set(sanitizeForFirebase(folders));
      } catch(e) { console.warn('Firebase нҸҙлҚ” м ҖмһҘ мӢӨнҢЁ:', e); }
    };
    const fbLoadFolders = async () => {
      try {
        const snap = await db.ref('folders').once('value');
        const val = snap.val();
        if (val) { lsSaveFolders(val); return val; }
      } catch(e) { console.warn('Firebase нҸҙлҚ” лЎңл”© мӢӨнҢЁ:', e); }
      return lsGetFolders();
    };
    const fbGetShare = async (shareId) => {
      try {
        const s=await db.ref('shares/'+shareId).once('value');
        const v=s.val();
        if(v&&v.data) { try{return JSON.parse(v.data);}catch(e){} }
      } catch(e) {}
      // localStorage fallback
      try { const d=JSON.parse(localStorage.getItem('mm_shares')||'{}'); if(d[shareId]?.data) return JSON.parse(d[shareId].data); } catch(e) {}
      return null;
    };
    // Firebase м„ём…ҳ вҖ” URL нҢҢлқјлҜён„° лҢҖмӢ  Firebaseм—җ м„ём…ҳ м ҖмһҘ (н•ҷкөҗ лҸ„л©”мқё лҰ¬лӢӨмқҙл үнҠё лҢҖмқ‘)
    const fbCreateSession = async (type, tournamentId, matchId='') => {
      const sid = Math.random().toString(36).substr(2,6).toUpperCase();
      await db.ref('sessions/'+sid).set({type, tournamentId, matchId, createdAt:Date.now()});
      return sid;
    };
    const fbGetSession = async (sid) => {
      const s = await db.ref('sessions/'+sid).once('value');
      return s.val();
    };

    // ================================================================
    //  GAS API лһҳнҚј вҖ” кө¬кёҖ мӢңнҠё м—°лҸҷ м „мҡ© (fetch + JSON)
    //  в–ё Content-Type н—ӨлҚ” лҜём§Җм • вҶ’ text/plain вҶ’ CORS preflight нҡҢн”ј
    // ================================================================
    const gasCall = async (action, payload = {}) => {
      if (!window.GAS_API_URL || window.GAS_API_URL.includes('PASTE_YOUR')) {
        throw new Error('GAS_API_URLмқҙ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. index.html мғҒлӢЁм—җм„ң ліёмқё GAS л°°нҸ¬ URLмқ„ мһ…л Ҙн•ҳм„ёмҡ”.');
      }
      let res;
      try {
        res = await fetch(window.GAS_API_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...payload }),
          redirect: 'follow',
        });
      } catch (e) {
        throw new Error('л„ӨнҠёмӣҢнҒ¬ мҳӨлҘҳ вҖ” GAS URLмқҙ мһҳлӘ»лҗҗкұ°лӮҳ мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҳм„ёмҡ”. (' + e.message + ')');
      }
      if (!res.ok) throw new Error('GAS HTTP ' + res.status + ' вҖ” л°°нҸ¬к°Җ "лӘЁл“  мӮ¬мҡ©мһҗ" к¶Ңн•ңмқём§Җ нҷ•мқён•ҳм„ёмҡ”.');
      const text = await res.text();
      // JSON нҢҢмӢұ мӢӨнҢЁ = HTML(лЎңк·ёмқё нҺҳмқҙм§Җ л“ұ) мқ‘лӢөмқј к°ҖлҠҘм„ұ
      let data;
      try { data = JSON.parse(text); }
      catch (e) {
        const preview = text.substring(0, 200);
        console.error('[gasCall] JSON нҢҢмӢұ мӢӨнҢЁ. мқ‘лӢө лӮҙмҡ©:', preview);
        throw new Error('GAS мқ‘лӢөмқҙ JSONмқҙ м•„лӢҷлӢҲлӢӨ. л°°нҸ¬ к¶Ңн•ңмқ„ "лӘЁл“  мӮ¬мҡ©мһҗ"лЎң лӢӨмӢң м„Өм •н•ҳкі  мғҲ лІ„м „мңјлЎң мһ¬л°°нҸ¬н•ҳм„ёмҡ”. (мқ‘лӢө: ' + preview.substring(0, 100) + '...)');
      }
      if (data && data.success === false) throw new Error(data.error || 'GAS лӮҙл¶Җ мҳӨлҘҳ');
      return data;
    };

    // ================================================================
    //  мғҒмҲҳ
    // ================================================================
    const SPORTS_LIST = [
      { id: 'soccer',      name: 'м¶•кө¬',    icon: 'вҡҪ' },
      { id: 'basketball',  name: 'лҶҚкө¬',    icon: 'рҹҸҖ' },
      { id: 'badminton',   name: 'л°°л“ңлҜјн„ҙ', icon: 'рҹҸё' },
      { id: 'tennis',      name: 'н…ҢлӢҲмҠӨ',  icon: 'рҹҺҫ' },
      { id: 'tabletennis', name: 'нғҒкө¬',    icon: 'рҹҸ“' },
      { id: 'volleyball',  name: 'л°°кө¬',    icon: 'рҹҸҗ' },
      { id: 'custom',      name: 'кё°нғҖ',    icon: 'рҹҸҶ' },
    ];
    // м„ёнҠём ңлЎң м§„н–үн•ҳлҠ” мў…лӘ© вҖ” л°°л“ңлҜјн„ҙ, н…ҢлӢҲмҠӨ, нғҒкө¬, л°°кө¬
    const SETS_SPORTS = ['badminton','tennis','tabletennis','volleyball'];
    const isSetsGame = (sport) => SETS_SPORTS.includes(sport);
    // н…ҢлӢҲмҠӨл§Ң нҠ№мҲҳ лЎңм§Ғ мӮ¬мҡ©
    const isTennis = (sport) => sport === 'tennis';
    // м„ нғқ к°ҖлҠҘн•ң м„ёнҠём ң мҳөм…ҳ: лӢЁнҢҗ / 3нҢҗ 2м„ мҠ№ / 5нҢҗ 3м„ мҠ№
    const SETS_OPTIONS = [
      { value: 1, label: 'лӢЁнҢҗм ң',      sub: '1м„ёнҠё' },
      { value: 3, label: '3нҢҗ 2м„ мҠ№м ң', sub: '3м„ёнҠё' },
      { value: 5, label: '5нҢҗ 3м„ мҠ№м ң', sub: '5м„ёнҠё' },
    ];
    // н…ҢлӢҲмҠӨ вҖ” м„ёнҠёлӢ№ кІҢмһ„мҲҳ мҳөм…ҳ
    const TENNIS_GAMES_OPTIONS = [
      { value: 4, label: '4кІҢмһ„ м„ мҠ№', sub: 'к°„мқҙ' },
      { value: 6, label: '6кІҢмһ„ м„ мҠ№', sub: 'м •мӢқ (кё°ліё)' },
      { value: 8, label: '8кІҢмһ„ м„ мҠ№', sub: 'н”„лЎң м…Ӣ' },
    ];

    // ================================================================
    //  рҹҺҫ н…ҢлӢҲмҠӨ м җмҲҳ м—”м§„ вҖ” м •м„қ ATP/WTA лЈ°
    // ================================================================
    // нҸ¬мқёнҠё лӢЁкі„: 0 вҶ’ 15 вҶ’ 30 вҶ’ 40 вҶ’ (кІҢмһ„мҠ№ or л“ҖмҠӨ)
    const TENNIS_POINTS = [0, 15, 30, 40];
    const ptDisplay = (p, isAd) => isAd ? 'AD' : (p<=3 ? TENNIS_POINTS[p] : 40);

    // н•ң нҸ¬мқёнҠё нӣ„мқҳ мғҒнғң кі„мӮ°
    // state: {gA, gB, pA, pB, isDeuce, advA, advB, isTiebreak, tbA, tbB}
    // settings: {gamesPerSet, deuce: true=л“ҖмҠӨ, false=л…ём• л“ң, tiebreak: true, isFinalSet: boolean}
    // scorer: 'A' or 'B'
    function tennisScorePoint(state, settings, scorer) {
      const next = {...state};
      const {gamesPerSet, deuce, tiebreak, isFinalSet} = settings;

      // 1. нғҖмқҙлёҢл ҲмқҙнҒ¬ м§„н–ү мӨ‘
      if(next.isTiebreak){
        if(scorer==='A') next.tbA++; else next.tbB++;
        // л§Ҳм§Җл§ү м„ёнҠё л§Өм№ҳ нғҖмқҙлёҢл ҲмқҙнҒ¬л©ҙ 10м җ, мқјл°ҳмқҖ 7м җ
        const tbTarget = isFinalSet ? 10 : 7;
        const tbA = next.tbA, tbB = next.tbB;
        if(tbA >= tbTarget && tbA - tbB >= 2){
          // A нғҖмқҙлёҢл ҲмқҙнҒ¬ мҠ№
          next.gA++; next.tbA = 0; next.tbB = 0; next.isTiebreak = false;
          return endGame(next, settings);
        }
        if(tbB >= tbTarget && tbB - tbA >= 2){
          next.gB++; next.tbA = 0; next.tbB = 0; next.isTiebreak = false;
          return endGame(next, settings);
        }
        return next;
      }

      // 2. л“ҖмҠӨ лӘЁл“ң (40-40)
      if(next.isDeuce){
        if(deuce){
          // м–ҙл“ңл°ҙнӢ°м§Җ лЈ°
          if(scorer==='A'){
            if(next.advB){ next.advB=false; } // B м–ҙл“ң вҶ’ л“ҖмҠӨлЎң ліөк·Җ
            else if(next.advA){ // Aк°Җ м–ҙл“ң + A л“қм җ вҶ’ кІҢмһ„мҠ№
              next.advA=false; next.isDeuce=false; next.pA=0; next.pB=0;
              next.gA++;
              return endGame(next, settings);
            }
            else { next.advA=true; }
          } else {
            if(next.advA){ next.advA=false; }
            else if(next.advB){
              next.advB=false; next.isDeuce=false; next.pA=0; next.pB=0;
              next.gB++;
              return endGame(next, settings);
            }
            else { next.advB=true; }
          }
        } else {
          // л…ём• л“ң вҖ” лӢӨмқҢ 1м җ л”°лҠ” мӮ¬лһҢмқҙ кІҢмһ„ к°Җм ёк°җ
          next.isDeuce=false; next.pA=0; next.pB=0;
          if(scorer==='A') next.gA++; else next.gB++;
          return endGame(next, settings);
        }
        return next;
      }

      // 3. мқјл°ҳ нҸ¬мқёнҠё
      if(scorer==='A') next.pA++; else next.pB++;

      // 3-1. 40-40 м§„мһ… вҶ’ л“ҖмҠӨ
      if(next.pA===3 && next.pB===3){
        next.isDeuce = true;
        return next;
      }
      // 3-2. лҲ„кө°к°Җ 40 мқҙмғҒмқҙкі  мғҒлҢҖліҙлӢӨ 2м җ м°Ёмқҙл©ҙ кІҢмһ„мҠ№
      if(next.pA>=4 && next.pA - next.pB >= 2){
        next.pA=0; next.pB=0; next.gA++;
        return endGame(next, settings);
      }
      if(next.pB>=4 && next.pB - next.pA >= 2){
        next.pA=0; next.pB=0; next.gB++;
        return endGame(next, settings);
      }
      return next;
    }

    // кІҢмһ„ мў…лЈҢ нӣ„ м„ёнҠё/нғҖмқҙлёҢл ҲмқҙнҒ¬ м§„мһ… м—¬л¶Җ нҢҗлӢЁ
    function endGame(state, settings){
      const {gamesPerSet, tiebreak, isFinalSet} = settings;
      const {gA, gB} = state;

      // л§Ҳм§Җл§ү м„ёнҠё л§Өм№ҳ нғҖмқҙлёҢл ҲмқҙнҒ¬ лӘЁл“ң вҖ” gamesPerSet л¬ҙмӢң, 10м җ л§Өм№ҳ нғҖмқҙлёҢл ҲмқҙнҒ¬
      // (3нҢҗ2м„ мҠ№мқҳ 3м„ёнҠё лҳҗлҠ” 5нҢҗ3м„ мҠ№мқҳ 5м„ёнҠёк°Җ 1-1 лҳҗлҠ” 2-2мқј л•Ң)

      // мқјл°ҳ м„ёнҠё мў…лЈҢ
      // 6кІҢмһ„ м„ мҠ№: 6-0~6-4 = м„ёнҠёмҠ№, 5-5 вҶ’ 7кІҢмһ„м„ мҠ№(6-5лҠ” кі„мҶҚ), 6-6 вҶ’ нғҖмқҙлёҢл ҲмқҙнҒ¬
      const target = gamesPerSet;

      if(gA === target && gB <= target - 2){
        // 6-0 ~ 6-4 мІҳлҹј к№”лҒ”н•ң мҠ№
        return endSet(state, 'A');
      }
      if(gB === target && gA <= target - 2){
        return endSet(state, 'B');
      }
      // 5-5 мғҒнҷ©: н•ң кІҢмһ„ лҚ” мқҙм–ҙк°Җм„ң 7-5л©ҙ мў…лЈҢ
      if(gA === target + 1 && gB <= target - 1){
        // 7-5
        return endSet(state, 'A');
      }
      if(gB === target + 1 && gA <= target - 1){
        return endSet(state, 'B');
      }
      // 6-6 лҳҗлҠ” 4-4 (4кІҢмһ„ м„ мҠ№мқҳ кІҪмҡ°) вҶ’ нғҖмқҙлёҢл ҲмқҙнҒ¬
      if(tiebreak && gA === target && gB === target){
        state.isTiebreak = true;
        state.tbA = 0; state.tbB = 0;
      }
      return state;
    }

    // м„ёнҠё мў…лЈҢ мІҳлҰ¬
    function endSet(state, winner){
      if(winner==='A') state.sA++; else state.sB++;
      state.gA = 0; state.gB = 0;
      state.pA = 0; state.pB = 0;
      state.advA = false; state.advB = false;
      state.isDeuce = false;
      state.isTiebreak = false;
      state.tbA = 0; state.tbB = 0;
      // м„ёнҠё нһҲмҠӨнҶ лҰ¬ кё°лЎқ
      if(!state.setHistory) state.setHistory = [];
      // л§Ҳм§Җл§ү м„ёнҠё м җмҲҳ (м§Ғм „ кІҢмһ„ кІ°кіј)
      return state;
    }

    // мҙҲкё° н…ҢлӢҲмҠӨ мғҒнғң
    function initTennisState(){
      return {
        sA:0, sB:0,                    // л§Өм№ҳ м„ёнҠё мҠӨмҪ”м–ҙ
        gA:0, gB:0,                    // нҳ„мһ¬ м„ёнҠё кІҢмһ„ мҠӨмҪ”м–ҙ
        pA:0, pB:0,                    // нҳ„мһ¬ кІҢмһ„ нҸ¬мқёнҠё (0~3 вҶ’ 0/15/30/40)
        advA:false, advB:false,        // м–ҙл“ңл°ҙнӢ°м§Җ ліҙмң  м—¬л¶Җ
        isDeuce:false,                 // л“ҖмҠӨ мғҒнғң
        isTiebreak:false,              // нғҖмқҙлёҢл ҲмқҙнҒ¬ м§„н–ү мӨ‘
        tbA:0, tbB:0,                  // нғҖмқҙлёҢл ҲмқҙнҒ¬ м җмҲҳ
        setHistory:[]                  // [{gA, gB}, ...] мҷ„лЈҢлҗң м„ёнҠё кІҢмһ„мҲҳ
      };
    }
    const MATCH_TYPES = [
      { id: 'individual', name: 'к°ңмқём „', icon: 'рҹ‘Ө' },
      { id: 'doubles',    name: 'ліөмӢқ',   icon: 'рҹ‘Ҙ' },
      { id: 'team_match', name: 'нҢҖкІҪкё°', icon: 'вҡҪ' },
      { id: 'team',       name: 'лӢЁмІҙм „', icon: 'рҹҡ©' },
    ];
    const TEAM_FORMATS = [
      { id: '2D1S', name: '2ліөмӢқ 1лӢЁмӢқ',  matches: 3 },
      { id: '3D',   name: '3ліөмӢқ',        matches: 3 },
      { id: '4D',   name: '4ліөмӢқ',        matches: 4 },
      { id: '3S2D', name: '3лӢЁмӢқ 2ліөмӢқ',  matches: 5 },
      { id: '1S2D', name: '1лӢЁмӢқ 2ліөмӢқ',  matches: 3 },
      { id: '2S1D', name: '2лӢЁмӢқ 1ліөмӢқ',  matches: 3 },
    ];

    // к°Ғ л§Өм№ҳ мҠ¬лЎҜмқҳ лқјлІЁ (1ліө, 2ліө, 1лӢЁ л“ұ) л°ҳнҷҳ
    const getMatchSlotLabel = (formatId, matchIndex) => {
      // matchIndexлҠ” 0-based
      const labels = {
        '2D1S': ['1ліө', '2ліө', '1лӢЁ'],
        '3D':   ['1ліө', '2ліө', '3ліө'],
        '4D':   ['1ліө', '2ліө', '3ліө', '4ліө'],
        '3S2D': ['1лӢЁ', '2лӢЁ', '3лӢЁ', '1ліө', '2ліө'],
        '1S2D': ['1лӢЁ', '1ліө', '2ліө'],
        '2S1D': ['1лӢЁ', '2лӢЁ', '1ліө'],
      };
      return labels[formatId]?.[matchIndex] || `M${matchIndex+1}`;
    };

    const MAX_PARTICIPANTS = 64;
    const TType = { TOURNAMENT:'TOURNAMENT', LEAGUE:'LEAGUE', GROUP_KNOCKOUT:'GROUP_KNOCKOUT', GROUP_LEAGUE:'GROUP_LEAGUE' };

    // ================================================================
    //  лҢҖнҡҢ лЎңм§Ғ
    // ================================================================
    function getSeedOrder(size) {
      let seeds = [1];
      while (seeds.length < size) {
        const next = []; const sum = seeds.length * 2 + 1;
        for (const s of seeds) { next.push(s); next.push(sum - s); }
        seeds = next;
      }
      return seeds;
    }

    function generateTournamentBracket(participants, prefix='r') {
      const count = participants.length;
      const p2 = Math.pow(2, Math.ceil(Math.log2(count)));
      const matches = [];
      const seeded   = participants.filter(p => p && p.isSeeded).sort((a,b)=>(a.seedRank||99)-(b.seedRank||99));
      const unseeded = participants.filter(p => p && !p.isSeeded);
      const sorted   = [...seeded,...unseeded];
      const order    = getSeedOrder(p2);
      const slots    = new Array(p2).fill(null);
      sorted.forEach((p,i)=>{ const si=order.indexOf(i+1); if(si!==-1) slots[si]=p; });
      for(let i=0;i<p2;i+=2) matches.push({id:`${prefix}1-m${i/2}`,participant1:slots[i],participant2:slots[i+1],round:1,matchIndex:i/2,status:'pending'});
      let round=2; let mpr=p2/4;
      while(mpr>=1){
        for(let i=0;i<mpr;i++) matches.push({id:`${prefix}${round}-m${i}`,participant1:null,participant2:null,round,matchIndex:i,status:'pending'});
        round++; mpr/=2;
      }
      autoAdvanceByes(matches,prefix);
      return matches;
    }

    function advanceWinnerInBracket(matches, cur, winner, prefix) {
      const nr = cur.round+1; const ni = Math.floor(cur.matchIndex/2);
      const nm = matches.find(m=>m.id===`${prefix}${nr}-m${ni}`);
      if(nm){ if(cur.matchIndex%2===0) nm.participant1=winner; else nm.participant2=winner; }
    }

    function autoAdvanceByes(matches, prefix) {
      let changed=true;
      while(changed){
        changed=false;
        for(const m of matches){
          if(m.status==='pending'&&m.round===1){
            if(m.participant1&&!m.participant2){ m.status='completed';m.winnerId=m.participant1.id;m.score1=1;m.score2=0;advanceWinnerInBracket(matches,m,m.participant1,prefix);changed=true; }
            else if(!m.participant1&&m.participant2){ m.status='completed';m.winnerId=m.participant2.id;m.score1=0;m.score2=1;advanceWinnerInBracket(matches,m,m.participant2,prefix);changed=true; }
          }
        }
      }
    }

    function generateLeagueSchedule(participants, groupPrefix='', teamRounds=1) {
      const teams=[...participants];
      const isOdd=teams.length%2!==0;
      if(isOdd) teams.push({id:`bye-${groupPrefix}-${Math.random()}`,name:'нңҙмӢқ(Bye)',isSeeded:false});
      const tc=teams.length; const baseNr=tc-1; const half=tc/2;
      // лӢЁмІҙм „(нҢҖ 2к°ң)мқј л•ҢлҠ” teamRoundsлҘј к·ёлҢҖлЎң лқјмҡҙл“ң мҲҳлЎң мӮ¬мҡ©
      // к°ңмқём „(нҢҖ лӢӨмҲҳ)мқј л•ҢлҠ” н’ҖлҰ¬к·ё * teamRounds л°”нҖҙ
      const totalNr = Math.max(baseNr, 1) * Math.max(teamRounds, 1);
      const rounds=[];
      let globalRound=0;
      for(let loop=0;loop<totalNr;loop++){
        globalRound++;
        const loopList=[...teams];
        // лқјмҡҙл“ңлі„лЎң мЎ°н•© нҡҢм „
        const rot = loop % Math.max(baseNr,1);
        for(let r=0;r<rot;r++) loopList.splice(1,0,loopList.pop());
        const matches=[];
        for(let j=0;j<half;j++) matches.push({id:`l-g${groupPrefix}-r${loop}-m${j}`,home:loopList[j],away:loopList[tc-1-j],status:'pending'});
        rounds.push({roundNumber:globalRound,matches});
      }
      return rounds;
    }

    // в–ё gf/ga = кё°ліёмқҖ м„ёнҠё мҠ№мҲҳ, н•ҳм§Җл§Ң м„ёнҠём ң кІҪкё°лҠ” setScoresк°Җ мһҲмңјл©ҙ мӢӨм ң м җмҲҳ н•©кі„
    // в–ё pf/pa = н•ӯмғҒ мӢӨм ң м җмҲҳ н•©кі„ (м„ёнҠём ң) лҳҗлҠ” лӢЁмқј м җмҲҳ (л№„м„ёнҠём ң)
    // в–ё pts = мҠ№ 3м җ, л¬ҙ 1м җ, нҢЁ 1м җ (нғҒкө¬мІҳлҹј лӘЁл“  кІҪкё° м¶ңм „ ліҙмғҒ)
    // в–ё ptsAvg = мҠ№м җ / кІҪкё°мҲҳ, pfAvg = л“қм җн•© / кІҪкё°мҲҳ
    function calculateStandings(participants, rounds, isSets=false) {
      const stats={};
      participants.forEach(p=>{ stats[p.id]={
        participantId:p.id, name:p.name,
        played:0, win:0, draw:0, loss:0,
        gf:0, ga:0, gd:0,           // м„ёнҠё л“қ/мӢӨ/м°Ё (м„ёнҠём ң) лҳҗлҠ” м җмҲҳ (л№„м„ёнҠём ң)
        pf:0, pa:0, pd:0,           // мӢӨм ң м җмҲҳ л“қ/мӢӨ/м°Ё (м„ёнҠёлі„ м җмҲҳ н•©кі„)
        pts:0, ptsAvg:0, pfAvg:0
      }; });
      rounds.forEach(r=>{ r.matches.forEach(m=>{
        if(m.status==='completed'&&!m.home.id.includes('bye')&&!m.away.id.includes('bye')){
          const h=stats[m.home.id],a=stats[m.away.id];
          if(!h||!a) return;
          const sh=m.scoreHome||0, sa=m.scoreAway||0;
          h.played++; a.played++;
          h.gf+=sh; h.ga+=sa; a.gf+=sa; a.ga+=sh;
          h.gd=h.gf-h.ga; a.gd=a.gf-a.ga;

          // м„ёнҠёлі„ м җмҲҳ н•©кі„ вҖ” м„ёнҠём ң кІҪкё°м—җм„ң setScoresк°Җ мһҲмқ„ л•Ң
          if(isSets && Array.isArray(m.setScores) && m.setScores.length>0){
            let phf=0, paf=0;
            m.setScores.forEach(s=>{
              const sH=parseInt(s.h)||0, sA=parseInt(s.a)||0;
              phf+=sH; paf+=sA;
            });
            h.pf+=phf; h.pa+=paf;
            a.pf+=paf; a.pa+=phf;
          } else {
            // л№„м„ёнҠём ң лҳҗлҠ” setScores м—Ҷмңјл©ҙ кё°мЎҙ м җмҲҳк°Җ кі§ мӢӨм җмҲҳ
            h.pf+=sh; h.pa+=sa;
            a.pf+=sa; a.pa+=sh;
          }
          h.pd=h.pf-h.pa; a.pd=a.pf-a.pa;

          // мҠ№м җ: мҠ№ 3 / л¬ҙ 1 / нҢЁ 1 (лӘЁл“  кІҪкё° м°ём—¬ ліҙмғҒ)
          if(sh>sa){ h.win++; h.pts+=3; a.loss++; a.pts+=1; }
          else if(sa>sh){ a.win++; a.pts+=3; h.loss++; h.pts+=1; }
          else { h.draw++; a.draw++; h.pts+=1; a.pts+=1; }
        }
      }); });
      // нҸүк·  кі„мӮ°
      Object.values(stats).forEach(s=>{
        if(s.played>0){
          s.ptsAvg = +(s.pts/s.played).toFixed(2);
          s.pfAvg  = +(s.pf /s.played).toFixed(2);
        }
      });
      return Object.values(stats).sort((a,b)=>
        b.pts!==a.pts?b.pts-a.pts:
        b.pd !==a.pd ?b.pd -a.pd :
        b.pf !==a.pf ?b.pf -a.pf :
        b.gd !==a.gd ?b.gd -a.gd :
        b.gf -a.gf
      );
    }

    // groupsм—җм„ң к°Ғ мЎ° мғҒмң„ NлӘ…мқ„ ліём„  м§„м¶ңмӢңнӮӨлҠ” лҢҖм§„н‘ң мғқм„ұ
    // advancePerGroup: к°Ғ мЎ°м—җм„ң ліём„  м§„м¶ңмӢңнӮ¬ мқёмӣҗмҲҳ (1, 2, 3, 4 ...)
    function shuffleKnockoutPlaceholders(groups, advancePerGroup=2) {
      // к°Ғ л“ұмҲҳлі„лЎң м§„м¶ңмһҗ нӣ„ліҙ лӘЁмңјкё°
      const byRank = []; // [{rank, candidates: [{group, ...}]}]
      for(let rank=1; rank<=advancePerGroup; rank++){
        const candidates = groups.map(g=>({
          group: g,
          rank,
          pts: g.standings?.[rank-1]?.pts||0,
          gd:  g.standings?.[rank-1]?.gd||0,
          gf:  g.standings?.[rank-1]?.gf||0,
          placeholderId: `${g.id}-rank${rank}`,
          name: `${g.name} ${rank}мң„`
        }));
        byRank.push({rank, candidates});
      }

      // 1мң„л“ӨмқҖ мӢңл“ң (м„ұм ҒмҲң), лӮҳлЁём§Җ л“ұмҲҳл“ӨмқҖ м…”н”Ң
      const final = [];
      // 1мң„: мӢңл“ң (нҸ¬мқёнҠё/л“қмӢӨм°ЁлЎң м •л ¬)
      const firsts = [...(byRank[0]?.candidates||[])].sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
      firsts.forEach((f,i)=>final.push({
        id:`ph-${f.group.id}-rank1-${Math.random()}`,
        name:f.name, isSeeded:true, seedRank:i+1, placeholderId:f.placeholderId
      }));
      // 2мң„ мқҙн•ҳ: м…”н”Ң
      for(let i=1; i<byRank.length; i++){
        const shuffled = [...byRank[i].candidates].sort(()=>Math.random()-0.5);
        shuffled.forEach((s,j)=>final.push({
          id:`ph-${s.group.id}-rank${s.rank}-${Math.random()}`,
          name:s.name, isSeeded:false, seedRank:final.length+1, placeholderId:s.placeholderId
        }));
      }

      const matches = generateTournamentBracket(final,'k');
      // к°ҷмқҖ мЎ° м¶ңмӢ лҒјлҰ¬ 1лқјмҡҙл“ңм—җм„ң л§ҢлӮҳм§Җ м•ҠкІҢ м¶©лҸҢ кІҖмӮ¬
      const collision = matches.some(m=>{
        if(m.round===1&&m.participant1&&m.participant2){
          const g1=m.participant1.placeholderId?.split('-')[0];
          const g2=m.participant2.placeholderId?.split('-')[0];
          return g1===g2;
        }
        return false;
      });
      // м¶©лҸҢ мӢң мөңлҢҖ 10нҡҢ мһ¬мӢңлҸ„ (л¬ҙн•ңлЈЁн”„ л°©м§Җ)
      if(collision && !shuffleKnockoutPlaceholders._retryCount){ shuffleKnockoutPlaceholders._retryCount = 0; }
      if(collision){
        shuffleKnockoutPlaceholders._retryCount = (shuffleKnockoutPlaceholders._retryCount||0)+1;
        if(shuffleKnockoutPlaceholders._retryCount < 10){
          return shuffleKnockoutPlaceholders(groups, advancePerGroup);
        }
        shuffleKnockoutPlaceholders._retryCount = 0;
        return matches; // 10нҡҢ мӢңлҸ„ нӣ„м—җлҸ„ м¶©лҸҢмқҙл©ҙ к·ёлғҘ л°ҳнҷҳ
      }
      shuffleKnockoutPlaceholders._retryCount = 0;
      return matches;
    }

    // ================================================================
    //  BracketView
    // ================================================================
    const BracketView = ({ matches, onMatchClick, onScoreboardLink }) => {
      const maxR=Math.max(...matches.map(m=>m.round),1);
      const rounds=Array.from({length:maxR},(_,i)=>i+1);
      const champMatch=matches.find(m=>m.round===maxR);
      const champDone=champMatch?.status==='completed';
      const winner=champDone?(champMatch?.winnerId===champMatch?.participant1?.id?champMatch?.participant1:champMatch?.participant2):null;
      const runnerUp=champDone?(champMatch?.winnerId===champMatch?.participant1?.id?champMatch?.participant2:champMatch?.participant1):null;
      const gapClass = r => r===1?'gap-6':r===2?'gap-20':r===3?'gap-44':'gap-64';
      return (
        <div className="overflow-x-auto pb-8 scrollbar-hide">
          <div className="inline-flex gap-8 p-4 items-stretch min-w-full">
            {rounds.map(r=>{
              const rm=matches.filter(m=>m.round===r);
              return (
                <div key={r} className="flex flex-col" style={{minWidth:'240px'}}>
                  <h4 className="text-center font-black text-slate-400 mb-6 uppercase tracking-[0.2em] text-[12px] bg-slate-100 py-1.5 rounded-full border border-slate-200">
                    {r===maxR?'Final':`Round ${r}`}
                  </h4>
                  <div className={`flex flex-col justify-center flex-1 ${gapClass(r)}`}>
                    {rm.map(match=>{
                      const done=match.status==='completed';
                      const p1w=match.winnerId===match.participant1?.id;
                      const p2w=match.winnerId===match.participant2?.id;
                      const bye=match.round===1&&(!match.participant1||!match.participant2);
                      const p1ph=!!match.participant1?.placeholderId&&match.participant1.id?.startsWith('ph-');
                      const p2ph=!!match.participant2?.placeholderId&&match.participant2.id?.startsWith('ph-');
                      return (
                        <div key={match.id} className="relative group flex items-center gap-1">
                          <button onClick={()=>!bye&&onMatchClick(match)} disabled={bye}
                            className={`flex-1 text-left bg-white border-2 rounded-2xl shadow-sm overflow-hidden divide-y-2 divide-slate-50 transition-all ${!bye?'hover:shadow-md hover:border-blue-400 active:scale-[0.98]':'cursor-default opacity-90'} ${done?'border-green-100':'border-slate-200'}`}>
                            {/* P1 */}

    // ================================================================
    //  ScheduleSection вҖ” лқјмҡҙл“ңлі„ кІҪкё° м№ҙл“ң (нҶ кёҖ к°ҖлҠҘ, л§Өм№ҳ лІҲнҳё, кІ°м„қ н‘ңмӢң)
    // ================================================================
    const ScheduleSection = ({ rounds, config, onMatchClick, onScoreboardLink, onAddRound, onDeleteRound }) => {
      const [collapsed, setCollapsed] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);

      // лқјмҡҙл“ңл“Өмқ„ к°ҖлЎңм§ҖлҘҙл©° л§Өм№ҳл§ҲлӢӨ м „м—ӯ лІҲнҳё л¶Җм—¬ (bye м ңмҷё)
      const matchNumbers = {};
      let n = 0;
      rounds.forEach(round=>{
        (round.matches||[]).forEach(m=>{
          const bye = m.home.id.startsWith('bye') || m.away.id.startsWith('bye');
          if(!bye){ n++; matchNumbers[m.id] = n; }
        });
      });

      // нҷңм„ұ м°ёк°Җмһҗ мҲҳ кі„мӮ°
      const activeCount = (rounds||[]).length>0
        ? (rounds[0].matches||[]).filter(m=>!m.home.id.startsWith('bye')&&!m.away.id.startsWith('bye')).length * 2 + (rounds[0].matches||[]).filter(m=>m.home.id.startsWith('bye')||m.away.id.startsWith('bye')).length
        : 0;
      const perRound = Math.floor(activeCount/2);
      const fullCycle = activeCount > 1 ? activeCount-1 : 1;

      return (
        <div>
          <div className="flex items-center gap-3 mb-6 px-4 flex-wrap">
            <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Match Schedule</h3>
            <span className="text-[12px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded">мҙқ {n}кІҪкё° В· {rounds.length}лқјмҡҙл“ң</span>
            <div className="h-0.5 flex-1 bg-slate-100"></div>
            {onAddRound&&(
              <button onClick={()=>setShowAddModal(true)} className="text-[13px] font-black bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg">
                вһ• лқјмҡҙл“ң м¶”к°Җ
              </button>
            )}
            <button onClick={()=>setCollapsed(c=>!c)} className="text-[13px] font-black bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg">
              {collapsed?'в–ј нҺјм№ҳкё°':'в–І м ‘кё°'}
            </button>
          </div>
          {!collapsed&&(
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {rounds.map((round, ri)=>(
                <div key={`r${ri}-${round.roundNumber}`} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                  <div className="bg-slate-800 px-4 py-2.5 flex justify-between items-center">
                    <h4 className="font-bold text-white text-[12px] uppercase tracking-[0.2em]">лқјмҡҙл“ң {round.roundNumber}</h4>
                    {onDeleteRound?(
                      <button onClick={()=>onDeleteRound(ri)} className="text-slate-400 hover:text-white hover:bg-red-500 w-6 h-6 rounded-full flex items-center justify-center text-[13px] font-black transition-all active:scale-90" title="лқјмҡҙл“ң мӮӯм ң">вң•</button>
                    ):(
                      <div className="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                    )}
                  </div>
                  <div className="p-3 space-y-2 flex-1">
                    {round.matches.map((m, mi)=>{
                      const bye=m.home.id.startsWith('bye')||m.away.id.startsWith('bye');
                      if(bye) return <div key={`bye-${ri}-${mi}`} className="text-center py-2 px-3 bg-slate-50 rounded-xl border border-dashed border-slate-200 text-[12px] font-bold text-slate-400 italic">{m.home.id.startsWith('bye')?m.away.name:m.home.name} нңҙмӢқ</div>;
                      const done=m.status==='completed';
                      const matchNo=matchNumbers[m.id];
                      const hasAbsent=m.home.absent||m.away.absent;
                      const baseColor = hasAbsent
                        ? 'bg-amber-50 border-amber-300 hover:border-amber-400'
                        : (done
                            ? 'bg-slate-50 border-slate-100 hover:border-blue-200'
                            : 'bg-white border-slate-200 shadow-sm hover:border-blue-400 hover:shadow-md');

                      // лӢЁмІҙм „мқҙл©ҙ lineupмңјлЎң мҠ¬лЎҜлі„ м„ мҲҳлӘ… н‘ңмӢң
                      const isTeamMatch = config?.matchType === 'team';
                      const tf = TEAM_FORMATS.find(f=>f.id===config?.teamFormat);
                      const nm = tf?.matches || 3;
                      const lineup = m.lineup || null;

                      // мҠ¬лЎҜлі„ м„ мҲҳлӘ… м¶”м¶ң н—¬нҚј (лқјмҡҙл“ң 0лІҲл§Ң вҖ” л§Өм№ҳ лӢ№ мҠ¬лЎҜ н‘ңмӢң)
                      const getSlotNames = (side, si) => {
                        const slot = lineup?.[0]?.[si];
                        const players = side==='home' ? (slot?.homePlayers||[]) : (slot?.awayPlayers||[]);
                        const members = side==='home' ? (m.home?.members||[]) : (m.away?.members||[]);
                        return players.filter(Boolean).map(v=>{
                          const found = members.find(p=>p.id===v);
                          return found ? found.name : v;
                        }).filter(Boolean).join('/');
                      };

                      return (
                        <div key={`r${ri}-m${mi}-${m.id}`} className="flex gap-1.5 items-stretch">
                          <span className={`w-9 shrink-0 rounded-lg flex items-center justify-center text-base font-black ${hasAbsent?'bg-amber-400 text-white':'bg-blue-600 text-white'}`}>{matchNo}</span>
                          <button onClick={()=>onMatchClick(m)}
                            className={`flex-1 min-w-0 border transition-all group ${baseColor} ${isTeamMatch?'rounded-xl p-2':'flex items-center justify-between gap-1 text-base p-2.5 rounded-xl'}`}>
                            {isTeamMatch ? (
                              /* лӢЁмІҙм „: нҢҖлӘ… + мҠ¬лЎҜлі„ м„ мҲҳлӘ… */
                              <div className="space-y-1.5">
                                {/* нҢҖлӘ… + мҙқм җ н—ӨлҚ” */}
                                <div className="flex items-center justify-between">
                                  <span className={`text-[12px] font-black truncate ${done&&(m.scoreHome||0)>(m.scoreAway||0)?'text-blue-700':'text-slate-700'}`}>{m.home.name}</span>
                                  <span className="text-[11px] font-black text-slate-400 mx-1 shrink-0">
                                    {done?<span className="text-slate-900 bg-white border border-slate-100 px-2 py-0.5 rounded shadow-sm">{m.scoreHome}:{m.scoreAway}</span>:'VS'}
                                  </span>
                                  <span className={`text-[12px] font-black truncate text-right ${done&&(m.scoreAway||0)>(m.scoreHome||0)?'text-blue-700':'text-slate-700'}`}>{m.away.name}</span>
                                </div>
                                {/* мҠ¬лЎҜлі„ м„ мҲҳ */}
                                <div className="border-t border-slate-100 pt-1 space-y-0.5">
                                  {Array.from({length:nm}).map((_,si)=>{
                                    const label = getMatchSlotLabel(config?.teamFormat, si);
                                    const homeNames = getSlotNames('home', si);
                                    const awayNames = getSlotNames('away', si);
                                    return (
                                      <div key={si} className="grid grid-cols-[24px_1fr_14px_1fr] items-center gap-0.5 text-[10px]">
                                        <span className="font-black text-slate-400 text-center">{label}</span>
                                        <span className={`font-bold truncate ${homeNames?'text-slate-700':'text-slate-300 italic'}`}>{homeNames||'лҜёл°°м •'}</span>
                                        <span className="text-slate-200 font-black text-center">:</span>
                                        <span className={`font-bold truncate text-right ${awayNames?'text-slate-700':'text-slate-300 italic'}`}>{awayNames||'лҜёл°°м •'}</span>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            ) : (
                              /* к°ңмқём „: кё°мЎҙ н‘ңмӢң */
                              <>
                                <span className={`flex-1 min-w-0 font-black text-left truncate flex items-center gap-1 ${done&&(m.scoreHome||0)>(m.scoreAway||0)?'text-blue-700':'text-slate-800'}`}>
                                  {m.home.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded shrink-0">кІ°</span>}
                                  <span className="truncate">{m.home.name}</span>
                                </span>
                                <div className="px-1 sm:px-2 shrink-0 flex justify-center">
                                  {done?<span className="font-black text-slate-900 bg-white border border-slate-100 px-2 py-0.5 rounded shadow-sm text-sm">{m.scoreHome} : {m.scoreAway}</span>:<span className="text-sm text-slate-300 font-black italic group-hover:text-blue-400">VS</span>}
                                </div>
                                <span className={`flex-1 min-w-0 font-black text-right truncate flex items-center gap-1 justify-end ${done&&(m.scoreAway||0)>(m.scoreHome||0)?'text-blue-700':'text-slate-800'}`}>
                                  <span className="truncate">{m.away.name}</span>
                                  {m.away.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded shrink-0">кІ°</span>}
                                </span>
                              </>
                            )}
                          </button>
                          {onScoreboardLink&&(
                            <button onClick={()=>onScoreboardLink(m.id)}
                              className="w-9 bg-slate-100 hover:bg-purple-100 text-slate-400 hover:text-purple-600 rounded-xl flex items-center justify-center text-base transition-all shrink-0" title="мҠӨмҪ”м–ҙліҙл“ң">
                              рҹ“ә
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* вһ• лқјмҡҙл“ң м¶”к°Җ лӘЁлӢ¬ */}
          {showAddModal&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={()=>setShowAddModal(false)}>
              <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden" onClick={e=>e.stopPropagation()}>
                <div className="bg-blue-600 p-5 text-white text-center">
                  <p className="text-[11px] font-black text-blue-200 uppercase tracking-widest mb-1">Add Round</p>
                  <h3 className="text-xl font-black italic">лқјмҡҙл“ң м¶”к°Җ</h3>
                </div>
                <div className="p-5 space-y-3">
                  <p className="text-sm text-slate-600">м–ҙл–Ө л°©мӢқмңјлЎң лқјмҡҙл“ңлҘј м¶”к°Җн• к№Ңмҡ”?</p>
                  <button onClick={()=>{onAddRound('shuffle');setShowAddModal(false);}}
                    className="w-full p-4 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 hover:border-blue-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-blue-900 text-base">рҹҺІ м…”н”Ң н•ң лқјмҡҙл“ң</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{perRound}кІҪкё° вҖ” м°ёк°ҖмһҗлҘј л¬ҙмһ‘мң„лЎң м„һм–ҙ мғҲ лҢҖм§„</p>
                  </button>
                  <button onClick={()=>{onAddRound('roundrobin');setShowAddModal(false);}}

                  </button>
                  <button onClick={()=>setShowAddModal(false)}
                    className="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm">м·ЁмҶҢ</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );

    // ================================================================
    //  GroupStageView

    const GroupStageView = ({ groups, onMatchClick, onScoreboardLink, onAddRound, onDeleteRound, config }) => {
      const [expanded, setExpanded]   = useState({}); // мһҗм„ёнһҲ/к°„лӢЁнһҲ (м»¬лҹј мҲҳ)
      const [standingsCollapsed, setStandingsCollapsed] = useState({}); // мҲңмң„н‘ң м ‘кё°
      const sm = isSetsGame(config?.sport);
      const toggle = (gid) => setExpanded(prev=>({...prev,[gid]:!prev[gid]}));
      const toggleStandings = (gid) => setStandingsCollapsed(prev=>({...prev,[gid]:!prev[gid]}));
      return (
      <div className="space-y-12">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          {groups.map(g=>{
            const isExp = !!expanded[g.id];
            const stClosed = !!standingsCollapsed[g.id];
            // мҳӣлӮ м—җ м ҖмһҘлҗң лҚ°мқҙн„°лҠ” pfAvg к°ҷмқҖ мғҲ н•„л“ң м—ҶмқҢ вҶ’ мҰүм„қм—җм„ң лӢӨмӢң кі„мӮ°
            const standings = (g.standings && g.standings.length>0 && g.standings[0].pfAvg !== undefined)
              ? g.standings
              : calculateStandings(g.participants||[], g.rounds||[], sm);
            const leader = standings[0];
            return (
            <div key={g.id} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
              <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                <h4 className="font-bold text-lg">{g.name} мҳҲм„ </h4>
                <div className="flex items-center gap-2">
                  <button onClick={()=>toggleStandings(g.id)} className="text-[12px] font-black bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded">
                    {stClosed?'в–ј мҲңмң„ нҺјм№ҳкё°':'в–І мҲңмң„ м ‘кё°'}
                  </button>
                  {!stClosed&&(
                    <button onClick={()=>toggle(g.id)} className="text-[12px] font-black bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded">
                      {isExp?'к°„лӢЁнһҲ':'мһҗм„ёнһҲ'}
                    </button>
                  )}
                  <span className="text-sm font-black text-slate-400 bg-slate-700 px-2 py-0.5 rounded">LEAGUE</span>
                </div>
              </div>
              <div className="p-4 flex-1">
                {/* мҲңмң„ м ‘нҳ”мқ„ л•Ң: 1мң„л§Ң н‘ңмӢң */}
                {stClosed && leader && (
                  <div className="mb-4 px-3 py-2 bg-amber-50 rounded-lg border border-amber-200 flex items-center gap-2 text-sm">
                    <span className="text-amber-700">рҹ‘‘</span>
                    <span className="font-black text-amber-900">1мң„: {leader.name}</span>
                    <span className="text-amber-600 font-bold ml-auto">{leader.pts||0}м җ</span>
                  </div>
                )}
                {!stClosed && (
                <div className="overflow-x-auto mb-6">
                  <table className={`w-full ${isExp?'text-[12px]':'text-[13px] sm:text-sm'}`}>
                    <thead><tr className="text-slate-400 border-b border-slate-100 uppercase font-black">
                      <th className="text-left pb-2 w-8">мҲңмң„</th>
                      <th className="text-left pb-2">нҢҖлӘ…</th>
                      <th className="text-center pb-2">кІҪ</th>
                      <th className="text-center pb-2">мҠ№</th>
                      {!isExp&&<th className="text-center pb-2">л¬ҙ</th>}
                      <th className="text-center pb-2">нҢЁ</th>
                      {isExp&&sm&&<th className="text-center pb-2 bg-slate-50/50">м„ёнҠём°Ё</th>}
                      {isExp&&<th className="text-center pb-2">л“қм җ</th>}
                      {isExp&&<th className="text-center pb-2">мӢӨм җ</th>}
                      <th className="text-center pb-2">{isExp?'л“қмӢӨ':'л“қмӢӨ'}</th>
                      {isExp&&<th className="text-center pb-2 bg-blue-50/50">л“қм җнҸүк· </th>}
                      {isExp&&<th className="text-center pb-2 bg-blue-50/50">мҠ№м җнҸүк· </th>}
                      <th className="text-right pb-2">мҠ№м җ</th>
                    </tr></thead>
                    <tbody className="divide-y divide-slate-50">
                      {standings?.map((s,i)=>(
                        <tr key={s.participantId} className={i<2?'bg-green-50/30':''}>
                          <td className="py-2 font-black text-slate-400">{i+1}</td>
                          <td className="py-2 font-bold text-slate-800 truncate max-w-[80px]">{s.name}</td>
                          <td className="py-2 text-center text-slate-500">{s.played}</td>
                          <td className="py-2 text-center text-slate-500 font-bold">{s.win}</td>
                          {!isExp&&<td className="py-2 text-center text-slate-500">{s.draw}</td>}
                          <td className="py-2 text-center text-slate-500">{s.loss}</td>
                          {isExp&&sm&&<td className="py-2 text-center font-medium text-slate-600 bg-slate-50/30">{(s.gd||0)>0?`+${s.gd||0}`:(s.gd||0)}</td>}
                          {isExp&&<td className="py-2 text-center text-slate-700 font-medium">{s.pf||0}</td>}
                          {isExp&&<td className="py-2 text-center text-slate-500">{s.pa||0}</td>}
                          <td className="py-2 text-center font-medium text-slate-600">{(()=>{const v=isExp?(s.pd||0):(s.gd||0);return v>0?`+${v}`:v;})()}</td>
                          {isExp&&<td className="py-2 text-center text-blue-700 font-bold bg-blue-50/30">{(s.pfAvg||0).toFixed(2)}</td>}
                          {isExp&&<td className="py-2 text-center text-blue-700 font-bold bg-blue-50/30">{(s.ptsAvg||0).toFixed(2)}</td>}
                          <td className="py-2 text-right font-black text-blue-600">{s.pts}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                )}
                <GroupScheduleBlock group={g} onMatchClick={onMatchClick} onScoreboardLink={onScoreboardLink} onAddRound={onAddRound} onDeleteRound={onDeleteRound} />
              </div>
              <div className="bg-slate-50 px-4 py-2 text-[10px] text-slate-400 font-bold uppercase flex gap-4 border-t border-slate-100">
                <div className="flex items-center gap-1"><div className="w-2 h-2 bg-green-100 rounded-sm"></div>м§„м¶ңк¶Ң</div>
                <div className="flex items-center gap-1"><div className="w-2 h-2 bg-amber-300 rounded-sm"></div>кІ°м„қ нҸ¬н•Ё</div>
                <span>кё°мӨҖ: мҠ№м җ &gt; л“қмӢӨм°Ё &gt; лӢӨл“қм җ</span>
              </div>
            </div>
          );})}
        </div>
      </div>
      );
    };

    // ================================================================
    //  GroupScheduleBlock вҖ” н•ң мЎ°мқҳ кІҪкё° мҠӨмјҖмӨ„ (мЎ°л§ҲлӢӨ м ‘кё°/нҺјм№ҳкё°)
    // ================================================================
    const GroupScheduleBlock = ({ group, onMatchClick, onScoreboardLink, onAddRound, onDeleteRound }) => {
      const [collapsed, setCollapsed] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      // л§Өм№ҳ лІҲнҳё л§Өк№Җ (мЎ° лӮҙл¶Җм—җм„ң)
      const matchNumbers = {};
      let n = 0;
      (group.rounds||[]).forEach(r=>{
        (r.matches||[]).forEach(m=>{
          if(m.home.id.startsWith('bye')||m.away.id.startsWith('bye')) return;
          n++;
          matchNumbers[m.id] = n;
        });
      });
      const activeP = (group.participants||[]).filter(p=>p&&!p.id.startsWith('bye'));
      const activeN = activeP.length;
      const perRound = Math.floor(activeN/2);
      const fullCycle = activeN > 1 ? activeN-1 : 1;

      return (
        <div className="space-y-2">
          <div className="flex items-center justify-between border-b border-slate-100 pb-1 flex-wrap gap-1">
            <p className="text-[12px] font-black text-slate-400 uppercase tracking-widest">Match Schedule В· мҙқ {n}кІҪкё° В· {(group.rounds||[]).length}R</p>
            <div className="flex gap-1">
              {onAddRound&&(
                <button onClick={()=>setShowAddModal(true)} className="text-[12px] font-black bg-blue-600 hover:bg-blue-700 text-white px-2 py-0.5 rounded">
                  вһ• лқјмҡҙл“ң
                </button>
              )}
              <button onClick={()=>setCollapsed(c=>!c)} className="text-[12px] font-black bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-0.5 rounded">
                {collapsed?'в–ј нҺјм№ҳкё°':'в–І м ‘кё°'}
              </button>
            </div>
          </div>
          {!collapsed&&(
            <div className="space-y-1.5">
              {(group.rounds||[]).map((r,ri)=>(
                <div key={`grp-r${ri}-${r.roundNumber}`} className="space-y-1.5">
                  <div className="flex items-center justify-between pt-0.5">
                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">лқјмҡҙл“ң {r.roundNumber}</span>
                    {onDeleteRound&&(
                      <button onClick={()=>onDeleteRound(group.id, ri)} className="text-[11px] font-bold text-red-400 hover:text-white hover:bg-red-500 px-1.5 py-0.5 rounded transition-all active:scale-90" title="лқјмҡҙл“ң мӮӯм ң">вң• мӮӯм ң</button>
                    )}
                  </div>
                  {r.matches.map((m,mi)=>{
                if(m.home.id.startsWith('bye')||m.away.id.startsWith('bye')) return null;
                const done=m.status==='completed';
                const matchNo=matchNumbers[m.id];
                const hasAbsent=m.home.absent||m.away.absent;
                const baseColor = hasAbsent
                  ? 'bg-amber-50 border-amber-300'
                  : (done?'bg-slate-50 border-slate-100':'bg-white border-slate-100 shadow-sm');
                return (
                  <div key={`r${ri}-m${mi}-${m.id}`} className="flex gap-1 items-stretch">
                    <span className={`w-8 shrink-0 rounded flex items-center justify-center text-base font-black ${hasAbsent?'bg-amber-400 text-white':'bg-blue-600 text-white'}`}>{matchNo}</span>
                    <button onClick={()=>onMatchClick(m,group.id)}
                      className={`flex-1 flex justify-between items-center px-2.5 py-2 rounded-lg text-base transition-all hover:brightness-95 border ${baseColor}`}>
                      <span className={`flex-1 text-right font-black truncate flex items-center gap-1 justify-end ${hasAbsent?'text-amber-900':'text-slate-800'}`}>
                        {m.home.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded">кІ°</span>}
                        {m.home.name}
                      </span>
                      <div className="px-2 flex flex-col items-center">
                        {done?<span className="font-black text-blue-600 text-base">{m.scoreHome} : {m.scoreAway}</span>:<span className="text-sm text-slate-300 font-black italic">VS</span>}
                      </div>
                      <span className={`flex-1 text-left font-black truncate flex items-center gap-1 ${hasAbsent?'text-amber-900':'text-slate-800'}`}>
                        {m.away.name}
                        {m.away.absent&&<span className="text-[11px] bg-amber-500 text-white px-1 rounded">кІ°</span>}
                      </span>
                    </button>
                    {onScoreboardLink&&(
                      <button onClick={()=>onScoreboardLink(m.id)}
                        className="w-8 bg-slate-100 hover:bg-purple-100 text-slate-400 hover:text-purple-600 rounded-lg flex items-center justify-center text-base transition-all shrink-0" title="мҠӨмҪ”м–ҙліҙл“ң">
                        рҹ“ә
                      </button>
                    )}
                  </div>
                );
              })}
                </div>
              ))}
            </div>
          )}

          {/* вһ• лқјмҡҙл“ң м¶”к°Җ лӘЁлӢ¬ */}
          {showAddModal&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={()=>setShowAddModal(false)}>
              <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden" onClick={e=>e.stopPropagation()}>
                <div className="bg-blue-600 p-5 text-white text-center">
                  <p className="text-[11px] font-black text-blue-200 uppercase tracking-widest mb-1">Add Round to {group.name}</p>
                  <h3 className="text-xl font-black italic">{group.name} лқјмҡҙл“ң м¶”к°Җ</h3>
                </div>
                <div className="p-5 space-y-3">
                  <p className="text-sm text-slate-600">м–ҙл–Ө л°©мӢқмңјлЎң лқјмҡҙл“ңлҘј м¶”к°Җн• к№Ңмҡ”?</p>
                  <button onClick={()=>{onAddRound(group.id,'shuffle');setShowAddModal(false);}}
                    className="w-full p-4 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 hover:border-blue-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-blue-900 text-base">рҹҺІ м…”н”Ң н•ң лқјмҡҙл“ң</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{perRound}кІҪкё° вҖ” м°ёк°ҖмһҗлҘј л¬ҙмһ‘мң„лЎң м„һм–ҙ мғҲ лҢҖм§„</p>
                  </button>
                  <button onClick={()=>{onAddRound(group.id,'roundrobin');setShowAddModal(false);}}
                    className="w-full p-4 bg-amber-50 hover:bg-amber-100 border-2 border-amber-200 hover:border-amber-400 rounded-xl text-left transition-all active:scale-95">
                    <p className="font-black text-amber-900 text-base">рҹҸҶ н’ҖлҰ¬к·ё 1л°”нҖҙ м¶”к°Җ</p>
                    <p className="text-[12px] text-slate-600 mt-0.5">{fullCycle}лқјмҡҙл“ң {perRound*fullCycle}кІҪкё° вҖ” лӘЁл‘җ vs лӘЁл‘җ м •м„қ лЈ°</p>
                  </button>
                  <button onClick={()=>setShowAddModal(false)}
                    className="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm">м·ЁмҶҢ</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ================================================================
    //  MatchResultModal (нҶ л„ҲлЁјнҠё)
    // ================================================================
    const MatchResultModal = ({ match, config, onClose, onSave }) => {
      const isTeam = config.matchType==='team';
      const tf = TEAM_FORMATS.find(f=>f.id===config.teamFormat);
      const nm = tf?.matches||3; const nr = config.teamRounds||1;
      const [s1,setS1]=useState(match.score1??0);
      const [s2,setS2]=useState(match.score2??0);
      const [sub,setSub]=useState(Array.from({length:nr},()=>Array.from({length:nm},()=>({s1:0,s2:0}))));
      useEffect(()=>{setS1(match.score1??0);setS2(match.score2??0);},[match]);
      const applyTeam=()=>{
        let w1=0,w2=0;
        sub.forEach(r=>{let m1=0,m2=0;r.forEach(m=>{if(m.s1>m.s2)m1++;else if(m.s2>m.s1)m2++;});if(m1>m2)w1++;else if(m2>m1)w2++;});
        setS1(w1);setS2(w2);
      };
      const handleSave=()=>{
        if(s1===s2){alert('нҶ л„ҲлЁјнҠём—җм„ңлҠ” л¬ҙмҠ№л¶Җк°Җ н—Ҳмҡ©лҗҳм§Җ м•ҠмҠөлӢҲлӢӨ.');return;}
        const wid=s1>s2?(match.participant1?.id||''):(match.participant2?.id||'');
        onSave(match.id,s1,s2,wid);
      };
      if(!match.participant1&&!match.participant2) return null;
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4">
          <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
            <div className="bg-slate-900 p-4 sm:p-6 text-white flex justify-between items-center shrink-0">
              <h3 className="text-base sm:text-xl font-black italic uppercase">Enter Score {isTeam&&`(${tf?.name})`}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-sm sm:text-base">лӢ«кё°</button>
            </div>
            <div className="p-4 sm:p-8 space-y-4 sm:space-y-8 overflow-y-auto custom-scrollbar">
              {isTeam&&(
                <div className="space-y-4 sm:space-y-6 bg-slate-50 p-3 sm:p-6 rounded-xl sm:rounded-2xl border border-slate-100">
                  <div className="flex justify-between items-center">
                    <h4 className="font-black text-slate-900 text-sm sm:text-base italic">Detailed Match Results</h4>
                    <button onClick={applyTeam} className="text-[11px] sm:text-[12px] font-black bg-blue-600 text-white px-2 sm:px-3 py-1 rounded-full hover:bg-blue-700">кІ°кіј мһҗлҸҷ л°ҳмҳҒ</button>
                  </div>
                  {sub.map((round,ri)=>(
                    <div key={ri} className="space-y-2 sm:space-y-3">
                      {nr>1&&<p className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">Round {ri+1}</p>}
                      {round.map((m,mi)=>(
                        <div key={mi} className="flex items-center gap-2 sm:gap-4 bg-white p-2 sm:p-3 rounded-xl border border-slate-100 shadow-sm">
                          <span className="text-[10px] sm:text-[12px] font-black text-blue-600 w-10 sm:w-12 shrink-0 text-center">{getMatchSlotLabel(config.teamFormat, mi)}</span>
                          <div className="flex-1 flex items-center justify-between gap-1 sm:gap-2">
                            <span className="text-xs sm:text-sm font-bold text-slate-600 truncate flex-1 min-w-0">{match.participant1?.name}</span>
                            <input type="number" value={m.s1} onChange={e=>{const ns=[...sub];ns[ri][mi].s1=parseInt(e.target.value)||0;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border rounded p-1 text-sm sm:text-base shrink-0"/>
                            <span className="text-[10px] sm:text-[12px] font-black text-slate-300 italic shrink-0">VS</span>
                            <input type="number" value={m.s2} onChange={e=>{const ns=[...sub];ns[ri][mi].s2=parseInt(e.target.value)||0;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border rounded p-1 text-sm sm:text-base shrink-0"/>
                            <span className="text-xs sm:text-sm font-bold text-slate-600 truncate flex-1 min-w-0 text-right">{match.participant2?.name}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}
              <div className="grid grid-cols-2 gap-3 sm:gap-8 items-center">
                {[{p:match.participant1,s:s1,setS:setS1,col:'blue'},{p:match.participant2,s:s2,setS:setS2,col:'rose'}].map((side,i)=>(
                  <div key={i} className="text-center space-y-2 sm:space-y-4">
                    <div className={`w-12 h-12 sm:w-16 sm:h-16 bg-${side.col}-100 text-${side.col}-600 rounded-xl sm:rounded-2xl flex items-center justify-center text-xl sm:text-2xl mx-auto`}>{side.p?.name.substring(0,1)||'?'}</div>
                    <p className="font-bold text-slate-800 truncate text-sm sm:text-base">{side.p?.name||'TBD'}</p>
                    <div className="flex flex-col items-center">
                      <input type="number" value={side.s} onChange={e=>side.setS(parseInt(e.target.value)||0)} className={`w-full text-center text-2xl sm:text-3xl font-black py-2 sm:py-3 border-2 border-slate-100 rounded-xl focus:border-${side.col}-500 outline-none`}/>
                      <span className="text-[11px] sm:text-[12px] font-black text-slate-400 mt-1 uppercase">{isTeam?'Rounds Won':'Score'}</span>
                    </div>
                  </div>
                ))}
              </div>
              <div className="flex flex-col gap-2 sm:gap-3">
                <button onClick={handleSave} className="w-full py-3 sm:py-4 bg-blue-600 text-white rounded-xl sm:rounded-2xl font-black text-base sm:text-lg shadow-lg hover:bg-blue-700">кІ°кіј нҷ•м •</button>
                {match.status==='completed'&&<button onClick={()=>onSave(match.id,0,0,'',true)} className="w-full py-2.5 sm:py-3 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-100 text-sm sm:text-base">кІ°кіј мҙҲкё°нҷ”</button>}
                <button onClick={onClose} className="w-full py-2.5 sm:py-3 text-slate-400 font-bold text-sm sm:text-base">м·ЁмҶҢ</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ================================================================
    //  LeagueMatchModal
    // ================================================================
    // ================================================================
    //  AttendanceModal вҖ” кІ°м„қмғқ кҙҖлҰ¬ лӘЁлӢ¬
    // ================================================================
    const AttendanceModal = ({ participants, onToggle, onClose }) => {
      const sorted = [...participants].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      const absentCount = participants.filter(p=>p.absent).length;
      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] flex items-center justify-center p-4">
          <div className="bg-white rounded-[2rem] w-full max-w-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div className="bg-slate-800 p-6 text-white flex justify-between items-center shrink-0">
              <div>
                <p className="text-[12px] font-black text-slate-400 uppercase tracking-widest mb-1">Attendance</p>
                <h3 className="text-xl font-black italic">м¶ңкІ° кҙҖлҰ¬</h3>
                <p className="text-sm text-slate-300 mt-1">кІ°м„қ н‘ңмӢңлҗң н•ҷмғқмқҳ кІҪкё°лҠ” л…ёлһҖмғүмңјлЎң н‘ңмӢңлҗ©лӢҲлӢӨ</p>
              </div>
              <div className="text-right">
                <p className="text-[12px] font-black text-slate-400 uppercase">кІ°м„қ</p>
                <p className="text-2xl font-black text-amber-400">{absentCount}</p>
                <p className="text-[12px] text-slate-500">/ {participants.length}лӘ…</p>
              </div>
            </div>
            <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {sorted.map(p=>(
                  <button key={p.id} onClick={()=>onToggle(p.id)}
                    className={`flex items-center justify-between p-3 rounded-xl border-2 transition-all active:scale-95 ${
                      p.absent
                        ?'bg-amber-50 border-amber-400 text-amber-900'
                        :'bg-white border-slate-200 hover:border-slate-300 text-slate-700'
                    }`}>
                    <span className="font-bold truncate text-base">{p.name}</span>
                    <span className={`text-[12px] font-black px-2 py-0.5 rounded ${p.absent?'bg-amber-500 text-white':'bg-slate-100 text-slate-400'}`}>
                      {p.absent?'кІ°м„қ':'м¶ңм„қ'}
                    </span>
                  </button>
                ))}
              </div>
            </div>
            <div className="p-4 border-t border-slate-100 shrink-0">
              <button onClick={onClose} className="w-full py-3 bg-slate-900 text-white rounded-2xl font-black hover:bg-slate-800">мҷ„лЈҢ</button>
            </div>
          </div>
        </div>
      );
    };

    // ================================================================
    //  LeagueMatchModal
    // ================================================================
    const LeagueMatchModal = ({ match, config, onClose, onSave }) => {
      const isTeam=config.matchType==='team';
      const tf=TEAM_FORMATS.find(f=>f.id===config.teamFormat);
      const nm=tf?.matches||3; const nr=config.teamRounds||1;
      const isSets = isSetsGame(config.sport);
      const totalSets = config.sets || 3;
      const winSets = Math.ceil(totalSets / 2);

      // рҹ”Қ л””лІ„к№…: л§Өм№ҳ лҚ°мқҙн„° кө¬мЎ° нҷ•мқё
      React.useEffect(() => {
        if(isTeam) {
          console.log('=== рҹ”Қ LeagueMatchModal л””лІ„к№… ===');
          console.log('м „мІҙ match к°қмІҙ:', match);
          console.log('match.home:', match.home);
          console.log('match.homeмқҳ лӘЁл“  нӮӨ:', match.home ? Object.keys(match.home) : 'home м—ҶмқҢ');
          console.log('match.home.members:', match.home?.members);
          console.log('match.home.participants:', match.home?.participants);
          console.log('match.away:', match.away);
          console.log('match.awayмқҳ лӘЁл“  нӮӨ:', match.away ? Object.keys(match.away) : 'away м—ҶмқҢ');
          console.log('match.away.members:', match.away?.members);
          console.log('===================================');
        }
      }, [match, isTeam]);

      // нҢҖ м„ мҲҳ лӘ©лЎқ (лӢЁмІҙм „мқё кІҪмҡ°) - м—¬лҹ¬ кІҪлЎң мӢңлҸ„
      const homeMembers = isTeam ? (
        match.home?.members ||
        match.home?.participants ||
        match.home?.players ||
        []
      ) : [];
      const awayMembers = isTeam ? (
        match.away?.members ||
        match.away?.participants ||
        match.away?.players ||
        []
      ) : [];

      // к°Ғ мҠ¬лЎҜмқҙ ліөмӢқмқём§Җ лӢЁмӢқмқём§Җ нҢҗлі„
      const isDoublesSlot = (slotIdx) => {
        const label = getMatchSlotLabel(config.teamFormat, slotIdx);
        return label.includes('ліө');
      };

      // л¬ёмһҗм—ҙлЎң ліҙкҙҖ вҶ’ мӮ¬мҡ©мһҗк°Җ 0мқ„ м§Җмҡ°кі  мғҲлЎң мһ…л Ҙ к°ҖлҠҘ
      const [s1,setS1]=useState(String(match.scoreHome??0));
      const [s2,setS2]=useState(String(match.scoreAway??0));
      // sub: м җмҲҳ + лқјмқём—…(м„ мҲҳID л°°м—ҙ)
      const initSub = () => {
        const existingLineup = match.lineup || null;
        return Array.from({length:nr},(_,ri)=>Array.from({length:nm},(_,mi)=>{
          const ex = existingLineup?.[ri]?.[mi];
          return {
            s1: '0', s2: '0',
            homePlayers: ex?.homePlayers || [],
            awayPlayers: ex?.awayPlayers || []
          };
        }));
      };
      const [sub,setSub]=useState(initSub());
      // м„ёнҠёлі„ м җмҲҳ вҖ” м„ёнҠём ң мў…лӘ©мҡ©
      const initSets = () => {
        if(match.setScores && match.setScores.length>0){
          // кё°мЎҙ лҚ°мқҙн„°м—җм„ң ліөмӣҗ
          return Array.from({length:totalSets},(_,i)=>{
            const s=match.setScores[i];
            return s? {h:String(s.h), a:String(s.a)} : {h:'', a:''};
          });
        }
        return Array.from({length:totalSets},()=>({h:'',a:''}));
      };
      const [setRows, setSetRows] = useState(initSets());
      useEffect(()=>{
        setS1(String(match.scoreHome??0));
        setS2(String(match.scoreAway??0));
        setSetRows(initSets());
      },[match]);

      // м„ёнҠё м җмҲҳм—җм„ң мһҗлҸҷмңјлЎң м„ёнҠё мҠ№мҲҳ кі„мӮ°
      const computedFromSets = () => {
        let wh=0, wa=0;
        const valid = [];
        setRows.forEach(r=>{
          const h=parseInt(r.h), a=parseInt(r.a);
          if(isNaN(h)||isNaN(a)) return; // л№„м–ҙмһҲлҠ” м„ёнҠё л¬ҙмӢң
          if(h===a) return; // л¬ҙмҠ№л¶Җ м„ёнҠё л¬ҙмӢң
          valid.push({h,a});
          if(h>a) wh++; else wa++;
        });
        return {wh, wa, valid};
      };

      const applyTeam=()=>{
        let w1=0,w2=0;
        sub.forEach(r=>{let m1=0,m2=0;r.forEach(m=>{const a=parseInt(m.s1)||0,b=parseInt(m.s2)||0;if(a>b)m1++;else if(b>a)m2++;});if(m1>m2)w1++;else if(m2>m1)w2++;});
        setS1(String(w1));setS2(String(w2));
      };
      const handleSave=()=>{
        const lineupData = isTeam ? sub.map(round => round.map(slot => ({
          homePlayers: slot.homePlayers || [],
          awayPlayers: slot.awayPlayers || []
        }))) : null;

        if(isSets){
          const {wh, wa, valid} = computedFromSets();
          if(valid.length===0){alert('мөңмҶҢ н•ң м„ёнҠё мқҙмғҒмқҳ м җмҲҳлҘј мһ…л Ҙн•ҳм„ёмҡ”.');return;}
          if(wh<winSets && wa<winSets){
            if(!window.confirm(`м•„м§Ғ кІҪкё°к°Җ мў…лЈҢлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.\nнҳ„мһ¬ ${wh}:${wa} (${winSets}м„ёнҠё м„ мҠ№)\nк·ёлһҳлҸ„ м ҖмһҘн•ҳмӢңкІ мҠөлӢҲк№Ң?`))return;
          }
          onSave(match.id, wh, wa, valid, lineupData);
        } else {
          onSave(match.id, parseInt(s1)||0, parseInt(s2)||0, null, lineupData);
        }
      };
      const updateSetRow = (idx, side, val) => {
        setSetRows(prev=>{
          const next=[...prev];
          next[idx]={...next[idx],[side]:val};
          return next;
        });
      };

      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] flex items-center justify-center p-2 sm:p-4">
