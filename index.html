            <div className="bg-slate-800 p-4 sm:p-6 text-white text-center shrink-0">
              <p className="text-[10px] sm:text-[12px] font-black text-slate-400 uppercase tracking-widest mb-1">
                League Match {isTeam&&`(${tf?.name})`}
                {isSets&&` В· ${totalSets===1?'лӢЁнҢҗм ң':`${totalSets}нҢҗ ${winSets}м„ мҠ№`}`}
              </p>
              <h3 className="text-lg sm:text-xl font-black italic">м җмҲҳ мһ…л Ҙ</h3>
            </div>
            <div className="p-4 sm:p-8 space-y-4 sm:space-y-6 overflow-y-auto custom-scrollbar">
              {isTeam&&(
                <div className="space-y-4 sm:space-y-6 bg-slate-50 p-3 sm:p-6 rounded-xl sm:rounded-2xl border border-slate-100">
                  <div className="flex justify-between items-center">
                    <h4 className="font-black text-slate-900 text-sm sm:text-base italic">Match Lineup & Score</h4>
                    <button onClick={applyTeam} className="text-[11px] sm:text-[12px] font-black bg-blue-600 text-white px-2 sm:px-3 py-1 rounded-full hover:bg-blue-700">кІ°кіј мһҗлҸҷ л°ҳмҳҒ</button>
                  </div>



                  {sub.map((round,ri)=>(
                    <div key={ri} className="space-y-3 sm:space-y-4">
                      {nr>1&&<p className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">Round {ri+1}</p>}
                      {round.map((m,mi)=>{
                        const isDbl = isDoublesSlot(mi);
                        const neededPlayers = isDbl ? 2 : 1;
                        const homeSelected = m.homePlayers || [];
                        const awaySelected = m.awayPlayers || [];

                        const setPlayerAt = (side, pos, value) => {
                          setSub(prev=>{
                            const next = prev.map(r=>r.map(s=>({...s, homePlayers:[...(s.homePlayers||[])], awayPlayers:[...(s.awayPlayers||[])]})));
                            const slot = next[ri][mi];
                            const key = side==='home' ? 'homePlayers' : 'awayPlayers';
                            const current = [...slot[key]];
                            while(current.length<neededPlayers) current.push(null);
                            current[pos] = value || null;
                            slot[key] = current.slice(0, neededPlayers);
                            return next;
                          });
                        };

                        // л©ӨлІ„ мһҲмңјл©ҙ л“ңлЎӯлӢӨмҡҙ, м—Ҷмңјл©ҙ н…ҚмҠӨнҠё м§Ғм ‘ мһ…л Ҙ
                        const PlayerInput = ({side, members, selected, focusClass}) => (
                          <div className="space-y-1.5">
                            {Array.from({length:neededPlayers}).map((_,pi)=>{
                              const val = selected[pi] || '';
                              const ph = isDbl?(pi===0?'1лІҲ м„ мҲҳ мқҙлҰ„':'2лІҲ м„ мҲҳ мқҙлҰ„'):'м„ мҲҳ мқҙлҰ„ мһ…л Ҙ';
                              if(members.length>0){
                                return (
                                  <select key={pi} value={val} onChange={e=>setPlayerAt(side, pi, e.target.value)}
                                    className={`w-full text-[11px] sm:text-xs font-bold p-1.5 bg-slate-50 border border-slate-200 rounded-md outline-none ${focusClass}`}>
                                    <option value="">{isDbl?(pi===0?'1лІҲ м„ мҲҳ':'2лІҲ м„ мҲҳ'):'м„ мҲҳ'} м„ нғқ</option>
                                    {members.map(p=>{
                                      const inOtherPos = selected.some((sv,si)=>si!==pi && sv===p.id);
                                      if(inOtherPos) return null;
                                      return <option key={p.id} value={p.id}>{p.name}</option>;
                                    })}
                                  </select>
                                );
                              }
                              return (
                                <input key={pi} type="text" value={val} placeholder={ph}
                                  onChange={e=>setPlayerAt(side, pi, e.target.value)}
                                  className={`w-full text-[11px] sm:text-xs font-bold p-1.5 bg-white border border-slate-200 rounded-md outline-none placeholder:text-slate-300 ${focusClass}`}/>
                              );
                            })}
                          </div>
                        );

                        // м җмҲҳ н‘ңмӢңмҡ© мқҙлҰ„: л“ңлЎӯлӢӨмҡҙмқҙл©ҙ idвҶ’name ліҖнҷҳ, н…ҚмҠӨнҠё мһ…л Ҙмқҙл©ҙ к°’ к·ёлҢҖлЎң
                        const displayName = (selected, members) =>
                          selected.filter(Boolean).map(v=>{
                            const found = members.find(p=>p.id===v);
                            return found ? found.name : v;
                          }).filter(Boolean).join(' / ');

                        return (
                          <div key={mi} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="bg-blue-50 px-3 py-2 flex items-center justify-between">
                              <span className="text-xs sm:text-sm font-black text-blue-700">{getMatchSlotLabel(config.teamFormat, mi)}</span>
                              <span className="text-[10px] sm:text-[11px] font-bold text-slate-500">{isDbl?'ліөмӢқ (2лӘ…)':'лӢЁмӢқ (1лӘ…)'}</span>
                            </div>

                            {/* м„ мҲҳ мһ…л Ҙ (л“ңлЎӯлӢӨмҡҙ or н…ҚмҠӨнҠё) */}
                            <div className="p-2 sm:p-3 grid grid-cols-2 gap-2 sm:gap-3 border-b border-slate-100">
                              <div>
                                <p className="text-[9px] sm:text-[10px] font-black text-blue-600 uppercase mb-1.5 truncate">{match.home.name}</p>
                                <PlayerInput side="home" members={homeMembers} selected={homeSelected} focusClass="focus:border-blue-500"/>
                              </div>
                              <div>
                                <p className="text-[9px] sm:text-[10px] font-black text-rose-600 uppercase mb-1.5 truncate">{match.away.name}</p>
                                <PlayerInput side="away" members={awayMembers} selected={awaySelected} focusClass="focus:border-rose-500"/>
                              </div>
                            </div>

                            {/* м җмҲҳ мһ…л Ҙ */}
                            <div className="p-2 sm:p-3 flex items-center gap-2 sm:gap-3">
                              <div className="flex-1 min-w-0">
                                <p className="text-[10px] sm:text-xs font-bold text-slate-700 truncate">
                                  {displayName(homeSelected, homeMembers) || <span className="text-slate-300">м„ мҲҳ лҜёмһ…л Ҙ</span>}
                                </p>
                              </div>
                              <input type="number" inputMode="numeric" value={m.s1} onFocus={e=>e.target.select()} onChange={e=>{const ns=[...sub];ns[ri][mi].s1=e.target.value;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border border-slate-200 rounded p-1 text-sm sm:text-base shrink-0"/>
                              <span className="text-[10px] sm:text-[12px] font-black text-slate-300 italic shrink-0">VS</span>
                              <input type="number" inputMode="numeric" value={m.s2} onFocus={e=>e.target.select()} onChange={e=>{const ns=[...sub];ns[ri][mi].s2=e.target.value;setSub(ns);}} className="w-10 sm:w-12 text-center font-black border border-slate-200 rounded p-1 text-sm sm:text-base shrink-0"/>
                              <div className="flex-1 min-w-0 text-right">
                                <p className="text-[10px] sm:text-xs font-bold text-slate-700 truncate">
                                  {displayName(awaySelected, awayMembers) || <span className="text-slate-300">м„ мҲҳ лҜёмһ…л Ҙ</span>}
                                </p>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              )}

              {isSets ? (
                /* м„ёнҠём ң м җмҲҳ мһ…л Ҙ вҖ” лӘЁл°”мқј мөңм Ғнҷ” */
                <div className="space-y-3 sm:space-y-4">
                  <div className="grid grid-cols-[1fr_auto_1fr] items-center text-sm sm:text-base font-black text-slate-700 px-1 gap-2">
                    <span className="text-center truncate">{match.home.name}</span>
                    <span className="text-slate-300 text-xs sm:text-sm">vs</span>
                    <span className="text-center truncate">{match.away.name}</span>
                  </div>
                  <div className="space-y-2">
                    {setRows.map((row, idx)=>{
                      const h=parseInt(row.h), a=parseInt(row.a);
                      const valid = !isNaN(h)&&!isNaN(a)&&h!==a;
                      const homeWin = valid && h>a;
                      const awayWin = valid && a>h;
                      return (
                        <div key={idx} className="grid grid-cols-[36px_1fr_16px_1fr] sm:grid-cols-[44px_1fr_24px_1fr] items-center gap-1.5 sm:gap-3 bg-slate-50 p-2 sm:p-3 rounded-xl border border-slate-100">
                          <span className="text-[10px] sm:text-[12px] font-black text-slate-400 uppercase text-center leading-tight">SET<br/>{idx+1}</span>
                          <input type="number" inputMode="numeric" value={row.h} onFocus={e=>e.target.select()}
                            onChange={e=>updateSetRow(idx,'h',e.target.value)}
                            placeholder="0"
                            className={`w-full text-center text-xl sm:text-2xl font-black py-1.5 sm:py-2 border-b-2 outline-none transition-colors min-w-0 ${homeWin?'border-blue-500 text-blue-700 bg-blue-50':'border-slate-200 focus:border-blue-300'}`}/>
                          <span className="text-slate-300 font-black text-center text-sm sm:text-base">:</span>
                          <input type="number" inputMode="numeric" value={row.a} onFocus={e=>e.target.select()}
                            onChange={e=>updateSetRow(idx,'a',e.target.value)}
                            placeholder="0"
                            className={`w-full text-center text-xl sm:text-2xl font-black py-1.5 sm:py-2 border-b-2 outline-none transition-colors min-w-0 ${awayWin?'border-rose-500 text-rose-700 bg-rose-50':'border-slate-200 focus:border-rose-300'}`}/>
                        </div>
                      );
                    })}
                  </div>
                  {/* н•©кі„ н‘ңмӢң */}
                  {(()=>{
                    const {wh, wa} = computedFromSets();
                    const winner = wh>=winSets ? 'home' : wa>=winSets ? 'away' : null;
                    return (
                      <div className="grid grid-cols-[1fr_auto_1fr] items-center bg-slate-900 text-white p-3 sm:p-4 rounded-xl sm:rounded-2xl gap-2">
                        <span className={`text-center font-black text-base sm:text-lg ${winner==='home'?'text-green-400':''}`}>{wh}</span>
                        <span className="text-slate-500 text-[10px] sm:text-xs uppercase font-black whitespace-nowrap px-2">м„ёнҠё мҠ№мҲҳ</span>
                        <span className={`text-center font-black text-base sm:text-lg ${winner==='away'?'text-green-400':''}`}>{wa}</span>
                      </div>
                    );
                  })()}
                </div>
              ) : (
                /* мқјл°ҳ м җмҲҳ мһ…л Ҙ (м¶•кө¬/лҶҚкө¬ л“ұ) */
                <div className="grid grid-cols-[1fr_auto_1fr] items-center gap-3 sm:gap-4">
                  {[{p:match.home,s:s1,setS:setS1},{p:match.away,s:s2,setS:setS2}].map((side,i)=>(
                    <React.Fragment key={i}>
                      {i===0&&(
                        <div className="text-center space-y-2 sm:space-y-3 min-w-0">
                          <div className="text-xs sm:text-sm font-black text-slate-500 truncate uppercase">{side.p.name}</div>
                          <input type="number" inputMode="numeric" value={side.s} onFocus={e=>e.target.select()} onChange={e=>side.setS(e.target.value)} className="w-full text-center text-3xl sm:text-4xl font-black py-3 sm:py-4 border-b-4 border-slate-100 focus:border-blue-500 outline-none"/>
                          <span className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">{isTeam?'Rounds Won':'Score'}</span>
                        </div>
                      )}
                      {i===0&&<div className="text-xl sm:text-2xl font-black text-slate-200">:</div>}
                      {i===1&&(
                        <div className="text-center space-y-2 sm:space-y-3 min-w-0">
                          <div className="text-xs sm:text-sm font-black text-slate-500 truncate uppercase">{side.p.name}</div>
                          <input type="number" inputMode="numeric" value={side.s} onFocus={e=>e.target.select()} onChange={e=>side.setS(e.target.value)} className="w-full text-center text-3xl sm:text-4xl font-black py-3 sm:py-4 border-b-4 border-slate-100 focus:border-blue-500 outline-none"/>
                          <span className="text-[11px] sm:text-[12px] font-black text-slate-400 uppercase">{isTeam?'Rounds Won':'Score'}</span>
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              )}

              <div className="flex flex-col gap-2 pt-2 sm:pt-4">
                <button onClick={handleSave} className="w-full py-3 sm:py-4 bg-blue-600 text-white rounded-xl sm:rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-100 text-sm sm:text-base">кІ°кіј м ҖмһҘ</button>
                <div className="flex gap-2">
                  <button onClick={onClose} className="flex-1 py-2.5 sm:py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm sm:text-base">лӢ«кё°</button>
                  {match.status==='completed'&&<button onClick={()=>onSave(match.id,0,0,null,null,true)} className="flex-1 py-2.5 sm:py-3 bg-red-50 text-red-500 rounded-xl font-bold hover:bg-red-100 text-sm sm:text-base">кІ°кіј мҙҲкё°нҷ”</button>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ================================================================
    //  ParticipantInput вҖ” м„ұлі„ л¶„лҰ¬ м§Җмӣҗ
    // ================================================================
    const ParticipantInput = ({ participants, participantType, onAdd, onRemove, onToggleSeed, onClearAll }) => {
      const [name,setName]=useState('');
      const [gender,setGender]=useState('M'); // м§Ғм ‘ м¶”к°Җ мӢң м„ұлі„
      const [showBulk,setShowBulk]=useState(false);
      const [replace,setReplace]=useState(true);
      const [genderFilter,setGenderFilter]=useState('ALL'); // ALL | M | F
      const fileRef=useRef(null);
      const label=participantType==='individual'?'м°ёк°Җмһҗ':'нҢҖ/лӢЁмІҙ';
      const seeded=participants.filter(p=>p.isSeeded).length;
      const maleCount=participants.filter(p=>p.gender==='M').length;
      const femaleCount=participants.filter(p=>p.gender==='F').length;
      const noGenderCount=participants.filter(p=>!p.gender).length;
      const showGenderUI=maleCount>0||femaleCount>0; // м„ұлі„ лҚ°мқҙн„° мһҲмқ„ л•Ңл§Ң UI н‘ңмӢң

      const handleAdd=()=>{
        if(name.trim()&&participants.length<MAX_PARTICIPANTS){
          onAdd(name.trim(), gender);
          setName('');
        }
      };

      const dlTemplate=()=>{
        const blob=new Blob(['\ufeffмқҙлҰ„,мӢңл“ңм—¬л¶Җ(Y/N),м„ұлі„(M/F)\nнҷҚкёёлҸҷ,Y,M\nк№ҖмҳҒнқ¬,N,F\nмқҙмІ мҲҳ,N,M'],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='match_entry_template.csv';a.click();
      };

      const handleFile=e=>{
        const file=e.target.files?.[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{
          const lines=(ev.target?.result||'').split(/\r?\n/);
          const parts=[];
          for(let i=1;i<lines.length;i++){
            if(!lines[i].trim())continue;
            const cols=lines[i].split(',');
            const n=cols[0]?.trim();
            const s=cols[1]?.trim().toUpperCase();
            const g=cols[2]?.trim().toUpperCase();
            if(n) parts.push({name:n, isSeeded:s==='Y', gender:(g==='M'||g==='F')?g:null});
          }
          if(parts.length>0){
            if(replace)onClearAll();
            parts.forEach(p=>onAdd(p.name, p.gender, p.isSeeded));
            setShowBulk(false);
          }
        };
        reader.readAsText(file);
        if(fileRef.current)fileRef.current.value='';
      };

      const filteredParticipants = genderFilter==='ALL'
        ? participants
        : participants.filter(p=>(genderFilter==='M'?p.gender==='M':p.gender==='F')||(!p.gender&&genderFilter==='ALL'));

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
            <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
              <span className="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-base font-bold">2</span>
              {label} л“ұлЎқ ({participants.length}/{MAX_PARTICIPANTS})
              {showGenderUI&&<span className="text-sm font-bold text-slate-400">лӮЁ {maleCount} / м—¬ {femaleCount}{noGenderCount>0?` / лҜёл¶„лҘҳ ${noGenderCount}`:''}</span>}
            </h3>
            <div className="flex flex-wrap gap-2">
              {participants.length>0&&<button onClick={onClearAll} className="text-[13px] font-black text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 border border-red-200">рҹ—‘пёҸ мҙҲкё°нҷ”</button>}
              <button onClick={()=>setShowBulk(true)} className="text-[13px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg hover:bg-blue-100 border border-blue-100">рҹ“Ҙ мқјкҙ„ л“ұлЎқ</button>
              {participantType!=='doubles'&&<span className="text-[12px] font-black text-amber-600 bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100">мӢңл“ң: {seeded}</span>}
            </div>
          </div>

          {/* м§Ғм ‘ м¶”к°Җ вҖ” мқҙлҰ„ + м„ұлі„ */}
          <div className="flex gap-2 mb-4">
            <input type="text" value={name} onChange={e=>setName(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.nativeEvent.isComposing)handleAdd();}}
              placeholder={`${label} мқҙлҰ„ мһ…л Ҙ`}
              className="flex-1 px-4 py-3 border-2 border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-medium"/>
            <div className="flex rounded-xl border-2 border-slate-100 overflow-hidden">
              <button onClick={()=>setGender('M')} className={`px-4 py-3 font-black text-base transition-all ${gender==='M'?'bg-blue-600 text-white':'bg-slate-50 text-slate-400 hover:bg-blue-50'}`}>лӮЁ</button>
              <button onClick={()=>setGender('F')} className={`px-4 py-3 font-black text-base transition-all ${gender==='F'?'bg-rose-500 text-white':'bg-slate-50 text-slate-400 hover:bg-rose-50'}`}>м—¬</button>
            </div>
            <button onClick={handleAdd} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-base hover:bg-slate-800 shadow-lg shadow-slate-200">м¶”к°Җ</button>
          </div>

          {/* м„ұлі„ н•„н„° нғӯ вҖ” м„ұлі„ лҚ°мқҙн„° мһҲмқ„ л•Ңл§Ң н‘ңмӢң */}
          {showGenderUI&&(
            <div className="flex gap-2 mb-4">
              {[{k:'ALL',l:`м „мІҙ (${participants.length})`,c:'slate'},{k:'M',l:`лӮЁмһҗ (${maleCount})`,c:'blue'},{k:'F',l:`м—¬мһҗ (${femaleCount})`,c:'rose'}].map(({k,l,c})=>(
                <button key={k} onClick={()=>setGenderFilter(k)}
                  className={`px-4 py-2 rounded-xl text-sm font-black transition-all ${genderFilter===k?`bg-${c}-600 text-white shadow-md`:`bg-${c}-50 text-${c}-600 border border-${c}-100`}`}>
                  {l}
                </button>
              ))}
            </div>
          )}

          {/* м°ёк°Җмһҗ лӘ©лЎқ */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
            {filteredParticipants.map(p=>(
              <div key={p.id} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${p.isSeeded&&participantType!=='doubles'?'bg-amber-50 border-amber-200 shadow-sm':'bg-white border-slate-100'}`}>
                <div className="flex items-center gap-3 overflow-hidden">
                  {participantType!=='doubles'?(
                    <button onClick={()=>onToggleSeed(p.id)} className={`w-10 h-10 rounded-full flex flex-col items-center justify-center transition-all ${p.isSeeded?'bg-amber-500 text-white shadow-inner':'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                      <span className="text-sm leading-none">{p.isSeeded?'рҹ‘‘':'вӯҗ'}</span>
                      {p.isSeeded&&<span className="text-[12px] font-black">{p.seedRank}</span>}
                    </button>
                  ):<div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">рҹ‘Ө</div>}
                  <div className="flex flex-col">
                    <div className="flex items-center gap-1.5">
                      {p.gender&&<span className={`text-[11px] font-black px-1.5 py-0.5 rounded ${p.gender==='M'?'bg-blue-100 text-blue-700':'bg-rose-100 text-rose-700'}`}>{p.gender==='M'?'лӮЁ':'м—¬'}</span>}
                      <span className={`font-bold truncate max-w-[90px] ${p.isSeeded&&participantType!=='doubles'?'text-amber-900':'text-slate-700'}`}>{p.name}</span>
                    </div>
                    {p.isSeeded&&participantType!=='doubles'&&<span className="text-[11px] text-amber-600 font-bold uppercase">Seed #{p.seedRank}</span>}
                  </div>
                </div>
                <button onClick={()=>onRemove(p.id)} className="text-slate-300 hover:text-red-500 p-1 flex-shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414-1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/></svg>
                </button>
              </div>
            ))}
          </div>

          {participants.length===0&&(
            <div className="text-center py-12 space-y-4 bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-100">
              <p className="text-slate-400 italic text-base">лӘ…лӢЁмқ„ мһ…л Ҙн•ҳкұ°лӮҳ мқјкҙ„ л“ұлЎқмқ„ мқҙмҡ©н•ҳм„ёмҡ”.</p>
              <button onClick={()=>setShowBulk(true)} className="px-6 py-3 bg-white text-blue-600 rounded-xl font-bold text-base hover:shadow-md border border-blue-100">м—‘м…Җ/CSV нҢҢмқј л“ұлЎқ</button>
            </div>
          )}

          {/* мқјкҙ„ л“ұлЎқ лӘЁлӢ¬ */}
          {showBulk&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden border border-slate-200">
                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                  <h3 className="font-black italic uppercase tracking-wider">Bulk Entry</h3>
                  <button onClick={()=>setShowBulk(false)} className="text-slate-400 hover:text-white p-2">вң•</button>
                </div>
                <div className="p-8 space-y-6">
                  <div className="bg-blue-50 rounded-2xl p-4 border border-blue-100">
                    <p className="text-sm font-black text-blue-700 mb-2">рҹ“Ӣ CSV м–‘мӢқ м»¬лҹј</p>
                    <p className="text-sm font-mono text-blue-600">мқҙлҰ„, мӢңл“ңм—¬л¶Җ(Y/N), м„ұлі„(M/F)</p>
                    <p className="text-[12px] text-blue-400 mt-1">вҖ» м„ұлі„ м»¬лҹј мғқлһө мӢң лҜёл¶„лҘҳлЎң л“ұлЎқ</p>
                  </div>
                  <button onClick={dlTemplate} className="w-full py-4 bg-slate-50 text-slate-700 border border-slate-200 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-100">рҹ“„ м–‘мӢқ нҢҢмқј(CSV) лӢӨмҡҙлЎңл“ң</button>
                  <label className="flex items-center gap-3 cursor-pointer bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <input type="checkbox" checked={replace} onChange={e=>setReplace(e.target.checked)} className="w-5 h-5"/>
                    <div>
                      <span className="text-base font-black text-slate-700">кё°мЎҙ лӘ…лӢЁ мӮӯм ң нӣ„ мғҲлЎң л“ұлЎқн•ҳкё°</span>
                      <p className="text-[12px] text-slate-400 font-medium italic mt-0.5">мІҙнҒ¬ мӢң нҳ„мһ¬ л“ұлЎқлҗң {participants.length}к°ңмқҳ лӘ…лӢЁмқҙ мӮӯм ңлҗ©лӢҲлӢӨ.</p>
                    </div>
                  </label>
                  <div className="border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center space-y-4 hover:border-blue-400 transition-all bg-slate-50/50">
                    <input type="file" ref={fileRef} onChange={handleFile} accept=".csv" className="hidden"/>
                    <div className="w-16 h-16 bg-white text-blue-500 rounded-2xl flex items-center justify-center mx-auto shadow-sm"><span className="text-3xl">рҹ“Ҙ</span></div>
                    <button onClick={()=>fileRef.current?.click()} className="text-blue-600 font-black hover:underline">лӮҙ м»ҙн“Ён„°м—җм„ң нҢҢмқј м°ҫкё°</button>
                  </div>
                  <button onClick={()=>setShowBulk(false)} className="w-full py-3 text-slate-400 font-bold hover:text-slate-600">лӢ«кё°</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ================================================================
    //  DoublesPairingView
    // ================================================================
    const DoublesPairingView = ({ participants, onComplete, onBack }) => {
      const [mode,setMode]=useState('selection');
      const [unassigned,setUnassigned]=useState([...participants]);
      const [paired,setPaired]=useState([]);
      const [sel,setSel]=useState(null);
      useEffect(()=>{setUnassigned([...participants]);setPaired([]);},[participants]);
      const handleManual=p=>{
        if(!sel){setSel(p);}
        else if(sel.id===p.id){setSel(null);}
        else{
          const team={id:`team-${sel.id}-${p.id}`,name:`${sel.name}/${p.name}`,isSeeded:false};
          setPaired(prev=>[...prev,team]);setUnassigned(prev=>prev.filter(x=>x.id!==sel.id&&x.id!==p.id));setSel(null);
        }
      };
      const autoRandom=()=>{
        const pool=[...participants].sort(()=>Math.random()-0.5);const teams=[];
        for(let i=0;i<pool.length;i+=2){ if(pool[i+1]) teams.push({id:`team-${pool[i].id}-${pool[i+1].id}`,name:`${pool[i].name}/${pool[i+1].name}`,isSeeded:false}); else teams.push({...pool[i],name:`${pool[i].name} (1мқё)`}); }
        onComplete(teams);
      };
      if(mode==='selection') return (
        <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl text-center space-y-12 max-w-2xl mx-auto">
          <h3 className="text-3xl font-black text-slate-900 italic tracking-tight">Team Pairing.</h3>
          <p className="text-slate-500 font-medium italic">ліөмӢқ нҢҖмқ„ м–ҙл–»кІҢ кө¬м„ұн• к№Ңмҡ”?</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onClick={()=>setMode('manual')} className="p-8 border-2 border-slate-100 rounded-3xl hover:border-blue-500 hover:bg-blue-50 text-left"><h4 className="font-black text-xl text-slate-800">вңҚпёҸ м§Ғм ‘ нҺҳм–ҙл§Ғ</h4><p className="text-base text-slate-400 mt-1">мӣҗн•ҳлҠ” мӮ¬лһҢлҒјлҰ¬ н•ң нҢҖмңјлЎң л¬¶мҠөлӢҲлӢӨ.</p></button>
            <button onClick={autoRandom} className="p-8 border-2 border-slate-100 rounded-3xl hover:border-amber-500 hover:bg-amber-50 text-left"><h4 className="font-black text-xl text-slate-800">рҹҺІ мҷ„м „ лһңлҚӨ нҺҳм–ҙл§Ғ</h4><p className="text-base text-slate-400 mt-1">мӢңмҠӨн…ңмқҙ л¬ҙмһ‘мң„лЎң нҢҖмқ„ м§қм§“мҠөлӢҲлӢӨ.</p></button>
          </div>
          <button onClick={onBack} className="text-slate-400 font-bold hover:underline">мқҙм „ лӢЁкі„лЎң</button>
        </div>
      );
      return (
        <div className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl space-y-8 flex flex-col min-h-[600px] animate-fade-in">
          <div className="flex justify-between items-center border-b pb-4">
            <h3 className="text-2xl font-black text-slate-900 italic">Manual Pairing.</h3>
            <button onClick={()=>setMode('selection')} className="text-sm font-black text-blue-500 uppercase">лӘЁл“ң ліҖкІҪ</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 flex-1">
            <div className="space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">лҢҖкё°мһҗ ({unassigned.length})</label>
              <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {unassigned.map(p=><button key={p.id} onClick={()=>handleManual(p)} className={`w-full p-4 rounded-xl border-2 transition-all text-left font-bold ${sel?.id===p.id?'border-blue-500 bg-blue-50 scale-[1.02] shadow-md':'border-slate-100 bg-slate-50'}`}>{p.name}</button>)}
              </div>
            </div>
            <div className="md:col-span-2 space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">кө¬м„ұлҗң нҢҖ ({paired.length})</label>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {paired.map(t=>(
                  <div key={t.id} className={`flex items-center justify-between p-4 border-2 rounded-2xl ${t.isSeeded?'bg-amber-50 border-amber-300':'bg-white border-slate-100'}`}>
                    <div className="flex items-center gap-3">
                      <button onClick={()=>setPaired(prev=>prev.map(x=>x.id===t.id?{...x,isSeeded:!x.isSeeded,seedRank:!x.isSeeded?prev.filter(p=>p.isSeeded).length+1:undefined}:x))} className={`w-8 h-8 rounded-full text-sm ${t.isSeeded?'bg-amber-500 text-white':'bg-slate-100 text-slate-400'}`}>{t.isSeeded?'рҹ‘‘':'вӯҗ'}</button>
                      <span className="font-black text-slate-800 text-base truncate max-w-[120px]">{t.name}</span>
                    </div>
                    <button onClick={()=>{
                      const ids=t.id.replace('team-','').split('-');
                      const p1=participants.find(x=>x.id===ids[0]),p2=participants.find(x=>x.id===ids[1]);
                      if(p1)setUnassigned(prev=>[...prev,p1]);if(p2)setUnassigned(prev=>[...prev,p2]);
                      setPaired(prev=>prev.filter(x=>x.id!==t.id));
                    }} className="text-slate-300 hover:text-red-500">вң•</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="flex gap-4 pt-4 border-t">
            <button onClick={onBack} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">мқҙм „</button>
            <button onClick={()=>onComplete([...paired,...unassigned.map(p=>({...p,name:`${p.name} (1мқё)`}))])} disabled={paired.length===0}
              className={`flex-[2] py-4 rounded-2xl font-black text-xl shadow-lg ${paired.length>0?'bg-blue-600 text-white':'bg-slate-100 text-slate-300'}`}>нҢҖ кө¬м„ұ мҷ„лЈҢ</button>
          </div>
        </div>
      );
    };

    // ================================================================
    //  TeamGroupingView
    // ================================================================
    const TeamGroupingView = ({ participants, onComplete, onBack }) => {
      const [unassigned,setUnassigned]=useState([...participants]);
      const [teams,setTeams]=useState([]);
      const [selMembers,setSelMembers]=useState([]);
      const [teamName,setTeamName]=useState('');
      useEffect(()=>{setUnassigned([...participants]);setTeams([]);},[participants]);
      const toggleMember=p=>{setSelMembers(prev=>prev.find(m=>m.id===p.id)?prev.filter(m=>m.id!==p.id):[...prev,p]);};
      const createTeam=()=>{
        if(selMembers.length===0)return;
        const name=teamName.trim()||selMembers.map(m=>m.name).join(', ');
        const t={id:`team-${Math.random().toString(36).substr(2,9)}`,name,members:[...selMembers],isSeeded:false};
        setTeams(prev=>[...prev,t]);setUnassigned(prev=>prev.filter(p=>!selMembers.find(m=>m.id===p.id)));setSelMembers([]);setTeamName('');
      };
      const removeTeam=id=>{const t=teams.find(x=>x.id===id);if(t){setUnassigned(prev=>[...prev,...t.members]);setTeams(prev=>prev.filter(x=>x.id!==id));}};
      const autoGroup=()=>{
        const pool=[...unassigned].sort(()=>Math.random()-0.5);const nt=[...teams];
        while(pool.length>0){const mem=pool.splice(0,3);nt.push({id:`team-${Math.random().toString(36).substr(2,9)}`,name:mem.map(m=>m.name).join(', '),members:mem,isSeeded:false});}
        setTeams(nt);setUnassigned([]);
      };
      return (
        <div className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl space-y-8 flex flex-col min-h-[600px] animate-fade-in">
          <div className="flex justify-between items-center border-b pb-4">
            <h3 className="text-2xl font-black text-slate-900 italic">Team Grouping.</h3>
            <button onClick={autoGroup} className="text-sm font-black text-amber-500 uppercase hover:underline">мһҗлҸҷ нҢҖ кө¬м„ұ</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 flex-1">
            <div className="space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">лҢҖкё°мһҗ ({unassigned.length})</label>
              <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {unassigned.map(p=><button key={p.id} onClick={()=>toggleMember(p)} className={`w-full p-4 rounded-xl border-2 transition-all text-left font-bold ${selMembers.find(m=>m.id===p.id)?'border-blue-500 bg-blue-50 scale-[1.02] shadow-md':'border-slate-100 bg-slate-50'}`}>{p.name}</button>)}
              </div>
              {selMembers.length>0&&(
                <div className="pt-4 space-y-2">
                  <input type="text" value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="нҢҖ мқҙлҰ„ (м„ нғқмӮ¬н•ӯ)" className="w-full p-3 border-2 border-slate-100 rounded-xl font-bold text-base outline-none focus:border-blue-500"/>
                  <button onClick={createTeam} className="w-full py-3 bg-blue-600 text-white rounded-xl font-black text-base shadow-md">нҢҖ мғқм„ұ ({selMembers.length}лӘ…)</button>
                </div>
              )}
            </div>
            <div className="md:col-span-2 space-y-4">
              <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest">кө¬м„ұлҗң нҢҖ ({teams.length})</label>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                {teams.map(t=>(
                  <div key={t.id} className={`flex flex-col p-4 border-2 rounded-2xl ${t.isSeeded?'bg-amber-50 border-amber-300':'bg-white border-slate-100'}`}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-3">
                        <button onClick={()=>setTeams(prev=>{const target=prev.find(x=>x.id===t.id);if(!target)return prev;const ns=!target.isSeeded;return prev.map(x=>x.id===t.id?{...x,isSeeded:ns,seedRank:ns?prev.filter(p=>p.isSeeded).length+1:undefined}:x);})} className={`w-8 h-8 rounded-full text-sm ${t.isSeeded?'bg-amber-500 text-white':'bg-slate-100 text-slate-400'}`}>{t.isSeeded?'рҹ‘‘':'вӯҗ'}</button>
                        <span className="font-black text-slate-800 text-base truncate max-w-[120px]">{t.name}</span>
                      </div>

    // ================================================================
    //  ScoreboardView вҖ” мҪ”нҠё нғңлё”лҰҝ мҠӨмҪ”м–ҙліҙл“ң
    // ================================================================
    const ScoreboardView = ({ match, config, tournamentId, groupId, onSaved, onClose }) => {
      const sm = isSetsGame(config?.sport);
      const tn = isTennis(config?.sport);
      const totalSets = config?.sets || 3;
      const winSets   = Math.ceil(totalSets / 2);

      // рҹҺҫ н…ҢлӢҲмҠӨ м„Өм •
      const tennisSettings = {
        gamesPerSet: config?.tennisGamesPerSet || 6,
        deuce: !!config?.tennisDeuce,
        tiebreak: config?.tennisTiebreak !== false,
        // л§Ҳм§Җл§ү м„ёнҠё л§Өм№ҳ нғҖмқҙлёҢл ҲмқҙнҒ¬лҠ” лҸҷм ҒмңјлЎң кі„мӮ° (нҳ„мһ¬ м„ёнҠёк°Җ л§Ҳм§Җл§үмқј л•Ң)
        finalMatchTb: config?.tennisFinalMatchTb !== false
      };

      const [curSet,  setCurSet]  = useState(1);
      const [scoreA,  setScoreA]  = useState(0); // нҳ„мһ¬ м„ёнҠё м җмҲҳ (л…јлҰ¬м Ғ A = match.home)
      const [scoreB,  setScoreB]  = useState(0); // л…јлҰ¬м Ғ B = match.away
      const [history, setHistory] = useState([]); // [{a,b}] мҷ„лЈҢлҗң м„ёнҠё
      const [saving,  setSaving]  = useState(false);
      const [done,    setDone]    = useState(false);
      const [courtSwapped, setCourtSwapped] = useState(false); // мўҢмҡ° мһҗлҰ¬ көҗмІҙ (н‘ңмӢңл§Ң)

      // рҹҺҫ н…ҢлӢҲмҠӨ м „мҡ© мғҒнғң
      const [tnState, setTnState] = useState(()=>initTennisState());

      const wonA = tn ? tnState.sA : history.filter(s=>s.a>s.b).length;
      const wonB = tn ? tnState.sB : history.filter(s=>s.b>s.a).length;
      const matchOver = wonA>=winSets || wonB>=winSets;
      const nameA = match?.home?.name || match?.participant1?.name || 'нҷҲ';
      const nameB = match?.away?.name || match?.participant2?.name || 'мӣҗм •';

      // нҷ”л©ҙ мўҢ/мҡ° н‘ңмӢң вҖ” courtSwapped мқј л•Ң мһҗлҰ¬ л°”лҖң (м җмҲҳлҸ„ л”°лқјк°җ)
      const leftName  = courtSwapped ? nameB  : nameA;
      const rightName = courtSwapped ? nameA  : nameB;
      const leftScore = courtSwapped ? scoreB : scoreA;
      const rightScore= courtSwapped ? scoreA : scoreB;
      const leftWon   = courtSwapped ? wonB   : wonA;
      const rightWon  = courtSwapped ? wonA   : wonB;

      // рҹҺҫ н…ҢлӢҲмҠӨмҡ© мўҢ/мҡ° к°’
      const tnLeftSets    = courtSwapped ? tnState.sB : tnState.sA;
      const tnRightSets   = courtSwapped ? tnState.sA : tnState.sB;
      const tnLeftGames   = courtSwapped ? tnState.gB : tnState.gA;
      const tnRightGames  = courtSwapped ? tnState.gA : tnState.gB;
      // нҳ„мһ¬ нҸ¬мқёнҠё н‘ңмӢң (15/30/40/AD or нғҖмқҙлёҢл ҲмқҙнҒ¬ м җмҲҳ)
      let tnLeftPt = '0', tnRightPt = '0';
      if(tnState.isTiebreak){
        tnLeftPt = String(courtSwapped ? tnState.tbB : tnState.tbA);
        tnRightPt = String(courtSwapped ? tnState.tbA : tnState.tbB);
      } else if(tnState.isDeuce){
        if(tnState.advA){ tnLeftPt = courtSwapped?'40':'AD'; tnRightPt = courtSwapped?'AD':'40'; }
        else if(tnState.advB){ tnLeftPt = courtSwapped?'AD':'40'; tnRightPt = courtSwapped?'40':'AD'; }
        else { tnLeftPt = '40'; tnRightPt = '40'; }
      } else {
        const pA = TENNIS_POINTS[tnState.pA] !== undefined ? TENNIS_POINTS[tnState.pA] : 40;
        const pB = TENNIS_POINTS[tnState.pB] !== undefined ? TENNIS_POINTS[tnState.pB] : 40;
        tnLeftPt = String(courtSwapped ? pB : pA);
        tnRightPt = String(courtSwapped ? pA : pB);
      }

      // мўҢ/мҡ° нҒҙлҰӯ мӢң м–ҙлҠҗ мӘҪ м җмҲҳк°Җ мҳ¬лқјк°Ҳм§Җ
      const adjLeft  = (delta) => adj(courtSwapped ? 'B' : 'A', delta);
      const adjRight = (delta) => adj(courtSwapped ? 'A' : 'B', delta);

      const adj = (side, delta) => {
        if(matchOver||done) return;
        // рҹҺҫ н…ҢлӢҲмҠӨ л¶„кё°
        if(tn){
          if(delta > 0){
            // л§Ҳм§Җл§ү м„ёнҠё л§Өм№ҳ нғҖмқҙлёҢл ҲмқҙнҒ¬ нҢҗм •
            const totalPlayed = tnState.sA + tnState.sB;
            const isFinalSet = tennisSettings.finalMatchTb && totalPlayed === totalSets - 1 && totalSets > 1;
            // л§Өм№ҳ нғҖмқҙлёҢл ҲмқҙнҒ¬лҠ” мІ« кІҢмһ„л¶Җн„° нғҖмқҙлёҢл ҲмқҙнҒ¬ лӘЁл“ң
            const cur = {...tnState};
            if(isFinalSet && cur.gA === 0 && cur.gB === 0 && !cur.isTiebreak){
              cur.isTiebreak = true;
              cur.tbA = 0; cur.tbB = 0;
            }
            const settings = {...tennisSettings, isFinalSet};
            const next = tennisScorePoint(cur, settings, side);
            // м„ёнҠёк°Җ мҷ„лЈҢлҗҗлҠ”м§Җ нҷ•мқё (sA лҳҗлҠ” sBк°Җ мҰқк°Җн–ҲлҠ”м§Җ)
            if(next.sA > tnState.sA || next.sB > tnState.sB){
              // м„ёнҠё мў…лЈҢ вҖ” кІҢмһ„мҲҳ нһҲмҠӨнҶ лҰ¬ кё°лЎқ
              const finishedSetGames = {gA: tnState.gA + (side==='A'?1:0), gB: tnState.gB + (side==='B'?1:0)};
              // мӢӨм ңлЎңлҠ” endGameмқҙ лҒқлӮҳл©ҙм„ң gA/gBк°Җ лҰ¬м…Ӣлҗҳкё° м „ к°’ н•„мҡ” вҶ’ лӢӨлҘё л°©мӢқ мӮ¬мҡ©
              // tnStateм—җм„ң endSet м§Ғм „ к°’мқ„ м•Ң мҲҳ м—ҶмңјлӢҲ, nextмқҳ setHistoryм—җ м¶”к°Җ
              if(!next.setHistory) next.setHistory = [...(tnState.setHistory||[])];
              else next.setHistory = [...(tnState.setHistory||[]), ...next.setHistory.slice((tnState.setHistory||[]).length)];
              // м§Ғм „ кІҢмһ„мҲҳ м¶”м Ғ вҖ” л§Ҳм§Җл§ү кІҢмһ„ м§Ғм „ мғҒнғң + 1
              const lastA = tnState.gA + (side==='A'? (cur.isDeuce||cur.isTiebreak||cur.pA>=3?1:0) : 0);
              const lastB = tnState.gB + (side==='B'? (cur.isDeuce||cur.isTiebreak||cur.pB>=3?1:0) : 0);
              // лҚ” м•Ҳм „н•ҳкІҢ: tennisScorePoint м§Ғм „мқҳ gA, gBлҘј nextмқҳ setHistoryм—җ м¶”к°Җ
              const sh = [...(tnState.setHistory||[])];
              // м–ҙлҠҗ мӘҪмқҙ м„ёнҠёмҠ№н–ҲлҠ”м§ҖлЎң кІ°м •
              if(next.sA > tnState.sA){
                // Aк°Җ м„ёнҠё мҠ№ вҶ’ л§Ҳм§Җл§ү кІҢмһ„ = A мҠ№
                sh.push({gA: cur.gA + 1, gB: cur.gB});
              } else {
                sh.push({gA: cur.gA, gB: cur.gB + 1});
              }
              next.setHistory = sh;
              // л§Өм№ҳ мў…лЈҢ мӢң firebase м ҖмһҘ
              if(next.sA >= winSets || next.sB >= winSets){
                setTnState(next);
                saveToFirebaseTennis(next, false);
                return;
              }
              // мқјл°ҳ м„ёнҠё мў…лЈҢ вҖ” мӨ‘к°„ м ҖмһҘ
              setTnState(next);
              saveToFirebaseTennis(next, false);
              return;
            }
            setTnState(next);
          } else {
            // -1: л§Ҳм§Җл§ү нҸ¬мқёнҠё м·ЁмҶҢ (к°„лӢЁ кө¬нҳ„ вҖ” нҸ¬мқёнҠё н•ң лӢЁкі„ лҗҳлҸҢлҰ¬кё°)
            // м •нҷ•н•ң лҗҳлҸҢлҰ¬кё°лҠ” ліөмһЎн•ҳлҜҖлЎң мқјлӢЁ нҳ„мһ¬ нҸ¬мқёнҠёл§Ң -1
            const next = {...tnState};
            if(next.isTiebreak){
              if(side==='A' && next.tbA>0) next.tbA--;
              if(side==='B' && next.tbB>0) next.tbB--;
            } else if(next.isDeuce){
              if(side==='A' && next.advA) next.advA = false;
              else if(side==='B' && next.advB) next.advB = false;
              else if(!next.advA && !next.advB){
                // л“ҖмҠӨ вҶ’ 30-30 мңјлЎң (н•ң лӘ…л§Ң н•ң лӢЁкі„ лӮҙлҰј)
                next.isDeuce = false;
                if(side==='A') next.pA = 2;
                if(side==='B') next.pB = 2;
              }
            } else {
              if(side==='A' && next.pA>0) next.pA--;
              if(side==='B' && next.pB>0) next.pB--;
            }
            setTnState(next);
          }
          return;
        }
        // мқјл°ҳ мў…лӘ©
        if(side==='A') setScoreA(v=>Math.max(0,v+delta));
        else           setScoreB(v=>Math.max(0,v+delta));
      };

      const endSet = () => {
        if(scoreA===0&&scoreB===0){alert('м җмҲҳлҘј лЁјм Җ мһ…л Ҙн•ҳм„ёмҡ”.');return;}
        const newHistory=[...history,{a:scoreA,b:scoreB}];

        // м„ёнҠё мў…лЈҢ нӣ„ Firebaseм—җ мӨ‘к°„ м ҖмһҘ
        saveToFirebase(newHistory, false);

        const histLike = sh.map(s=>({a: s.gA, b: s.gB}));

        await saveToFirebase(histLike, isFinal);
      };

              status: isFinal ? 'completed' : 'in_progress'
            }

          // Firebaseм—җм„ң нҳ„мһ¬ лҢҖнҡҢ лҚ°мқҙн„° к°Җм ёмҷҖм„ң н•ҙлӢ№ кІҪкё°л§Ң м—…лҚ°мқҙнҠё
          const snap = await db.ref('tournaments/'+tournamentId).once('value');
          const data = snap.val();
          if(!data) return;

          if(isLeague){

            if(groupId && data.generatedGroups){
              data.generatedGroups = data.generatedGroups.map(g=>{
                if(g.id!==groupId) return g;
                return {...g, rounds: g.rounds.map(r=>({...r, matches: r.matches.map(m=>{
                  if(m.id!==match.id) return m;
                  updated=true;
                  return {...m, scoreHome:sA, scoreAway:sB, setScores:hist.map(s=>({h:s.a,a:s.b})), status:isFinal?'completed':'in_progress'};
                })}))};
              });
              // standings мһ¬кі„мӮ°
              const config2=data.config||{};
              const sm2=isSetsGame(config2.sport);
              data.generatedGroups = data.generatedGroups.map(g=>({
                ...g,
                standings: calculateStandings(g.participants, g.rounds, sm2)
              }));
            } else if(data.generatedLeague){
              data.generatedLeague = data.generatedLeague.map(r=>({...r, matches: r.matches.map(m=>{
                if(m.id!==match.id) return m;
                updated=true;
                return {...m, scoreHome:sA, scoreAway:sB, setScores:hist.map(s=>({h:s.a,a:s.b})), status:isFinal?'completed':'in_progress'};
              })}));
            }
          } else {
            // нҶ л„ҲлЁјнҠё кІҪкё°
            if(data.generatedMatches){
              data.generatedMatches = data.generatedMatches.map(m=>{
                if(m.id!==match.id) return m;
                const winnerId=sA>sB?(m.participant1?.id||''):(m.participant2?.id||'');
                return {...m, score1:sA, score2:sB, setScores:hist.map(s=>({h:s.a,a:s.b})), status:isFinal?'completed':'in_progress', winnerId:isFinal?winnerId:m.winnerId};
              });
            }
          }
          await db.ref('tournaments/'+tournamentId).set(data);
          if(isFinal) { setDone(true); onSaved&&onSaved(); }
        } catch(e){ console.error(e); alert('м ҖмһҘ мӢӨнҢЁ. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.'); }
        setSaving(false);
      };

        if(tn) saveToFirebaseTennis(tnState, true);

    const CODE_GS_CONTENT = `// MatchMaker Pro вҖ” Google Apps Script
// кө¬кёҖ мӢңнҠёмҷҖ л§Өм№ҳл©”мқҙм»ӨлҘј м—°лҸҷн•ҳлҠ” л°ұм—”л“ң мҪ”л“ң

function doGet(e) {
  return jsonOut({ success: true, message: 'MatchMaker Pro GAS API. Use POST.' });
}

function doPost(e) {
  let body = {};
  try {
    body = JSON.parse((e && e.postData && e.postData.contents) || '{}');
  } catch (err) {
    return jsonOut({ success: false, error: 'Invalid JSON body' });
  }
  return handleRequest(body.action, body);
}

function jsonOut(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

function handleRequest(action, params) {
  params = params || {};
  try {
    switch (action) {
      case 'ping':
        return jsonOut({ success: true, time: Date.now() });
      case 'exportToSheets':
        return jsonOut(exportToSheets(params.data));
      case 'exportAllTournaments':
        return jsonOut(exportAllTournaments(params.tournaments));
      case 'getSheetUrl':
        return jsonOut(getSheetUrl());
      case 'createParticipantSheet':
        return jsonOut(createParticipantSheet(params.tournamentName));
      case 'getParticipantsFromSheet':
        return jsonOut(getParticipantsFromSheet(params.tournamentName));
      case 'saveParticipantsToSheet':
        return jsonOut(saveParticipantsToSheet(params.tournamentName, params.participants));
      default:
        return jsonOut({ success: false, error: 'Unknown action: ' + action });
    }
  } catch (err) {
    return jsonOut({ success: false, error: err && err.toString ? err.toString() : 'Server error' });
  }
}

function getSheetUrl() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  return { success: true, url: ss.getUrl(), name: ss.getName() };
}

    const PasswordPromptModal = ({ correctPassword, onSuccess, onClose }) => {

      const [error, setError] = useState(false);
      const tryUnlock = () => {

        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={onClose}>
          <div className={`bg-white rounded-2xl sm:rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden ${error?'animate-shake':''}`} onClick={e=>e.stopPropagation()}>

        // share лӘЁл“ңлҠ” мҷёл¶Җ л§ҒнҒ¬лЎң мҳЁ кұ°лӢҲк№Ң мқён„°м…үнҠё X (мӮ¬мҡ©мһҗк°Җ мӣҗлһҳ мӮ¬мқҙнҠёлЎң лҸҢм•„к°Ҳ мҲҳ мһҲкІҢ)
